    - docker push "$IMAGE"

ci:build-wasm-image:
  # Rebuild and push the custom ci-wasm image used by the .wasm template.
  # Pre-bakes the clippy component + wasm32 target + pinned wasm-pack + pinned
  # cargo-deny + a warm cargo registry so the four wasm:* jobs skip the rustup
  # adds, tool downloads, and crates.io fetch on every run.
  #
  # Trigger: same shape as ci:build-scheduler-image — Cargo lock/manifest or
  # Dockerfile changes, plus the weekly scheduled run as a transitive-drift
  # safety net. .gitlab-ci.yml is deliberately NOT in the trigger list (see the
  # equivalent decision on ci:build-api-image above).
  #
  # Jobs that use the image declare `needs: [{job: ci:build-wasm-image,
  # optional: true}]` so they wait for the build when it's in the pipeline and
  # pull the existing registry tag when it isn't (the steady state).
  stage: lint
  image: docker:27@sha256:aa3df78ecf320f5fafdce71c659f1629e96e9de0968305fe1de670e0ca9176ce
  services:
    - docker:27-dind@sha256:aa3df78ecf320f5fafdce71c659f1629e96e9de0968305fe1de670e0ca9176ce
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE: "$CI_REGISTRY_IMAGE/ci-wasm:1.85"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - packages/wasm-scheduler/Cargo.lock
        - packages/wasm-scheduler/Cargo.toml
        - .gitlab/ci-images/wasm.Dockerfile
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/wasm-scheduler/Cargo.lock
        - packages/wasm-scheduler/Cargo.toml
        - .gitlab/ci-images/wasm.Dockerfile
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker pull "$IMAGE" || true
    - docker build
        --cache-from "$IMAGE"
        --tag "$IMAGE"
        --file .gitlab/ci-images/wasm.Dockerfile
        .
    - docker push "$IMAGE"

ci:mirror-playwright-base:
  # Ensure the upstream Playwright base image is mirrored into our own GitLab
  # Container Registry so the rest of CI never pulls it anonymously from
  # mcr.microsoft.com. Microsoft throttles cold anonymous pulls from CI runner
  # IPs (401/429 on its oauth2/token endpoint); an isolated dind daemon hits that
  # on every build. Our registry has no such limit and dind authenticates to it
  # via CI_REGISTRY creds.
  #
  # This is the ONLY job that pulls from MCR. Every Playwright-based job —
  # ci:build-integration-image's FROM, and the web:e2e / web:e2e:report /
  # web:e2e:coverage / website:build / pages jobs' `image:` — consumes the mirror
  # tag ($CI_REGISTRY_IMAGE/playwright-base:$PLAYWRIGHT_BASE_TAG) instead of
  # mcr.microsoft.com. The DAG (needs:) consumers declare an optional need on
  # this job so they wait for it when it is in the pipeline (a bump) and pull the
  # existing tag when it is not (steady state); the stage-ordered consumers
  # (website:build, pages) run in later stages so the lint-stage mirror precedes
  # them without an explicit need.
  #
  # It is an idempotent gate that ci:build-integration-image `needs:`, sharing
  # the build's rules so the two are always co-present — guaranteeing the mirror
  # exists before the build resolves its FROM (no manual ordering, no race). A
  # Playwright bump touches integration.Dockerfile (bump the tag there, in the
  # PLAYWRIGHT_BASE_TAG variable, and in the playwright configs together), which
  # trips these rules and refreshes the mirror before the bumped consumers pull.
  # It is a fast no-op when the tag is already mirrored (`docker manifest
  # inspect` short-circuits before any MCR traffic); it only pulls from MCR when
  # the tag is genuinely missing — a fresh mirror or a Playwright bump — and the
  # weekly schedule refreshes it. The cold pull is wrapped in exponential-backoff
  # retry since that one pull may still hit the throttle window; once pushed, the
  # mirror tag persists until the bump.
  stage: lint
  image: docker:27@sha256:aa3df78ecf320f5fafdce71c659f1629e96e9de0968305fe1de670e0ca9176ce
  services:
    - docker:27-dind@sha256:aa3df78ecf320f5fafdce71c659f1629e96e9de0968305fe1de670e0ca9176ce
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_CLI_EXPERIMENTAL: "enabled"
    SRC: "mcr.microsoft.com/playwright:$PLAYWRIGHT_BASE_TAG"
    DEST: "$CI_REGISTRY_IMAGE/playwright-base:$PLAYWRIGHT_BASE_TAG"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - packages/scheduler/pyproject.toml
        - packages/api/pyproject.toml
        - .gitlab/ci-images/integration.Dockerfile
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/scheduler/pyproject.toml
        - packages/api/pyproject.toml
        - .gitlab/ci-images/integration.Dockerfile
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    # Already mirrored (steady state) — skip without touching MCR. The schedule
    # run forces a refresh by ignoring this short-circuit.
    - |
      if [ "$CI_PIPELINE_SOURCE" != "schedule" ] && docker manifest inspect "$DEST" >/dev/null 2>&1; then
        echo "$DEST already present — skipping MCR mirror."
        exit 0
      fi
    - |
      attempt=1
      max_attempts=5
      delay=30
      until docker pull "$SRC"; do
        if [ "$attempt" -ge "$max_attempts" ]; then
          echo "docker pull $SRC failed after ${max_attempts} attempts" >&2
          exit 1
        fi
        echo "pull attempt ${attempt} failed (MCR throttle?); retrying in ${delay}s..." >&2
        sleep "$delay"
        attempt=$((attempt + 1))
        delay=$((delay * 2))
      done
    - docker tag "$SRC" "$DEST"
    - docker push "$DEST"

ci:build-integration-image:
  # Rebuild and push the custom ci-integration image used by web:integration.
  # Bakes Python 3 + libpq-dev + gcc + uvicorn + scheduler[dev] + api[dev]
  # dev-deps on top of the Playwright image so the integration job skips
  # the ~3min apt+pip cold install on every main run.
  #
  # Trigger: same shape as ci:build-api-image — Dockerfile / pyproject changes,
  # plus the weekly scheduled run. Validated on MR pipelines when the relevant
  # files change so a broken Dockerfile is caught before merge; web:integration
  # itself is main-only and pulls the existing registry tag in steady state.
  #
  # Builds FROM our registry mirror of the Playwright base via the
  # PLAYWRIGHT_BASE build-arg, so this job — which runs on every qualifying MR —
  # never pulls from the throttled MCR endpoint. `needs: ci:mirror-playwright-base`
  # guarantees the mirror tag exists before the FROM is resolved; that gate is a
  # no-op in steady state, so the dependency costs nothing once mirrored.
  stage: lint
  image: docker:27@sha256:aa3df78ecf320f5fafdce71c659f1629e96e9de0968305fe1de670e0ca9176ce
  services:
    - docker:27-dind@sha256:aa3df78ecf320f5fafdce71c659f1629e96e9de0968305fe1de670e0ca9176ce
  needs:
    - job: ci:mirror-playwright-base
      artifacts: false
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE: "$CI_REGISTRY_IMAGE/ci-integration:noble"
    PLAYWRIGHT_BASE: "$CI_REGISTRY_IMAGE/playwright-base:$PLAYWRIGHT_BASE_TAG"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - packages/scheduler/pyproject.toml
        - packages/api/pyproject.toml
        - .gitlab/ci-images/integration.Dockerfile
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/scheduler/pyproject.toml
        - packages/api/pyproject.toml
        - .gitlab/ci-images/integration.Dockerfile
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker pull "$IMAGE" || true
    - docker build
        --build-arg PLAYWRIGHT_BASE="$PLAYWRIGHT_BASE"
        --cache-from "$IMAGE"
        --tag "$IMAGE"
        --file .gitlab/ci-images/integration.Dockerfile
        .
    - docker push "$IMAGE"

