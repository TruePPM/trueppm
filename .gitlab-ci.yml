stages:
  - lint      # fastest jobs, most commonly fail — run first, gate everything
  - analyze   # type-check, static analysis, migration/schema checks
  - test      # unit + integration tests (per-package, DAG-gated on analyze)
  - security  # CVE scans + license audit (MR + main only)
  - publish   # tag-triggered: package registries (PyPI/npm) + Docker images + Helm
  - deploy    # docs deployment to GitLab Pages

default:
  interruptible: true
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  after_script:
    # Free workspace disk before cache upload to reduce runner disk pressure.
    # NOTE: this runner's builds_dir is under /tmp (/tmp/builds/...), so a bare
    # `rm -rf /tmp/*` deletes the checkout and the post-job `cd` back into the
    # project fails with exit 1 — failing an otherwise-green job. Exclude the
    # build dir so we reclaim scratch space without destroying the workspace.
    - find /tmp -mindepth 1 -maxdepth 1 ! -name builds -exec rm -rf {} + 2>/dev/null || true

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  # Dependency-fetch durability (#1212). Public-registry blips (ECONNRESET,
  # timeouts) used to fail a whole job on first occurrence — `default.retry`
  # excludes `script_failure`, so a flaky `npm ci`/`pip install` got zero
  # retries. These make the package managers self-heal with backoff, and
  # `NPM_CONFIG_CACHE` points npm's content cache at a path the web jobs cache
  # so `npm ci --prefer-offline` hits zero network for already-seen packages.
  PIP_RETRIES: "5"
  PIP_DEFAULT_TIMEOUT: "60"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.cache/npm"
  NPM_CONFIG_FETCH_RETRIES: "5"
  NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: "20000"
  NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: "120000"
  POSTGRES_DB: trueppm_test
  POSTGRES_USER: trueppm
  POSTGRES_PASSWORD: trueppm
  # Playwright base-image tag, mirrored into our registry by
  # ci:mirror-playwright-base and consumed by ci:build-integration-image so MR
  # pipelines never pull anonymously from mcr.microsoft.com (which throttles CI
  # runner IPs). Bump alongside the Dockerfile ARG default and packages/web.
  PLAYWRIGHT_BASE_TAG: "v1.58.2-noble"

# ---------------------------------------------------------------------------
# retry() — surgical command-level retry for flaky network steps (#1212).
# GitLab job-level `retry` can only rerun the WHOLE job, and would have to
# include `script_failure` to catch a network blip — which would also rerun
# genuine test failures twice (slow red signal, wasted minutes). Wrapping just
# the network commands (`npm ci`, `pip install`, the health-check `curl`) in a
# `before_script` retries the command, not the job: real test failures in
# `script:` still fail fast. Source via `- *retry-fn` at the top of a
# before_script, then prefix the flaky command with `retry`.
# ---------------------------------------------------------------------------
.retry-fn: &retry-fn |
  retry() {
    n=0; max=4; delay=10
    until "$@"; do
      n=$((n + 1))
      if [ "$n" -ge "$max" ]; then
        echo "retry: '$*' still failing after $max attempts — giving up" >&2
        return 1
      fi
      echo "retry: '$*' failed (attempt $n/$max); sleeping ${delay}s…" >&2
      sleep "$delay"
      delay=$((delay * 2))
    done
  }

# ---------------------------------------------------------------------------
# Prevent duplicate pipelines.
# MR pipeline runs when an MR exists for the branch; branch pipeline runs
# for pushes without an open MR. Both run on main after merge.
#
# auto_cancel: feature branches and MRs cancel older pipelines when a new
# commit lands (saves runner minutes during iteration). main is exempt —
# every merge into main must run to completion so each commit on the
# protected branch has its own green/red signal.
# ---------------------------------------------------------------------------
workflow:
  auto_cancel:
    on_new_commit: interruptible
  rules:
    # Scheduled pipelines are only for the Renovate runner (RENOVATE == "true").
    # Block any other scheduled trigger so a stray schedule can't spin up a full
    # pipeline. The Renovate schedule itself falls through to the branch rule.
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $RENOVATE != "true"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
      auto_cancel:
        on_new_commit: none
    - if: '$CI_COMMIT_TAG =~ /^v\d+/'
      auto_cancel:
        on_new_commit: none
    - if: '$CI_COMMIT_TAG =~ /^scheduler-v\d+/'
      auto_cancel:
        on_new_commit: none
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_COMMIT_BRANCH'

# ---------------------------------------------------------------------------
# Path-change rule templates.
#
# Every package job uses one of these anchors so it only runs when files in
# that package (or the CI config itself) change. On main the changes: filter
# is omitted — the protected branch always gets a full green signal.
#
# api includes scheduler paths because the API package installs the scheduler
# as a dependency; a scheduler change can break API type-checking.
#
# API-side security jobs (pip-audit, license:check:py) declare a single
# optional needs on ci:build-api-image so they enter DAG mode and run in
# parallel with the test stage rather than waiting for it to finish. The
# optional+single-dep shape avoids blocked-job cascades on single-package
# MRs: if only the API changed, web:test is skipped, but pip-audit and
# license:check:py still run because they don't depend on web:test.
# ---------------------------------------------------------------------------

.rules-scheduler: &rules-scheduler
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/scheduler/**/*
        - .gitlab-ci.yml

.rules-api: &rules-api
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/api/**/*
        - packages/scheduler/**/*
        - .gitlab-ci.yml

.rules-web: &rules-web
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/web/**/*
        - .gitlab-ci.yml

.rules-website: &rules-website
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG =~ /^v\d+/'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/website/**/*
        - .gitlab-ci.yml

.rules-wasm: &rules-wasm
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/wasm-scheduler/**/*
        - .gitlab-ci.yml

.rules-helm: &rules-helm
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/helm/**/*
        - .gitlab-ci.yml

# ---------------------------------------------------------------------------
# Base templates
# Cache keys are derived from each package's dependency manifest so the
# Minio-backed cache is automatically invalidated when dependencies change.
# ---------------------------------------------------------------------------

#
# Uses the custom ci-scheduler image (built by `ci:build-scheduler-image`)
# which pre-bakes the scheduler[dev] wheel tree. The runtime `pip install -e`
# only re-links the editable package — no wheel downloads.
# Kaizen #651: shaves cold-install time off each of the five scheduler:* jobs.
.scheduler:
  image: $CI_REGISTRY_IMAGE/ci-scheduler:py3.11
  needs:
    - job: ci:build-scheduler-image
      optional: true
  cache: &scheduler-cache
    key:
      files:
        - packages/scheduler/pyproject.toml
      prefix: scheduler-pip
    paths:
      - .cache/pip/
  before_script:
    # Image already has scheduler[dev] wheels resident; this is a fast
    # editable re-link against the checked-out source.
    - pip install -e "packages/scheduler[dev]" --quiet

# Full API template — postgres + valkey services, used by api:test only.
# Valkey is the BSD-licensed Redis fork; wire-compatible, REDIS_URL unchanged.
#
# Uses the custom ci-api image (built by `ci:build-api-image`) which pre-bakes
# libpq-dev + gcc and all dev-deps wheels. The runtime `pip install -e` only
# re-links the editable packages — no wheel downloads, no apt-get.
# Kaizen #640 item 3: shaves ~3min off each of the six api:* jobs.
.api:
  image: $CI_REGISTRY_IMAGE/ci-api:py3.11
  needs:
    - job: ci:build-api-image
      optional: true
  cache: &api-cache
    key:
      files:
        - packages/api/pyproject.toml
      prefix: api-pip
    paths:
      - .cache/pip/
  services:
    - name: postgres:16-alpine
      alias: postgres
    - name: valkey/valkey:8-alpine
      alias: valkey
  variables:
    DJANGO_SETTINGS_MODULE: trueppm_api.settings.dev
    TRUEPPM_ALLOW_DEV_SETTINGS: "1"
    DATABASE_URL: "postgres://trueppm:trueppm@postgres/trueppm_test"
    REDIS_URL: "redis://valkey:6379"
  before_script:
    # Image already has libpq-dev + gcc + all dev-dep wheels resident; this
    # install is a fast editable re-link against the checked-out source.
    - pip install -e "packages/scheduler[dev]" --quiet
    - pip install -e "packages/api[dev]" --quiet

# Lean API template — no DB/Valkey, for jobs that only need Django importable
# (type-check, migration check, schema generation). DATABASE_URL is set so
# django-environ parses cleanly; no actual connection is made.
.api-no-db:
  image: $CI_REGISTRY_IMAGE/ci-api:py3.11
  needs:
    - job: ci:build-api-image
      optional: true
  cache:
    <<: *api-cache
    policy: pull
  variables:
    DJANGO_SETTINGS_MODULE: trueppm_api.settings.dev
    TRUEPPM_ALLOW_DEV_SETTINGS: "1"
    DATABASE_URL: "postgres://trueppm:trueppm@localhost/trueppm_test"
  before_script:
    # api[dev] (not bare api) — the image has dev-dep wheels resident so
    # the re-link cost is the same and downstream jobs (type-check, schema)
    # need the dev extras (mypy stubs, drf-spectacular validators).
    - pip install -e "packages/scheduler[dev]" --quiet
    - pip install -e "packages/api[dev]" --quiet

.web:
  image: node:20-alpine
  # Cache npm's content cache (NPM_CONFIG_CACHE), not node_modules: `npm ci`
  # deletes node_modules and reinstalls every run, so a node_modules cache buys
  # nothing — but a warm content cache lets `npm ci --prefer-offline` rebuild it
  # with zero network for already-seen packages (#1212).
  cache: &web-cache
    key:
      files:
        - packages/web/package-lock.json
      prefix: web-npm-cacache
    paths:
      - .cache/npm/
  before_script:
    - *retry-fn
    - cd packages/web
    - retry npm ci --prefer-offline --quiet

.website:
  # node:22 — Astro 6 requires Node >=22.12 (dropped Node 20 support).
  image: node:22-alpine
  cache:
    key:
      files:
        - packages/website/package-lock.json
      prefix: website-npm-cacache
    paths:
      - .cache/npm/
  before_script:
    - *retry-fn
    - cd packages/website
    - retry npm ci --prefer-offline --quiet

.wasm:
  image: rust:1.85-slim
  # No cargo target cache — the ~1 GB target/ directory was exhausting shared
  # runner disk. Cold builds take ~40s which is acceptable until we have a
  # self-hosted runner with more disk (issues #29/#30).
  before_script:
    - rustup component add clippy
    - rustup target add wasm32-unknown-unknown
    - cd packages/wasm-scheduler

# ---------------------------------------------------------------------------
# LINT — fastest jobs, highest failure rate. Gates all downstream work.
# ---------------------------------------------------------------------------

changelog:check:
  # Pure git diff — ~10 seconds. Run first so MR authors get instant feedback
  # if they forgot a changelog fragment, before any build jobs start.
  #
  # Changelog fragments live in changelog.d/<slug>.<type>.md (not CHANGELOG.md).
  # Fragments are assembled into CHANGELOG.md at release time by
  # scripts/assemble-changelog.sh. See changelog.d/README.md for details.
  #
  # Exempt branches: chore/*, ci/*, docs/* carry no user-visible change.
  # Exempt MRs: add the ~no-changelog label in GitLab to skip this check.
  stage: lint
  image: alpine:latest
  variables:
    # Full history so `git diff origin/<target>...HEAD` finds a merge base even
    # on long-running feature branches. GitLab's default GIT_DEPTH=20 broke
    # this job whenever a branch had >20 commits since branching from main.
    GIT_DEPTH: "0"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^(chore|ci|docs)\//i'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  before_script:
    - apk add --no-cache git
  script:
    - git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
    - |
      # Skip if the MR has the ~no-changelog label
      if echo "$CI_MERGE_REQUEST_LABELS" | grep -qF "no-changelog"; then
        echo "Skipping changelog check — ~no-changelog label present."
        exit 0
      fi
    - |
      CHANGED=$(git diff --name-only "origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME...HEAD")
      FRAGMENTS=$(echo "$CHANGED" | grep -E '^changelog\.d/[^/]+\.(added|changed|fixed|security)\.md$' || true)
      if [ -z "$FRAGMENTS" ]; then
        echo "ERROR: No changelog fragment found on this branch."
        echo ""
        echo "Create a file in changelog.d/ with the format:"
        echo "  changelog.d/<slug>.<type>.md"
        echo ""
        echo "Types: added, changed, fixed, security"
        echo "Example: changelog.d/auth-retry-race.fixed.md"
        echo ""
        echo "See changelog.d/README.md for details."
        echo "To skip this check, add the ~no-changelog label to the MR."
        exit 1
      fi
      echo "OK: Changelog fragment(s) found:"
      echo "$FRAGMENTS"

boundary:check:
  # Detect open OSS issues that describe enterprise functionality (labeled
  # `enterprise` or `portfolio`) and therefore violate the Two-Repo Rule
  # (CLAUDE.md). Two GitLab API calls; ~2s. Runs on main pushes (catches
  # the moment a violation lands) and on schedule (catches violations that
  # were created via the GitLab UI without an MR).
  #
  # An optional BOUNDARY_CHECK_TOKEN (project- or group-level access token)
  # can be set in CI/CD variables; otherwise CI_JOB_TOKEN is used.
  stage: lint
  image: alpine:latest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - apk add --no-cache curl jq bash
  script:
    - bash scripts/check-issue-boundary.sh

lint:todo-grep:
  # Stale stub-marker gate (#350). STUB:/WIP: never ship; TODO(#NNN) must
  # point at an open issue. Bare TODOs warn only. Excludes packages/web/e2e
  # (Playwright follow-up TODOs are valid), docs/, and *.md.
  #
  # Runs on every MR pipeline. ~5–10s incl. issue-state lookups.
  stage: lint
  image: alpine:latest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - apk add --no-cache bash curl jq grep git
  script:
    - bash scripts/check-todo-grep.sh
    - bash scripts/check-todo-grep.sh --self-test

lint:design-system-v2:
  # Design System v2 conformance gate (ADR-0125). Blocks design drift: arbitrary
  # Tailwind color/shadow value classes (zero tolerance) and new raw hex literals
  # in component source (ratchet against a committed baseline). This is the
  # enforcement that makes "all future work inherits the v2 golden standard" real.
  # See docs/design/v2-golden-standard.md. ~2s.
  stage: lint
  image: alpine:latest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - apk add --no-cache bash grep
  script:
    - bash scripts/check-design-system-v2.sh

ci:build-api-image:
  # Rebuild and push the custom ci-api image used by the .api / .api-no-db
  # job templates. Pre-bakes libpq-dev + gcc + all dev-dep wheels so the
  # downstream api:* jobs skip ~3min of cold install on every run
  # (kaizen #640 item 3).
  #
  # Trigger:
  #   - MR pipelines where the Dockerfile or either pyproject.toml changes
  #   - main pipelines where the same files change
  #   - scheduled pipelines (weekly safety net for transitive drift)
  #
  # Jobs that use the image declare `needs: [{job: ci:build-api-image,
  # optional: true}]` so they wait for the build when it's in the pipeline,
  # and pull the existing registry tag when it isn't (the steady state).
  stage: lint
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE: "$CI_REGISTRY_IMAGE/ci-api:py3.11"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - packages/api/pyproject.toml
        - packages/scheduler/pyproject.toml
        - .gitlab/ci-images/api.Dockerfile
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/api/pyproject.toml
        - packages/scheduler/pyproject.toml
        - .gitlab/ci-images/api.Dockerfile
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    # --cache-from lets a no-op rebuild reuse the previously published layers.
    - docker pull "$IMAGE" || true
    - docker build
        --cache-from "$IMAGE"
        --tag "$IMAGE"
        --file .gitlab/ci-images/api.Dockerfile
        .
    - docker push "$IMAGE"

ci:build-scheduler-image:
  # Rebuild and push the custom ci-scheduler image used by the .scheduler
  # template. Pre-bakes the scheduler[dev] wheel tree so the five
  # scheduler:* jobs skip the cold install on every run (kaizen #651,
  # follow-up to #640).
  #
  # Trigger: same shape as ci:build-api-image — Dockerfile / pyproject
  # changes, plus the weekly scheduled run as a transitive-drift safety
  # net. .gitlab-ci.yml is deliberately NOT in the trigger list (see the
  # equivalent decision on ci:build-api-image above).
  stage: lint
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE: "$CI_REGISTRY_IMAGE/ci-scheduler:py3.11"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - packages/scheduler/pyproject.toml
        - .gitlab/ci-images/scheduler.Dockerfile
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/scheduler/pyproject.toml
        - .gitlab/ci-images/scheduler.Dockerfile
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker pull "$IMAGE" || true
    - docker build
        --cache-from "$IMAGE"
        --tag "$IMAGE"
        --file .gitlab/ci-images/scheduler.Dockerfile
        .
    - docker push "$IMAGE"

ci:mirror-playwright-base:
  # Ensure the upstream Playwright base image is mirrored into our own GitLab
  # Container Registry so the rest of CI never pulls it anonymously from
  # mcr.microsoft.com. Microsoft throttles cold anonymous pulls from CI runner
  # IPs (401/429 on its oauth2/token endpoint); an isolated dind daemon hits that
  # on every build. Our registry has no such limit and dind authenticates to it
  # via CI_REGISTRY creds.
  #
  # This is the ONLY job that pulls from MCR. It is an idempotent gate that
  # ci:build-integration-image `needs:`, sharing the build's rules so the two are
  # always co-present — guaranteeing the mirror exists before the build resolves
  # its FROM (no manual ordering, no race). It is a fast no-op when the tag is
  # already mirrored (`docker manifest inspect` short-circuits before any MCR
  # traffic); it only pulls from MCR when the tag is genuinely missing — a fresh
  # mirror or a Playwright bump — and the weekly schedule refreshes it. The cold
  # pull is wrapped in exponential-backoff retry since that one pull may still
  # hit the throttle window; once pushed, the mirror tag persists until the bump.
  stage: lint
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_CLI_EXPERIMENTAL: "enabled"
    SRC: "mcr.microsoft.com/playwright:$PLAYWRIGHT_BASE_TAG"
    DEST: "$CI_REGISTRY_IMAGE/playwright-base:$PLAYWRIGHT_BASE_TAG"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - packages/scheduler/pyproject.toml
        - packages/api/pyproject.toml
        - .gitlab/ci-images/integration.Dockerfile
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/scheduler/pyproject.toml
        - packages/api/pyproject.toml
        - .gitlab/ci-images/integration.Dockerfile
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    # Already mirrored (steady state) — skip without touching MCR. The schedule
    # run forces a refresh by ignoring this short-circuit.
    - |
      if [ "$CI_PIPELINE_SOURCE" != "schedule" ] && docker manifest inspect "$DEST" >/dev/null 2>&1; then
        echo "$DEST already present — skipping MCR mirror."
        exit 0
      fi
    - |
      attempt=1
      max_attempts=5
      delay=30
      until docker pull "$SRC"; do
        if [ "$attempt" -ge "$max_attempts" ]; then
          echo "docker pull $SRC failed after ${max_attempts} attempts" >&2
          exit 1
        fi
        echo "pull attempt ${attempt} failed (MCR throttle?); retrying in ${delay}s..." >&2
        sleep "$delay"
        attempt=$((attempt + 1))
        delay=$((delay * 2))
      done
    - docker tag "$SRC" "$DEST"
    - docker push "$DEST"

ci:build-integration-image:
  # Rebuild and push the custom ci-integration image used by web:integration.
  # Bakes Python 3 + libpq-dev + gcc + uvicorn + scheduler[dev] + api[dev]
  # dev-deps on top of the Playwright image so the integration job skips
  # the ~3min apt+pip cold install on every main run.
  #
  # Trigger: same shape as ci:build-api-image — Dockerfile / pyproject changes,
  # plus the weekly scheduled run. Validated on MR pipelines when the relevant
  # files change so a broken Dockerfile is caught before merge; web:integration
  # itself is main-only and pulls the existing registry tag in steady state.
  #
  # Builds FROM our registry mirror of the Playwright base via the
  # PLAYWRIGHT_BASE build-arg, so this job — which runs on every qualifying MR —
  # never pulls from the throttled MCR endpoint. `needs: ci:mirror-playwright-base`
  # guarantees the mirror tag exists before the FROM is resolved; that gate is a
  # no-op in steady state, so the dependency costs nothing once mirrored.
  stage: lint
  image: docker:27
  services:
    - docker:27-dind
  needs:
    - job: ci:mirror-playwright-base
      artifacts: false
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE: "$CI_REGISTRY_IMAGE/ci-integration:noble"
    PLAYWRIGHT_BASE: "$CI_REGISTRY_IMAGE/playwright-base:$PLAYWRIGHT_BASE_TAG"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - packages/scheduler/pyproject.toml
        - packages/api/pyproject.toml
        - .gitlab/ci-images/integration.Dockerfile
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/scheduler/pyproject.toml
        - packages/api/pyproject.toml
        - .gitlab/ci-images/integration.Dockerfile
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker pull "$IMAGE" || true
    - docker build
        --build-arg PLAYWRIGHT_BASE="$PLAYWRIGHT_BASE"
        --cache-from "$IMAGE"
        --tag "$IMAGE"
        --file .gitlab/ci-images/integration.Dockerfile
        .
    - docker push "$IMAGE"

scheduler:lint:
  extends: .scheduler
  stage: lint
  <<: *rules-scheduler
  script:
    - cd packages/scheduler
    - ruff check src/ tests/
    - ruff format --check src/ tests/

api:lint:
  stage: lint
  image: python:3.11-slim
  cache:
    <<: *api-cache
    policy: pull
  <<: *rules-api
  before_script:
    - pip install ruff --quiet
  script:
    - cd packages/api
    - ruff check src/ tests/
    - ruff format --check src/ tests/

web:lint:
  extends: .web
  stage: lint
  <<: *rules-web
  script:
    - npm run lint

wasm:lint:
  extends: .wasm
  stage: lint
  <<: *rules-wasm
  script:
    - cargo clippy --all-targets -- -D warnings

helm:lint:
  image:
    name: alpine/helm:3.14.0
    entrypoint: [""]
  stage: lint
  <<: *rules-helm
  script:
    - helm lint packages/helm/
    # Guard the bug class from #777: a `DJANGO_SETTINGS_MODULE` typo in the chart
    # (e.g. `settings.production` vs the real `settings.prod`) crash-loops every
    # fresh deploy yet passes `helm lint` silently. Verify every settings module
    # the chart names actually exists in packages/api. Dependency-free (no
    # `helm template`, which would require the subcharts to be built first).
    - |
      fail=0
      for mod in $(grep -rhoE 'trueppm_api\.settings\.[a-z_]+' packages/helm/ | sort -u); do
        f="packages/api/src/$(echo "$mod" | tr '.' '/').py"
        if [ ! -f "$f" ]; then
          echo "ERROR: chart references settings module '$mod' but $f does not exist"
          fail=1
        fi
      done
      [ "$fail" -eq 0 ] || exit 1

# ---------------------------------------------------------------------------
# ANALYZE — type-check, static analysis, migration/schema validation.
# Each job uses needs: to start as soon as its package's lint job passes,
# without waiting for other packages' lint jobs.
# ---------------------------------------------------------------------------

scheduler:type-check:
  extends: .scheduler
  stage: analyze
  # Two caches: the inherited pip cache (re-stated via the anchor, since a
  # list cache replaces the template's map rather than merging) plus the mypy
  # incremental cache. mypy --strict is cold-slow; persisting .mypy_cache
  # across pipelines turns most runs into incremental re-checks. Keyed on
  # pyproject.toml so a dependency/stub bump resets it cleanly.
  cache:
    - <<: *scheduler-cache
    - key:
        files:
          - packages/scheduler/pyproject.toml
        prefix: scheduler-mypy
      paths:
        - packages/scheduler/.mypy_cache/
  # ci:build-scheduler-image is optional — when deps haven't changed it
  # isn't in the pipeline and the job pulls the existing tag from the
  # registry. Same pattern repeated on every scheduler:* consumer that
  # overrides needs (GitLab replaces needs on extension).
  needs:
    - scheduler:lint
    - job: ci:build-scheduler-image
      optional: true
  <<: *rules-scheduler
  script:
    - cd packages/scheduler && mypy

api:type-check:
  extends: .api-no-db
  stage: analyze
  # Two caches: the inherited pip cache (re-stated via the anchor with its
  # pull policy, since a list cache replaces the template's map rather than
  # merging) plus the mypy incremental cache. mypy --strict is cold-slow;
  # persisting .mypy_cache across pipelines turns most runs into incremental
  # re-checks. Keyed on pyproject.toml so a dependency/stub bump resets it.
  cache:
    - <<: *api-cache
      policy: pull
    - key:
        files:
          - packages/api/pyproject.toml
        prefix: api-mypy
      paths:
        - packages/api/.mypy_cache/
  # ci:build-api-image is optional — when deps haven't changed it isn't in
  # the pipeline and the job pulls the already-published image from the
  # registry. Same pattern repeated on every job that uses the ci-api image.
  needs:
    - api:lint
    - job: ci:build-api-image
      optional: true
  <<: *rules-api
  script:
    - cd packages/api
    - mypy src/trueppm_api

api:migration-check:
  # makemigrations --check --dry-run compares model state to migration files.
  # No database connection is made; .api-no-db template is sufficient.
  #
  # Runs on every MR pipeline (no `changes:` filter) — kaizen #640 N5. The job
  # is ~36s and catches inter-MR migration drift that the per-MR `changes:`
  # filter misses (two MRs landing close together each pass migration-check on
  # their own diff, but their merged result fails on main).
  extends: .api-no-db
  stage: analyze
  needs:
    - job: api:lint
      optional: true
    - job: ci:build-api-image
      optional: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - cd packages/api
    - python manage.py makemigrations --check --dry-run

api:openapi-check:
  # drf-spectacular schema generation is pure view/serializer introspection;
  # no database queries are made. --validate checks for valid OpenAPI 3;
  # --fail-on-warn promotes warnings to errors.
  extends: .api-no-db
  stage: analyze
  needs:
    - api:lint
    - job: ci:build-api-image
      optional: true
  <<: *rules-api
  script:
    - cd packages/api
    - python manage.py spectacular --validate --file /dev/null

api:schema-drift:
  # Ensures docs/api/openapi.json stays in sync with the live DRF schema.
  # Fails the pipeline if a model/serializer/view change alters the public
  # surface without the committed artifact being regenerated.
  #
  # api:lint is optional because this job's changes: filter includes
  # docs/api/openapi.json — a docs-only branch (e.g. an openapi regen
  # alongside ADR commits) matches this job's rules without matching
  # api:lint's rules-api. needs:optional avoids the "needs job does
  # not exist in the pipeline" creation failure in that case.
  extends: .api-no-db
  stage: analyze
  needs:
    - job: api:lint
      optional: true
    - job: ci:build-api-image
      optional: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/api/**/*
        - packages/scheduler/**/*
        - docs/api/openapi.json
        - scripts/export-openapi.sh
        - .gitlab-ci.yml
  script:
    - ./scripts/export-openapi.sh --check

web:type-check:
  extends: .web
  stage: analyze
  needs: [web:lint]
  <<: *rules-web
  script:
    - npm run typecheck

wasm:build:
  # Verify the WASM crate compiles to wasm32. The pkg/ output is not passed
  # downstream — this validates the build is clean.
  extends: .wasm
  stage: analyze
  needs: [wasm:lint]
  <<: *rules-wasm
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl
    - rustup component add clippy
    - rustup target add wasm32-unknown-unknown
    # Install a pinned, checksum-verified wasm-pack release instead of piping the
    # unpinned upstream installer through `sh` (#904 supply-chain hardening — the
    # canonical OpenSSF Scorecard "Pinned-Dependencies" failure). Mirrors the
    # cargo-deny install in wasm:license-check; the sha256 is the published
    # v0.13.1 musl tarball. Bump version + hash together when upgrading.
    - |
      WASM_PACK_VERSION=0.13.1
      WASM_PACK_SHA256=c539d91ccab2591a7e975bcf82c82e1911b03335c80aa83d67ad25ed2ad06539
      WASM_PACK_TARBALL="wasm-pack-v${WASM_PACK_VERSION}-x86_64-unknown-linux-musl.tar.gz"
      curl -sSfL "https://github.com/rustwasm/wasm-pack/releases/download/v${WASM_PACK_VERSION}/${WASM_PACK_TARBALL}" -o /tmp/wasm-pack.tar.gz
      echo "${WASM_PACK_SHA256}  /tmp/wasm-pack.tar.gz" | sha256sum -c -
      tar xzf /tmp/wasm-pack.tar.gz -C /usr/local/bin --strip-components=1 "wasm-pack-v${WASM_PACK_VERSION}-x86_64-unknown-linux-musl/wasm-pack"
    - cd packages/wasm-scheduler
  script:
    - wasm-pack build --target web --release

web:build:
  # Builds the production bundle and publishes dist/ as an artifact so the
  # sharded web:e2e jobs can serve it via `vite preview` (webServer in
  # playwright.config.ts) without each shard rebuilding. web:test runs vitest
  # independently.
  extends: .web
  stage: analyze
  needs: [web:lint]
  <<: *rules-web
  script:
    - npm run build
  artifacts:
    paths:
      - packages/web/dist/
    expire_in: 1 day

security:bandit:scheduler:
  # Python static security analysis for the scheduler package.
  # Runs in analyze stage alongside type-check — static, no test results needed.
  # -ll = medium severity and above.
  stage: analyze
  needs: [scheduler:lint]
  image: python:3.11-slim
  <<: *rules-scheduler
  before_script:
    - pip install bandit --quiet
  script:
    - bandit -r packages/scheduler/src/ -ll
        --exclude packages/scheduler/src/trueppm_scheduler/__pycache__

security:bandit:api:
  # Python static security analysis for the API package.
  # Split from bandit:scheduler so each gates only on its own lint job —
  # a web-only branch no longer triggers a full Python security scan.
  stage: analyze
  needs: [api:lint]
  image: python:3.11-slim
  <<: *rules-api
  before_script:
    - pip install bandit --quiet
  script:
    - bandit -r packages/api/src/ -ll
        --exclude packages/api/src/trueppm_api/settings,packages/api/src/trueppm_api/apps/projects/migrations,packages/api/src/trueppm_api/apps/resources/migrations

# ---------------------------------------------------------------------------
# TEST — unit + integration tests.
# Each package starts as soon as its own analyze jobs pass, not when all
# packages' analyze jobs are done (DAG via needs:).
# ---------------------------------------------------------------------------

scheduler:test:
  extends: .scheduler
  stage: test
  needs:
    - scheduler:lint
    - scheduler:type-check
    - job: ci:build-scheduler-image
      optional: true
  <<: *rules-scheduler
  script:
    - cd packages/scheduler
    - pytest --cov=trueppm_scheduler --cov-report=term-missing --cov-report=xml --cov-fail-under=80
  coverage: '/TOTAL.*\s(\d+%)/'
  artifacts:
    paths:
      - packages/scheduler/coverage.xml
    expire_in: 7 days
    when: always

scheduler:bench:
  # Performance regression guard for the CPM engine.
  # Runs on every MR that touches packages/scheduler/ and on main.
  # Timing output is stored as an artifact so regressions can be spotted
  # by comparing successive runs in the GitLab UI.
  # The test itself hard-fails at 2s (catastrophic regression circuit-breaker);
  # the > 20% regression signal requires manual comparison of artifacts.
  extends: .scheduler
  stage: test
  needs:
    - scheduler:test
    - job: ci:build-scheduler-image
      optional: true
  <<: *rules-scheduler
  script:
    - cd packages/scheduler
    - pytest tests/test_bench.py -v --tb=short 2>&1 | tee bench-output.txt
  artifacts:
    paths:
      - packages/scheduler/bench-output.txt
    expire_in: 90 days

scheduler:notebooks:
  # Execute all scheduler notebooks to catch code drift and broken examples.
  # jupyter nbconvert --execute runs each cell in order; a cell that raises an
  # exception fails the job. matplotlib is optional — notebooks guard against
  # ImportError with a try/except so missing it is not a failure.
  extends: .scheduler
  stage: test
  needs:
    - scheduler:test
    - job: ci:build-scheduler-image
      optional: true
  <<: *rules-scheduler
  script:
    - cd packages/scheduler
    - pip install jupyter nbconvert
    - jupyter nbconvert --to notebook --execute --inplace notebooks/*.ipynb
  artifacts:
    paths:
      - packages/scheduler/notebooks/*.ipynb
    expire_in: 7 days

wasm:test:
  extends: .wasm
  stage: test
  needs: [wasm:lint, wasm:build]
  <<: *rules-wasm
  script:
    - cargo test --all-targets

wasm:conformance:
  # Cross-engine conformance: run the Python scheduler against the same shared
  # fixtures that the Rust tests use. If both pass, the engines agree.
  stage: test
  image: python:3.11-slim
  needs:
    - scheduler:lint
    # wasm:lint is optional: this job also fires on scheduler-only changes
    # (where wasm:lint is skipped). Without optional, GitLab fails the whole
    # pipeline with "needs job does not exist" the moment an MR touches
    # scheduler but not wasm-scheduler.
    - job: wasm:lint
      optional: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/wasm-scheduler/**/*
        - packages/scheduler/**/*
        - .gitlab-ci.yml
  cache:
    <<: *scheduler-cache
    policy: pull
  before_script:
    - pip install -e "packages/scheduler[dev]" --quiet
  script:
    - cd packages/scheduler
    - pytest tests/test_wasm_conformance.py -v

api:testdb-dump:
  # Run real migrations ONCE per pipeline and dump the resulting schema+data so
  # the api:test shards clone each pytest-xdist worker DB from it instead of
  # replaying ~147 migrations per worker (#688, follow-up to #680 sharding).
  # The dump preserves the ltree extension, the wbs_path GiST index, and the
  # data backfills that `--no-migrations` would skip. Runs in the lint stage,
  # overlapping lint/type-check. Since #1121 trimmed api:test's gates to data
  # deps only, api:test starts the moment this job's artifact is ready — so this
  # job IS the api:test start-gate. To keep that gate cheap, the migrate + dump
  # is cached on a migration-file fingerprint (#1122): on the ~70% of MRs that
  # touch no migration, the cached dump is reused and the migrate is skipped.
  extends: .api
  stage: lint
  <<: *rules-api
  cache:
    # Two caches as a list (a list cache replaces the template's map, so the
    # inherited pip cache is re-stated). The second entry persists the migrated
    # schema dump + its fingerprint across pipelines under a static, branch-
    # agnostic key, so a feature-branch run can reuse a dump built by a recent
    # main pipeline. Correctness never depends on cache contents — the in-script
    # fingerprint guard re-migrates on any drift (#1122). Bump -v1 to bust.
    - <<: *api-cache
      policy: pull
    - key: api-testdb-schema-v1
      paths:
        - testdb-schema.sql
        - .testdb-migrations.sha256
  script:
    # Reuse a cached schema dump when no migration changed (#1122). Fingerprint
    # every api migration file by content; if it matches the fingerprint saved
    # next to a cached dump, the schema is identical and we skip the ~150s
    # migrate + dump (and the #1039 cold-Postgres variance). The guard is
    # authoritative — a cache miss or any drift (added/edited/deleted migration)
    # falls through to a full migrate, so correctness never rests on the cache.
    - |
      MIG_FP=$(find packages/api/src -path '*/migrations/*.py' -not -name '__init__.py' \
        | sort | xargs sha256sum | sha256sum | awk '{print $1}')
      echo "migration fingerprint: $MIG_FP"
      if [ -f testdb-schema.sql ] && [ -f .testdb-migrations.sha256 ] \
         && [ "$(cat .testdb-migrations.sha256)" = "$MIG_FP" ]; then
        echo "migrations unchanged since cached dump — reusing it, skipping migrate+pg_dump"
        exit 0
      fi
      echo "migrations changed or no cached dump — running full migrate + dump"
    # Bootstrap fallback for a stale cached image. The ci-api image bakes
    # postgresql-client-16 (api.Dockerfile), but it ships under the mutable
    # :py3.11 tag, and runners here pull with if-not-present (they disallow
    # `always`) — so the very pipeline that first adds the client can land on a
    # runner still holding the prior image without it. Install at runtime only
    # when pg_dump is missing; once main rebuilds the image this is a no-op.
    # Mirrors the Dockerfile's PGDG install (#688).
    - &ensure-pg-client |
      if ! command -v pg_dump >/dev/null 2>&1; then
        echo "pg_dump missing — installing postgresql-client-16 (stale cached image)"
        apt-get update -qq
        apt-get install -y -qq --no-install-recommends curl ca-certificates gnupg
        install -d /usr/share/postgresql-common/pgdg
        curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
        echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt bookworm-pgdg main" > /etc/apt/sources.list.d/pgdg.list
        apt-get update -qq
        apt-get install -y -qq --no-install-recommends postgresql-client-16
      fi
    - cd packages/api
    # Wait for the Postgres service to accept connections before migrating —
    # on cold runner starts `migrate` stalls in the TCP connect phase and
    # inflates this job 30s→170s, dragging the api:test critical path (#1039).
    # Non-fatal: if Postgres still isn't up after 30s, migrate fails with its
    # own clearer error.
    - timeout 30 sh -c 'until pg_isready --dbname "$DATABASE_URL" >/dev/null 2>&1; do sleep 1; done' || echo "warning - postgres not ready after 30s, proceeding"
    - python manage.py migrate --no-input
    # --no-owner/--no-privileges keep the dump role-portable so it reloads
    # cleanly into the `migrated` template under the same CI role on the shards.
    - pg_dump --no-owner --no-privileges --dbname "$DATABASE_URL" --file "$CI_PROJECT_DIR/testdb-schema.sql"
    # Persist the fingerprint beside the dump so the next pipeline's guard can
    # validate the cache. Written at repo root to match the cache: paths above.
    - echo "$MIG_FP" > "$CI_PROJECT_DIR/.testdb-migrations.sha256"
  artifacts:
    paths:
      - testdb-schema.sql
    expire_in: 1 day
    when: always

api:test:
  extends: .api
  stage: test
  # Sharded across 4 runners with pytest-split; -n auto still fans each shard out
  # across that runner's 4 cores, and pytest-django gives every xdist worker its
  # own test DB (test_trueppm_test_gw0, _gw1, …) so isolation is preserved.
  # pytest-split reads the committed packages/api/.test_durations baseline and
  # rebalances the per-test timings into N groups at runtime, so the same
  # baseline works for any shard count — bumping 2→4 (#1120) needs no regen,
  # though the api:test-durations job (manual + scheduled, #687) still refreshes
  # it. If the baseline is ever missing, pytest-split falls back to an even
  # test-count split. Each shard emits a partial coverage data file
  # (.coverage.<index>); api:coverage combines them into coverage.xml for the
  # diff-coverage gate and the package soft floor. Mirrors the web:e2e shard →
  # web:e2e:report stitch pattern.
  parallel: 4
  # needs lists only api:test's true data dependencies (#1121): the lint gate
  # (cheap fail-fast, keeps a full sharded run off obviously-broken code) and
  # the testdb-dump artifact it clones the template DB from. type-check,
  # migration-check, and openapi-check are independent quality gates — tests
  # consume none of their output — so they no longer block test start; they run
  # in parallel and still gate the MR merge. Trade-off: a run can proceed while
  # one of those gates is failing (rare), spending runner minutes we'd
  # previously have short-circuited. Worth it — they're the analyze-stage long
  # poles, and decoupling lets the 4 shards start as soon as testdb-dump lands.
  needs:
    - api:lint
    - job: api:testdb-dump
      artifacts: true
    - job: ci:build-api-image
      optional: true
  <<: *rules-api
  variables:
    # Distinct data file per shard so api:coverage's combine doesn't clash.
    # pytest-cov honors COVERAGE_FILE for the final xdist-combined data file.
    COVERAGE_FILE: ".coverage.$CI_NODE_INDEX"
    # Activates the test-only TEST.TEMPLATE branch in settings.dev (#688) so
    # pytest-django clones each worker DB from `migrated` instead of replaying
    # migrations. Built from the api:testdb-dump artifact in before_script.
    TRUEPPM_TEST_DB_TEMPLATE: migrated
  before_script:
    # Same stale-image bootstrap fallback as api:testdb-dump — installs psql/
    # pg_dump when the cached image predates them; a no-op once baked (#688).
    - *ensure-pg-client
    # before_script OVERRIDES (does not merge with) .api's, so the editable
    # re-link is repeated here.
    - pip install -e "packages/scheduler[dev]" --quiet
    - pip install -e "packages/api[dev]" --quiet
    # Build the `migrated` template DB from the dumped schema (#688). Each
    # parallel shard has its own postgres service, so each builds its own copy;
    # the dump already contains CREATE EXTENSION ltree + the GiST index + data.
    - psql "postgres://trueppm:trueppm@postgres/trueppm_test" -c "CREATE DATABASE migrated;"
    - psql "postgres://trueppm:trueppm@postgres/migrated" -f "$CI_PROJECT_DIR/testdb-schema.sql"
  script:
    - cd packages/api
    - python -m pytest tests/ --tb=short -q -n auto
        --splits "$CI_NODE_TOTAL" --group "$CI_NODE_INDEX"
        --cov=trueppm_api --cov-report=
  artifacts:
    paths:
      - packages/api/.coverage.*
    expire_in: 1 day
    when: always

api:coverage:
  # Combines the per-shard coverage data from api:test into a single coverage.xml
  # for api:diff-coverage (the primary tests gate) and enforces the package-total
  # soft floor against legacy regressions. Runs in the same ci-api image the
  # shards used, so the coverage data format matches.
  extends: .api-no-db
  stage: test
  needs:
    - job: api:test
      artifacts: true
    - job: ci:build-api-image
      optional: true
  <<: *rules-api
  script:
    - cd packages/api
    - coverage combine
    - coverage xml
    - coverage report --fail-under=80
  coverage: '/TOTAL.*\s(\d+%)/'
  artifacts:
    paths:
      - packages/api/coverage.xml
    expire_in: 7 days
    when: always

api:test-durations:
  # Generates packages/api/.test_durations — the per-test wall-time baseline
  # pytest-split uses to balance the two api:test shards (#687, follow-up to
  # the #680 sharding). Without this file pytest-split falls back to an even
  # test-COUNT split, which unbalances the shards whenever a few slow tests
  # dominate one group and erases the sharding win.
  #
  # Runs serially and WITHOUT coverage so the recorded numbers are clean
  # per-test wall-times: coverage tracing and xdist contention both skew them,
  # and pytest-split only needs the relative ordering to pack the groups.
  # --clean-durations prunes entries for tests that no longer exist so the
  # committed baseline doesn't accumulate dead weight across refreshes.
  #
  # Trigger:
  #   - scheduled pipelines refresh the baseline as the suite grows;
  #   - manual on any MR or main to regenerate on demand.
  # This job does NOT commit its result — it publishes .test_durations as an
  # artifact. Refresh cadence: download the artifact from the latest scheduled
  # run and commit it to packages/api/.test_durations (a periodic chore, or
  # whenever shard balance visibly drifts). allow_failure keeps a slow or
  # flaky full-suite run from ever blocking an MR.
  extends: .api
  stage: test
  needs:
    - job: ci:build-api-image
      optional: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
      allow_failure: true
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: true
  script:
    - cd packages/api
    - python -m pytest tests/ -q --store-durations --clean-durations
  artifacts:
    paths:
      - packages/api/.test_durations
    expire_in: 30 days
    when: always

web:test:
  extends: .web
  stage: test
  # Sharded across 2 runners (vitest splits by test file). The configured
  # singleFork pool keeps each shard's jsdom heap bounded, and fewer files per
  # shard eases the OOM pressure that forced singleFork in the first place. Each
  # shard writes partial istanbul coverage (coverage-final.json) to
  # coverage-<index>/; web:coverage stitches them for the diff-coverage gate. The
  # `--` forwards the shard + output-dir flags to vitest while preserving the dir
  # filter and coverage config from test:coverage.
  needs: [web:lint, web:type-check, web:build]
  parallel: 2
  <<: *rules-web
  script:
    - npm run test:coverage --
        --shard="$CI_NODE_INDEX/$CI_NODE_TOTAL"
        --coverage.reportsDirectory="coverage-$CI_NODE_INDEX"
  artifacts:
    paths:
      - packages/web/coverage-*/coverage-final.json
    expire_in: 1 day
    when: always

web:coverage:
  # Stitches the per-shard istanbul coverage from web:test into a single
  # coverage/lcov.info for web:diff-coverage (the primary tests gate) and enforces
  # the package-total line floor. Runs in the cached node image (.web) and merges
  # the coverage maps with scripts/merge-coverage.mjs — no GNU lcov install. The
  # old python:3.11-slim job had to `apt-get install lcov`, which drags in
  # perl + binutils for ~5 min while the merge itself took <1s; the map-level
  # merge here is <1s and also sidesteps the istanbul duplicate-function-name
  # inconsistency that forced --ignore-errors on the lcov text-merge path.
  extends: .web
  stage: test
  needs:
    - job: web:test
      artifacts: true
  <<: *rules-web
  variables:
    # Package-total line floor against legacy regressions, enforced on the merged
    # result (vitest can't — no single shard sees it). Mirrors the api:coverage
    # --fail-under=80 soft floor. The primary gate is web:diff-coverage.
    WEB_COVERAGE_MIN: "75"
  script:
    - node scripts/merge-coverage.mjs
  coverage: '/line coverage ([\d.]+)%/'
  artifacts:
    paths:
      - packages/web/coverage/lcov.info
    expire_in: 7 days
    when: always

# ---------------------------------------------------------------------------
# DIFF COVERAGE — gate on lines changed vs the MR target branch.
# Enforces ≥ $COVERAGE_DIFF_MIN% line coverage on new/changed code, regardless
# of whether the package total moves. This is the primary "new feature must
# have tests" gate; the package-total --cov-fail-under flag stays as a soft
# floor against legacy regressions.
#
# Bump COVERAGE_DIFF_MIN to 90 post-beta. MR-only — there's no diff to
# measure on main.
# ---------------------------------------------------------------------------

.diff-coverage:
  stage: test
  variables:
    GIT_DEPTH: "0"
    COVERAGE_DIFF_MIN: "80"

scheduler:diff-coverage:
  extends:
    - .scheduler
    - .diff-coverage
  needs:
    - job: scheduler:test
      artifacts: true
    - job: ci:build-scheduler-image
      optional: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/scheduler/**/*
        - .gitlab-ci.yml
  script:
    # python:3.11-slim ships without git; required by `git fetch` and by
    # diff-cover internally (it shells out to `git diff`).
    - apt-get update -qq && apt-get install -y -qq --no-install-recommends git
    - git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
    - cd packages/scheduler
    - diff-cover coverage.xml
        --compare-branch="origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
        --fail-under="$COVERAGE_DIFF_MIN"

api:diff-coverage:
  extends: .diff-coverage
  image: python:3.11-slim
  needs:
    - job: api:coverage
      artifacts: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/api/**/*
        - .gitlab-ci.yml
  cache:
    <<: *api-cache
    policy: pull
  before_script:
    # python:3.11-slim ships without git; required by `git fetch` and by
    # diff-cover internally (it shells out to `git diff`).
    - apt-get update -qq && apt-get install -y -qq --no-install-recommends git
    - pip install diff-cover --quiet
  script:
    - git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
    - cd packages/api
    - diff-cover coverage.xml
        --compare-branch="origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
        --fail-under="$COVERAGE_DIFF_MIN"

web:diff-coverage:
  extends: .diff-coverage
  # Use a python image (not node) — diff-cover is a pip tool but reads lcov
  # natively. Avoids npm install just to run diff-cover.
  image: python:3.11-slim
  needs:
    - job: web:coverage
      artifacts: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/web/**/*
        - .gitlab-ci.yml
  before_script:
    # python:3.11-slim ships without git; required by `git fetch` and by
    # diff-cover internally (it shells out to `git diff`).
    - apt-get update -qq && apt-get install -y -qq --no-install-recommends git
    - pip install diff-cover --quiet
  script:
    - git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
    - cd packages/web
    - diff-cover coverage/lcov.info
        --compare-branch="origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
        --fail-under="$COVERAGE_DIFF_MIN"

web:e2e:
  # End-to-end Playwright tests against the production build, sharded across
  # 2 runners. One shard per runner: the shards run in a single parallel wave
  # (wall-clock ≈ total/2) and cannot co-locate, so the per-shard `workers` in
  # playwright.config.ts stays safe. `fullyParallel`
  # balances the split by test rather than by file, so uneven specs still
  # divide evenly.
  #
  # Consumes dist/ from web:build instead of rebuilding per shard. Emits a blob
  # report per shard; web:e2e:report stitches them into a single HTML report.
  stage: test
  image: mcr.microsoft.com/playwright:v1.58.2-noble
  needs: [web:lint, web:type-check, web:build]
  parallel: 2
  <<: *rules-web
  cache:
    <<: *web-cache
    policy: pull
  before_script:
    - *retry-fn
    - cd packages/web
    - retry npm ci --prefer-offline --quiet
  script:
    - npx playwright test --shard="$CI_NODE_INDEX/$CI_NODE_TOTAL" --reporter=blob
  artifacts:
    when: always
    paths:
      - packages/web/blob-report/
    expire_in: 1 day

web:e2e:report:
  # Stitches the per-shard blob reports into one HTML report. Runs even when a
  # shard fails (when: always) — that is exactly when the report matters. Pulls
  # the blob artifacts from all parallel web:e2e instances via needs.
  stage: test
  image: mcr.microsoft.com/playwright:v1.58.2-noble
  needs: ["web:e2e"]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/web/**/*
        - .gitlab-ci.yml
      when: always
  cache:
    <<: *web-cache
    policy: pull
  before_script:
    - *retry-fn
    - cd packages/web
    - retry npm ci --prefer-offline --quiet
  script:
    - npx playwright merge-reports --reporter=html ./blob-report
  artifacts:
    when: always
    paths:
      - packages/web/playwright-report/
    expire_in: 7 days

web:integration:
  # Full-stack integration tests: real Django + PostgreSQL + Valkey + Vite dev
  # proxy. Covers the three scenarios the mocked web:e2e job cannot exercise:
  #   1. Auth token exchange via the real /api/v1/auth/token/ endpoint
  #   2. Task CRUD write contract against the live database
  #   3. WebSocket broadcast — mutation in one context, assertion in another
  #
  # Runs after every merge to verify end-to-end stack health, and on MRs that
  # touch auth or real-time surfaces (see rules below). The mocked web:e2e job
  # cannot see this class of bug: this is the only job that exercises the full
  # stack across a real page reload, where the in-memory access token, the
  # cookie-based refresh, and WebSocket auth interact (#911 — a reload-only auth
  # regression that slipped through because this job was previously main-only).
  #
  # Uses the custom ci-integration image (built by `ci:build-integration-image`)
  # which pre-bakes Python 3 + libpq-dev + gcc + uvicorn + scheduler[dev] +
  # api[dev] dev-deps on top of the Playwright base. The runtime `pip install -e`
  # only re-links the editable packages — no apt-get, no wheel downloads.
  # Mirrors the #640 ci-api / #651 ci-scheduler pattern.
  stage: test
  image: $CI_REGISTRY_IMAGE/ci-integration:noble
  needs:
    - job: ci:build-integration-image
      optional: true
  services:
    - name: postgres:16-alpine
      alias: postgres
    - name: valkey/valkey:8-alpine
      alias: valkey
  variables:
    DJANGO_SETTINGS_MODULE: trueppm_api.settings.dev
    TRUEPPM_ALLOW_DEV_SETTINGS: "1"
    DATABASE_URL: "postgres://trueppm:trueppm@postgres/trueppm_test"
    REDIS_URL: "redis://valkey:6379"
    # Non-secret CI key — dev settings enforce ALLOWED_HOSTS=* + AllowAny guard
    SECRET_KEY: "ci-integration-secret-not-for-production"
    # Vite proxy target: routes /api and /ws/v1 to the local Django process.
    API_URL: "http://127.0.0.1:8000"
    INTEGRATION_USER_EMAIL: "ci@trueppm.test"
    INTEGRATION_USER_PASSWORD: "ci-integration-pw"
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    # Block MRs that change an auth or real-time surface — the interacting
    # in-memory-token / cookie-refresh / WebSocket-auth paths only break under a
    # real reload against the live stack, which web:e2e (mocked) cannot reach.
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/web/src/api/client.ts
        - packages/web/src/stores/authStore.ts
        - packages/web/src/features/auth/**/*
        - packages/web/src/hooks/useProjectWebSocket.ts
        - packages/web/src/hooks/useWorkshopSocket.ts
        - packages/web/e2e/integration/**/*
        - packages/api/src/trueppm_api/core/auth_views.py
        - packages/api/src/trueppm_api/apps/sync/consumers.py
        - packages/api/src/trueppm_api/apps/workshops/consumers.py
  cache:
    # npm content cache (not node_modules — `npm ci` wipes it), so the runtime
    # `npm ci --prefer-offline` rebuilds with zero network on a warm cache (#1212).
    - key:
        files:
          - packages/web/package-lock.json
        prefix: web-npm-cacache
      paths:
        - .cache/npm/
    - key:
        files:
          - packages/api/pyproject.toml
        prefix: api-pip
      paths:
        - .cache/pip/
      policy: pull
  before_script:
    - *retry-fn
    # Image has Python 3 + uvicorn + scheduler[dev] + api[dev] dev-deps resident
    # under /opt/api-venv (on PATH). These installs are fast editable re-links
    # against the checked-out source. `retry` guards the rare case where pip
    # still reaches the index (PIP_RETRIES also applies); the editable re-link
    # itself is offline.
    - retry pip install -e "packages/scheduler[dev]" --quiet
    - retry pip install -e "packages/api[dev]" --quiet
    # Migrate and seed integration fixtures.
    - cd packages/api
    - python manage.py migrate --noinput
    - python manage.py seed_integration_fixtures
    # Start the Django ASGI server in the background.
    - >
      PYTHONPATH=src uvicorn trueppm_api.asgi:application
      --host 127.0.0.1 --port 8000 &
    - cd ../..
    # Wait up to 30 s for Django to accept connections.
    - >
      timeout 30 sh -c
      'until curl -sf http://127.0.0.1:8000/api/v1/health/ > /dev/null;
       do sleep 1; done'
    # Install web dependencies — the step that ECONNRESET-failed in #1212.
    - cd packages/web && retry npm ci --prefer-offline --quiet && cd ../..
  script:
    - cd packages/web
    - npx playwright test e2e/integration/ --config playwright.integration.config.ts --reporter=line
  artifacts:
    when: on_failure
    paths:
      - packages/web/playwright-report/
    expire_in: 7 days

website:build:
  # Verify the Starlight documentation site builds cleanly.
  # Catches broken links, invalid frontmatter, and build errors early.
  extends: .website
  stage: test
  <<: *rules-website
  script:
    - npm run build
  artifacts:
    paths:
      - packages/website/dist/
    expire_in: 1 day

# ---------------------------------------------------------------------------
# DEPLOY — GitLab Pages for documentation.
#
# - Release tags (v*): auto-deploy (docs always ship with a release)
# - Main branch: manual deploy for "next" (unreleased) docs
# ---------------------------------------------------------------------------

pages:
  # GitLab Pages requires the job name to be "pages" and artifacts in public/.
  extends: .website
  stage: deploy
  needs: ["website:build"]
  rules:
    # Auto-deploy on release tags
    - if: '$CI_COMMIT_TAG =~ /^v\d+/'
      when: on_success
    # Manual deploy from main (for "next" docs)
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: true
  script:
    - npm run build
    # GitLab Pages serves from public/ at the repo root
    - mkdir -p ../../public
    - cp -r dist/* ../../public/
  artifacts:
    paths:
      - public/

# ---------------------------------------------------------------------------
# SECURITY — CVE scans + license audit. MR + main only.
#
# pip-audit and the license:check:* jobs use no needs: and rely on stage
# ordering. This avoids blocked-job cascades on single-package MRs: if only the API
# changed, web:test is skipped; a needs: [api:test, web:test] would then
# skip security too, silently dropping the Python CVE scan.
# ---------------------------------------------------------------------------

security:pip-audit:
  # CVE scan for all installed Python dependencies (scheduler + API).
  #
  # Uses the ci-api image (kaizen #651 follow-up to #640) so the apt-get
  # install of libpq-dev/gcc and the cold pip install of the scheduler +
  # api dev-dep wheels is no longer paid per run. Mirrors the license:check:py
  # migration in #640. Saves ~3min off this job on every pipeline.
  stage: security
  image: $CI_REGISTRY_IMAGE/ci-api:py3.11
  needs:
    - job: ci:build-api-image
      optional: true
  cache:
    <<: *api-cache
    policy: pull
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/scheduler/**/*
        - packages/api/**/*
        - .gitlab-ci.yml
  before_script:
    # Upgrade pip and wheel first so the audit does not flag CVEs in the
    # base-image versions of the build tools themselves.
    - pip install --upgrade pip wheel --quiet
    - pip install pip-audit --quiet
    # Image already has scheduler[dev] + api[dev] dev-dep wheels resident;
    # these installs are fast editable re-links against the checked-out source.
    - pip install -e "packages/scheduler[dev]" --quiet
    - pip install -e packages/api --quiet
  script:
    # CVE-2026-4539: local-access-only ReDoS in pygments AdlLexer (CVSS low/medium).
    # No fix version exists as of 2026-03-25 — pygments 2.19.2 is the latest release.
    # Ignored explicitly so any new HIGH/CRITICAL CVE still blocks the pipeline.
    # Remove this ignore once a patched pygments version is released.
    #
    # CVE-2026-3219: pip 26.0.1 mishandles concatenated tar+ZIP archives as ZIP.
    # CVSS low — only affects install-time artifact parsing, not runtime behavior.
    # No fix version available as of 2026-04-25. Remove once pip ships a patched release.
    #
    # PYSEC-2025-183: pyjwt "weak encryption" — disputed by the upstream supplier
    # (key length is chosen by the caller; pyjwt is a library, not a policy engine).
    # Transitive via djangorestframework-simplejwt. No fix version exists as of 2026-05-20.
    # We sign with HS256 over a long random SECRET_KEY, so the disputed weakness does
    # not apply. Remove once pyjwt either rescinds the advisory or ships a hardened release.
    - pip-audit --progress-spinner=off --desc on --ignore-vuln CVE-2026-4539 --ignore-vuln CVE-2026-3219 --ignore-vuln PYSEC-2025-183

security:pip-audit:scheduler:
  # Standalone CVE scan for the PUBLISHED library's dependency set only (#935).
  #
  # trueppm-scheduler ships to PyPI (Apache 2.0) with a tiny runtime surface
  # (networkx + numpy). The combined security:pip-audit: above installs the api
  # alongside it and audits both against one shared ignore-list, so an api-only
  # suppression silences the same CVE for the scheduler too. This job gives
  # external consumers and our release gate a clean, uncontaminated answer to
  # "is the published library's dependency set clean?" with its OWN ignore-list.
  # The combined job is kept as-is so api+scheduler coverage isn't lost.
  extends: .scheduler
  stage: security
  <<: *rules-scheduler
  cache:
    <<: *scheduler-cache
    policy: pull
  before_script:
    # Upgrade pip/wheel so the audit doesn't flag the base-image build tools,
    # then add pip-audit. We override .scheduler's before_script, so re-link
    # the resident scheduler[dev] wheels here too.
    - pip install --upgrade pip wheel --quiet
    - pip install pip-audit --quiet
    - pip install -e "packages/scheduler[dev]" --quiet
  script:
    # Scheduler-scoped ignore-list — INDEPENDENT of the api's. Only CVEs whose
    # package is actually present in the scheduler[dev] environment belong here;
    # every entry must cite the CVE and why it can't be remediated.
    #
    # CVE-2026-3219: pip itself mishandles concatenated tar+ZIP archives as ZIP.
    # Environmental (present in every Python env), install-time only, no fix
    # release as of 2026-04-25. Remove once pip ships a patched release.
    #
    # CVE-2026-4539: local-access-only ReDoS in pygments' AdlLexer. Pulled in as
    # DEV tooling only (diff-cover → pygments), not a runtime dependency of the
    # published wheel. No fix as of 2026-03-25. Remove when pygments patches.
    #
    # NOTE: the api's PYSEC-2025-183 (pyjwt, via djangorestframework-simplejwt)
    # is deliberately NOT inherited — pyjwt is not in the scheduler environment.
    # That uninherited suppression is exactly the bleed this split removes.
    - pip-audit --progress-spinner=off --desc on --ignore-vuln CVE-2026-3219 --ignore-vuln CVE-2026-4539

scheduler:sbom:
  # Generate + validate a CycloneDX SBOM for the PUBLISHED trueppm-scheduler
  # dependency set so PyPI consumers can verify transparent sources (#936).
  #
  # allow_failure during the 0.3 shake-out: this job bakes the path on MRs/main
  # without ever blocking, then the blocking copy in scheduler:publish: takes
  # over before scheduler-v0.3.0b1 is cut.
  #
  # cyclonedx-bom is pinned + resident in the ci-scheduler image
  # (.gitlab/ci-images/scheduler.Dockerfile), but the image is published under
  # the mutable :py3.11 tag and our runners only permit the if-not-present pull
  # policy, so a runner holding a pre-rebuild :py3.11 runs without cyclonedx-py
  # ("command not found") on the pipeline that first adds the tool. The
  # before_script install (mirroring scheduler:publish, which runs on a vanilla
  # base) is a fast no-op when the resident copy is present and supplies the
  # tool when the cached image is stale — making the job robust to image churn.
  #
  # The SBOM describes the RUNTIME closure only (networkx + numpy), not dev
  # tooling, so it is generated from a fresh runtime-only venv rather than the
  # image's scheduler[dev] environment. cyclonedx-py points at that venv's
  # interpreter, keeping the tool's own deps out of the SBOM. Switch to locked
  # generation once the scheduler ships a committed uv.lock (TODO(#1153)).
  extends: .scheduler
  stage: security
  <<: *rules-scheduler
  allow_failure: true
  cache:
    <<: *scheduler-cache
    policy: pull
  before_script:
    - pip install --quiet cyclonedx-bom==7.3.0
  script:
    - python -m venv /tmp/sbom-venv
    - /tmp/sbom-venv/bin/pip install --quiet ./packages/scheduler
    - cyclonedx-py environment /tmp/sbom-venv/bin/python
        --validate
        --output-format JSON
        --output-reproducible
        --sv 1.6
        -o packages/scheduler/sbom.cdx.json
    - echo "SBOM generated + validated:" && head -c 400 packages/scheduler/sbom.cdx.json
  artifacts:
    paths:
      - packages/scheduler/sbom.cdx.json
    expire_in: 30 days

security:osv:
  # Unified SCA across the committed lockfiles using the OSV database:
  #   - npm:  packages/web, packages/website
  #   - Cargo: packages/wasm-scheduler
  # Replaces the per-package npm-audit jobs (former web:security + website:security)
  # and adds Rust coverage that nothing scanned before. Python (api + scheduler)
  # stays on security:pip-audit until each has a committed resolved lockfile —
  # OSV can only scan a lockfile, and both currently ship only pyproject.toml
  # (tracked in #1153).
  #
  # OSV-Scanner exits non-zero on any non-ignored advisory (it has no
  # --audit-level threshold). Not-yet-fixable or sub-HIGH advisories are
  # suppressed via per-directory osv-scanner.toml files that each carry a
  # `reason` and an `ignoreUntil` expiry, so suppressions stay documented and
  # self-expire rather than rotting silently (see packages/website/osv-scanner.toml,
  # which defers the astro/esbuild/yaml advisories to the astro 6 bump in #1152).
  # This is a stricter, more honest posture than the prior --audit-level=high
  # blanket: the surgical, expiring ignore is the control npm audit lacked.
  #
  # Pinned binary download (the official image is distroless / shell-less, which
  # GitLab's script runner can't use); the linux build is a static Go binary.
  stage: security
  image: alpine:3.20
  needs: []
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/web/package-lock.json
        - packages/website/package-lock.json
        - packages/wasm-scheduler/Cargo.lock
        - "**/osv-scanner.toml"
        - .gitlab-ci.yml
  before_script:
    - apk add --no-cache wget
    - wget -q -O /usr/local/bin/osv-scanner "https://github.com/google/osv-scanner/releases/download/v2.3.8/osv-scanner_linux_amd64"
    - chmod +x /usr/local/bin/osv-scanner
  script:
    # Per-directory osv-scanner.toml files are auto-discovered next to each
    # lockfile (do NOT pass --config, which would force a single global file and
    # break the per-package scoping that keeps a web regression from being masked
    # by a website ignore).
    - osv-scanner scan source
        -L packages/web/package-lock.json
        -L packages/website/package-lock.json
        -L packages/wasm-scheduler/Cargo.lock

security:trivy:config:
  # IaC misconfiguration scan (Dockerfiles + Helm chart) via Trivy. Complements
  # security:osv (which covers dependency CVEs): this catches container/k8s
  # hardening regressions — missing non-root USER, readOnlyRootFilesystem,
  # dropped capabilities, etc. Gates on HIGH/CRITICAL.
  #
  # Justified, scoped suppressions live in .trivyignore.yaml (currently the
  # intentional readOnlyRootFilesystem omission on the bundled dev/demo
  # postgres + valkey sub-charts). Image-layer CVE scanning runs at release time
  # in the publish jobs (trivy image before push).
  stage: security
  # alpine + pinned binary download via the official install script. Avoids
  # depending on the trivy container image's tag scheme and matches the install
  # used by the trivy image scan in the publish jobs.
  image: alpine:3.20
  needs: []
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/**/Dockerfile
        - packages/helm/**/*
        - .trivyignore.yaml
        - .gitlab-ci.yml
  variables:
    TRIVY_NO_PROGRESS: "true"
    TRIVY_CACHE_DIR: ".trivycache/"
  cache:
    key: trivy-db
    paths:
      - .trivycache/
  before_script:
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.71.0
  script:
    - trivy config --severity HIGH,CRITICAL --exit-code 1 --ignorefile .trivyignore.yaml --skip-dirs '**/node_modules' packages/

security:semgrep:
  # SAST for the application source: JS/TS/React (web) + Python/Django
  # (api, scheduler). Complements bandit (Python-only) and the SCA scanners
  # (security:osv) / IaC scanner (security:trivy:config).
  #
  # Gates on ERROR severity (high-confidence security findings) — currently
  # clean. WARNING-level best-practice findings are tracked for triage in #1154;
  # once cleared, drop --severity ERROR to harden the gate to WARNING too.
  #
  # Rules are pulled from the Semgrep registry (p/ packs); no Semgrep AppSec
  # Platform account or token is used — this is a self-contained, local-rules run.
  stage: security
  image:
    name: semgrep/semgrep:1.166.0
    entrypoint: [""]
  needs: []
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/web/src/**/*
        - packages/api/src/**/*
        - packages/scheduler/src/**/*
        - .gitlab-ci.yml
  variables:
    SEMGREP_SEND_METRICS: "off"
  script:
    - semgrep scan
        --config p/default --config p/django --config p/react
        --severity ERROR --error --metrics off
        --exclude 'node_modules' --exclude 'dist'
        --exclude '*.test.ts' --exclude '*.test.tsx' --exclude 'e2e' --exclude 'tests'
        packages/web/src packages/api/src packages/scheduler/src

renovate:
  # Self-hosted Renovate runner (the #1153 rollout, step 4). Opens grouped
  # dependency-update MRs so transitives never go stale enough to become a CVE
  # scramble (the root cause of #1152). Behaviour is configured in renovate.json
  # (no auto-merge — project policy; major bumps are opt-in via the dashboard).
  #
  # ONE-TIME SETUP (a maintainer must do this — the runner stays dormant until):
  #   1. Create a GitLab access token (project or group) with `api` +
  #      `write_repository` scope. Add it as a MASKED CI/CD variable RENOVATE_TOKEN.
  #   2. Create a Pipeline Schedule (Settings -> CI/CD -> Pipeline schedules):
  #      daily cron, with a variable RENOVATE = "true". renovate.json restricts
  #      actual PR creation to Monday mornings, so a daily run is cheap.
  #   3. RECOMMENDED isolation: point the schedule at a dedicated `renovate-bot`
  #      branch (created off main). Because every other job is gated on
  #      `branch == main`, only this job runs there — the schedule won't spin up
  #      a full main pipeline. (A schedule on main also works but runs everything.)
  stage: security
  image: renovate/renovate:43
  needs: []
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $RENOVATE == "true"'
  variables:
    RENOVATE_PLATFORM: gitlab
    RENOVATE_ENDPOINT: "${CI_API_V4_URL}"
    RENOVATE_TOKEN: "${RENOVATE_TOKEN}"
    RENOVATE_AUTODISCOVER: "false"
    RENOVATE_REPOSITORIES: "${CI_PROJECT_PATH}"
    LOG_LEVEL: "info"
  script:
    - renovate

license:check:py:
  # Verify no copyleft-licensed Python dependency has been introduced.
  # LGPL is permitted (library-linking exemption applies).
  #
  # Split from a former single license:check job (kaizen): mixing Python +
  # Node in one container forced a per-run `apt-get install nodejs npm` onto
  # the python-slim ci-api image (network-bound, the dominant cost) and made
  # the two halves run serially. Splitting drops the apt install entirely,
  # runs the halves in parallel, and scopes each rule to its own manifests so
  # a web-only dep bump no longer pays the Python re-link and vice versa.
  # Mirrors the existing pip-audit (ci-api) / OSV-Scanner (node+cargo) split.
  #
  # Kaizen #640 N1: `changes:` is dep manifests only — license composition
  # only changes when manifests/lock files do; main + scheduled runs catch
  # transitive drift that a lock-file refresh might miss.
  stage: security
  image: $CI_REGISTRY_IMAGE/ci-api:py3.11
  needs:
    - job: ci:build-api-image
      optional: true
  cache:
    <<: *api-cache
    policy: pull
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/scheduler/pyproject.toml
        - packages/api/pyproject.toml
        - .gitlab-ci.yml
  before_script:
    # Image already has scheduler[dev] + api[dev] dev-dep wheels resident;
    # these installs are fast editable re-links against the checked-out source.
    - pip install pip-licenses --quiet
    - pip install -e "packages/scheduler[dev]" --quiet
    - pip install -e packages/api --quiet
  script:
    - pip-licenses --order=license --format=plain-vertical
    - >-
      pip-licenses
      --fail-on="GNU General Public License v2 (GPLv2);
                 GNU General Public License v3 (GPLv3);
                 GNU Affero General Public License v3 (AGPLv3)"

license:check:web:
  # Verify no copyleft-licensed npm dependency has been introduced.
  # node:20-alpine already ships node, so there is no apt install to pay.
  # See license:check:py above for why this was split out.
  stage: security
  image: node:20-alpine
  cache:
    <<: *web-cache
    policy: pull
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/web/package.json
        - packages/web/package-lock.json
        - .gitlab-ci.yml
  before_script:
    - *retry-fn
    - cd packages/web
    # npm ci is deterministic against the lockfile and faster than npm install.
    # --omit=dev installs only the production dependency subset: a license audit
    # of `--production` deps never needs the ~600 dev-tool packages, so skipping
    # them shrinks both the install and the tree license-checker has to walk.
    # --prefer-offline resolves from the pulled web-npm cache.
    - retry npm ci --omit=dev --prefer-offline --quiet
  script:
    # --onlyAllow covers --failOn implicitly: any license not in the list fails.
    # @trueppm/web declares license "Apache-2.0" in package.json and is audited
    # like any other package. It must NOT be "private": true — license-checker
    # force-reports every private package as UNLICENSED (lib/index.js), which the
    # allow-list then rejects. Dropping `private` lets its real license show.
    - npx license-checker --production
        --onlyAllow "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;CC0-1.0;CC-BY-3.0;CC-BY-4.0;Python-2.0;Unlicense;WTFPL;BlueOak-1.0.0"

wasm:license-check:
  # Verify no copyleft-licensed Rust dependency has been introduced, and that no
  # crate carries an unignored RustSec advisory or has been yanked.
  # Uses cargo-deny to check crate licenses + advisories against deny.toml.
  extends: .wasm
  stage: security
  needs: [wasm:test]
  <<: *rules-wasm
  before_script:
    # git is required by the advisories check: cargo-deny clones the RustSec
    # advisory DB (https://github.com/RustSec/advisory-db) via git on first run.
    # The licenses-only check never fetched it, which is why curl alone sufficed.
    - apt-get update -qq && apt-get install -y -qq curl git
    # cargo-deny 0.19.x is required for the advisories check: 0.18.3 cannot parse
    # CVSS 4.0 entries in the live RustSec DB and aborts on DB load (the licenses
    # check alone was unaffected, which is why the older pin sufficed before).
    - curl -sSfL https://github.com/EmbarkStudios/cargo-deny/releases/download/0.19.9/cargo-deny-0.19.9-x86_64-unknown-linux-musl.tar.gz
        | tar xz -C /usr/local/bin --strip-components=1 cargo-deny-0.19.9-x86_64-unknown-linux-musl/cargo-deny
    - cd packages/wasm-scheduler
  script:
    - cargo deny check licenses advisories

# ---------------------------------------------------------------------------
# PUBLISH — tag-triggered release jobs.
#
# Trigger: push a git tag matching `scheduler-vX.Y.Z` (e.g. scheduler-v0.1.0).
# The tag must be pushed AFTER the main pipeline is green — there is no
# explicit needs: here because publish jobs run on tag events, not MR events,
# and the security stage will not have run on the tag itself.
#
# Status (#937): the PyPI project name is NOT pending reservation — it is LIVE.
# `trueppm-scheduler` already has two manually-uploaded alpha releases (0.1.0a1
# on 2026-05-15, 0.2.0a1 on 2026-05-31). The 0.3 promotion (#914) should publish
# via THIS tagged CI path, not a laptop, so the release is reproducible.
#
# Required CI/CD variable (Settings → CI/CD → Variables):
#   PYPI_TOKEN — PyPI API token with upload scope for the trueppm-scheduler project.
#                Mark as "Masked" and "Protected" (tags are protected refs).
#
# PyPI account/ownership: the project is owned by the maintainer PyPI account
# that performed the manual 0.1/0.2 uploads (Kelly Hair); PYPI_TOKEN is a
# project-scoped token stored in the GitLab CI/CD Variables for this repo.
#
# Provenance roadmap (#937/#938): replace the static PYPI_TOKEN with GitLab
# OIDC against a PyPI Trusted Publisher and emit PEP 740 attestations so PyPI
# renders a verified "built by this CI, unmodified" badge. That swap changes the
# publish AUTH model, so it is deliberately NOT wired on this live tag path yet
# (default 0.4). The PyPI-side Trusted Publisher must be configured in the PyPI
# dashboard first (manual, #937); see the commented scaffold on the job below.
#
# The job builds an sdist + wheel using `python -m build` (PEP 517 standard),
# generates + validates a CycloneDX SBOM (#936), then uploads with `twine`.
# hatchling is the build backend (pyproject.toml).
# ---------------------------------------------------------------------------

scheduler:publish:
  # Publishes trueppm-scheduler to PyPI. Closes issue #37.
  stage: publish
  image: python:3.11-slim
  rules:
    # Only fire on tags matching the scheduler version format.
    # Never fire on branch pushes or MR events.
    - if: '$CI_COMMIT_TAG =~ /^scheduler-v\d+\.\d+\.\d+/'
  cache:
    <<: *scheduler-cache
    policy: pull
  variables:
    TWINE_USERNAME: __token__
    TWINE_PASSWORD: $PYPI_TOKEN
    # Suppress the keyring warning that fires in non-interactive environments.
    PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring
  # ── Trusted Publishing scaffold (#938) — DO NOT enable on the live tag path
  # until the PyPI Trusted Publisher is configured (#937) and validated against
  # TestPyPI's OIDC. To migrate: add `id_tokens` for GitLab OIDC, drop the
  # TWINE_* vars above, and publish with `twine upload --attestations` (PEP 740)
  # or `gh-action-pypi-publish`-equivalent. Default 0.4 (touches auth, not just
  # artifacts), so it is left commented:
  #   id_tokens:
  #     PYPI_ID_TOKEN:
  #       aud: pypi
  before_script:
    # cyclonedx-bom pinned to match the resident version in the ci-scheduler
    # image (.gitlab/ci-images/scheduler.Dockerfile); this job runs on the
    # python:3.11-slim base, so it installs the tool here.
    - pip install build twine cyclonedx-bom==7.3.0 --quiet
  script:
    # Verify the tag version matches the version declared in pyproject.toml.
    # Mismatches (e.g. forgot to bump the version) fail fast before uploading.
    - |
      PKG_VERSION=$(python -c "
      import tomllib, sys
      with open('packages/scheduler/pyproject.toml', 'rb') as f:
          d = tomllib.load(f)
      print(d['project']['version'])
      ")
      TAG_VERSION="${CI_COMMIT_TAG#scheduler-v}"
      if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
        echo "ERROR: tag version ($TAG_VERSION) does not match pyproject.toml version ($PKG_VERSION)"
        echo "Bump the version in packages/scheduler/pyproject.toml before tagging."
        exit 1
      fi
      echo "Version check passed: $PKG_VERSION"
    - cd packages/scheduler
    - python -m build
    # Generate + validate the CycloneDX SBOM from the built runtime closure
    # BEFORE uploading (#936). Ordering matters: never let twine succeed (the
    # release goes live) and then fail the job on a malformed SBOM. A fresh
    # runtime-only venv keeps build/dev tooling out of the published SBOM.
    - python -m venv /tmp/sbom-venv
    - /tmp/sbom-venv/bin/pip install --quiet .
    - cyclonedx-py environment /tmp/sbom-venv/bin/python --validate --output-format JSON --output-reproducible --sv 1.6 -o dist/sbom.cdx.json
    # Upload only the wheel + sdist — NOT the SBOM (it ships as a CI artifact /
    # GitLab Release asset, not a PyPI distribution file).
    - twine upload dist/*.tar.gz dist/*.whl --non-interactive --verbose
  artifacts:
    # Keep the built wheel + SBOM as a CI artifact for traceability.
    # TODO(#936): also attach dist/sbom.cdx.json to the GitLab Release for the
    # tag once a scheduler-release job (release-cli) exists.
    paths:
      - packages/scheduler/dist/
    expire_in: 30 days

# scheduler:publish:test (TestPyPI on every main merge) was removed earlier.
# The tag-triggered scheduler:publish above is LIVE, not dormant: the PyPI name
# is reserved and two alphas are published (#937). Push a `scheduler-vX.Y.Z`
# tag (after a green main pipeline) to release.

# ---------------------------------------------------------------------------
# PUBLISH — Docker images and Helm chart.
#
# Trigger: push a git tag matching `v*` (e.g. v0.1.0).
# Each job pushes to GHCR under ghcr.io/$GHCR_USER/{api,web,charts}.
# Tags pushed: full semver (0.1.0), major.minor (0.1), and latest.
#
# Required CI/CD variables (Settings → CI/CD → Variables):
#   GHCR_TOKEN — GitHub PAT with write:packages scope. Mark Masked + Protected.
#   GHCR_USER  — GitHub org/username (e.g. trueppm). Mark Protected.
#
# Multi-arch (linux/arm64) is deferred to 0.5 — single-platform amd64 for 0.1.
# ---------------------------------------------------------------------------

# Fires on any semver tag — stable and pre-release alike.
.rules-release-tag: &rules-release-tag
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+/'

# Shared base for Docker publish jobs.
# GitLab Container Registry credentials ($CI_REGISTRY_*) are injected
# automatically by the runner — no CI/CD variable setup needed.
# GHCR is pushed only when $GHCR_USER and $GHCR_TOKEN are both set;
# missing credentials are a silent skip, not a failure.
.docker-publish-base:
  stage: publish
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}" "${CI_REGISTRY}"
    # Trivy is used to scan each built image before it is pushed (see the
    # docker save | trivy image --input gate in api:publish / web:publish).
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.71.0

api:publish:
  extends: .docker-publish-base
  <<: *rules-release-tag
  script:
    - |
      VERSION="${CI_COMMIT_TAG#v}"
      GL_IMAGE="${CI_REGISTRY_IMAGE}/api"
      docker build -f packages/api/Dockerfile \
        -t "${GL_IMAGE}:${CI_COMMIT_TAG}" \
        -t "${GL_IMAGE}:latest" \
        .
      # Scan the built image before publishing — fail the release on fixable
      # HIGH/CRITICAL CVEs. --ignore-unfixed skips base-image CVEs with no
      # available patch (unactionable) while still gating on anything fixable.
      docker save "${GL_IMAGE}:${CI_COMMIT_TAG}" -o /tmp/api-image.tar
      trivy image --input /tmp/api-image.tar --no-progress --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1
      docker push "${GL_IMAGE}:${CI_COMMIT_TAG}"
      docker push "${GL_IMAGE}:latest"
      if [ -n "${GHCR_USER}" ] && [ -n "${GHCR_TOKEN}" ]; then
        echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
        GH_IMAGE="ghcr.io/${GHCR_USER}/api"
        docker tag "${GL_IMAGE}:${CI_COMMIT_TAG}" "${GH_IMAGE}:${VERSION}"
        docker tag "${GL_IMAGE}:latest" "${GH_IMAGE}:latest"
        docker push "${GH_IMAGE}:${VERSION}"
        docker push "${GH_IMAGE}:latest"
      else
        echo "INFO: GHCR_USER/GHCR_TOKEN not set — GitLab registry only"
      fi

web:publish:
  extends: .docker-publish-base
  <<: *rules-release-tag
  script:
    - |
      VERSION="${CI_COMMIT_TAG#v}"
      GL_IMAGE="${CI_REGISTRY_IMAGE}/web"
      cd packages/web
      docker build \
        -t "${GL_IMAGE}:${CI_COMMIT_TAG}" \
        -t "${GL_IMAGE}:latest" \
        .
      # Scan the built image before publishing (see api:publish for rationale).
      docker save "${GL_IMAGE}:${CI_COMMIT_TAG}" -o /tmp/web-image.tar
      trivy image --input /tmp/web-image.tar --no-progress --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1
      docker push "${GL_IMAGE}:${CI_COMMIT_TAG}"
      docker push "${GL_IMAGE}:latest"
      if [ -n "${GHCR_USER}" ] && [ -n "${GHCR_TOKEN}" ]; then
        echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
        GH_IMAGE="ghcr.io/${GHCR_USER}/web"
        docker tag "${GL_IMAGE}:${CI_COMMIT_TAG}" "${GH_IMAGE}:${VERSION}"
        docker tag "${GL_IMAGE}:latest" "${GH_IMAGE}:latest"
        docker push "${GH_IMAGE}:${VERSION}"
        docker push "${GH_IMAGE}:latest"
      else
        echo "INFO: GHCR_USER/GHCR_TOKEN not set — GitLab registry only"
      fi

helm:publish:
  # Helm chart → GHCR OCI registry (conditional on GHCR credentials).
  # GitLab Container Registry does not support Helm OCI push in this runner
  # setup, so GHCR is the only target. Job exits 0 when credentials are absent
  # rather than failing the pipeline — pre-1.0 GHCR access is optional.
  stage: publish
  image:
    name: alpine/helm:3.14.0
    entrypoint: [""]
  <<: *rules-release-tag
  before_script:
    - apk add --no-cache curl
  script:
    - |
      if [ -z "${GHCR_USER}" ] || [ -z "${GHCR_TOKEN}" ]; then
        echo "INFO: GHCR_USER/GHCR_TOKEN not set — skipping Helm chart push"
        exit 0
      fi
      helm registry login ghcr.io -u "$GHCR_USER" -p "$GHCR_TOKEN"
      helm dependency update packages/helm
      helm package packages/helm
      CHART_FILE=$(ls trueppm-*.tgz)
      helm push "$CHART_FILE" "oci://ghcr.io/${GHCR_USER}/charts"

# ---------------------------------------------------------------------------
# PUBLISH — OSS package registries (PyPI wheel + npm).
#
# Trigger: push a git tag matching `v*` (the same release tag as the Docker
# image jobs above). These publish the two remaining OSS packages — trueppm-api
# (PyPI) and @trueppm/web (npm) — as versioned, installable artifacts so that
# trueppm-enterprise can pin exact OSS versions instead of path-dep references
# (Enterprise ADR E-0005, phase-2 switchover). Closes #479.
#
# Like helm:publish, each job exits 0 — not fail — when its registry token is
# absent. This keeps the release pipeline green before the tokens and the
# PyPI/npm project-name reservations land (the scheduler:publish job is dormant
# for the same reason); once the tokens are configured, a v* tag publishes
# automatically and the E-0005 remote agent detects both packages.
#
# Required CI/CD variables (Settings → CI/CD → Variables), Masked + Protected:
#   PYPI_TOKEN — PyPI API token with upload scope for the trueppm-api project.
#   NPM_TOKEN  — npm automation token with publish scope for the @trueppm scope.
# ---------------------------------------------------------------------------

api:publish:pypi:
  # trueppm-api → PyPI sdist + wheel. Mirrors scheduler:publish (PEP 517 build
  # via hatchling, twine upload). Distinct from api:publish, which ships the
  # Docker image to the container registry.
  stage: publish
  image: python:3.11-slim
  <<: *rules-release-tag
  variables:
    TWINE_USERNAME: __token__
    TWINE_PASSWORD: $PYPI_TOKEN
    # Suppress the keyring warning that fires in non-interactive environments.
    PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring
  script:
    - |
      if [ -z "${PYPI_TOKEN}" ]; then
        echo "INFO: PYPI_TOKEN not set — skipping PyPI publish of trueppm-api"
        exit 0
      fi
    - pip install build twine --quiet
    # Verify the tag version matches the version declared in pyproject.toml.
    # A mismatch (e.g. forgot to bump) fails fast before uploading.
    - |
      PKG_VERSION=$(python -c "
      import tomllib
      with open('packages/api/pyproject.toml', 'rb') as f:
          print(tomllib.load(f)['project']['version'])
      ")
      TAG_VERSION="${CI_COMMIT_TAG#v}"
      if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
        echo "ERROR: tag version ($TAG_VERSION) does not match packages/api/pyproject.toml version ($PKG_VERSION)"
        echo "Bump the version in packages/api/pyproject.toml before tagging."
        exit 1
      fi
      echo "Version check passed: $PKG_VERSION"
    - cd packages/api
    - python -m build
    - twine upload dist/* --non-interactive --verbose
  artifacts:
    # Keep the built wheel as a CI artifact for traceability (7-day expiry).
    paths:
      - packages/api/dist/
    expire_in: 7 days

web:publish:npm:
  # @trueppm/web → npm registry. Builds the production bundle and publishes
  # dist/ (package.json `files` restricts the tarball to the built output).
  # Distinct from web:publish, which ships the Docker image.
  stage: publish
  image: node:20-alpine
  <<: *rules-release-tag
  cache:
    <<: *web-cache
    policy: pull
  script:
    - *retry-fn
    - |
      if [ -z "${NPM_TOKEN}" ]; then
        echo "INFO: NPM_TOKEN not set — skipping npm publish of @trueppm/web"
        exit 0
      fi
    - cd packages/web
    - retry npm ci --prefer-offline --quiet
    # Verify the tag version matches package.json before publishing.
    - |
      PKG_VERSION=$(node -p "require('./package.json').version")
      TAG_VERSION="${CI_COMMIT_TAG#v}"
      if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
        echo "ERROR: tag version ($TAG_VERSION) does not match packages/web/package.json version ($PKG_VERSION)"
        echo "Bump the version in packages/web/package.json before tagging."
        exit 1
      fi
      echo "Version check passed: $PKG_VERSION"
    - npm run build
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
    - npm publish
  artifacts:
    paths:
      - packages/web/dist/
    expire_in: 7 days

# ---------------------------------------------------------------------------
# RELEASE — GitLab Release entry.
#
# Trigger: any v* tag (stable and pre-release).
# needs: [] — runs independently of the publish stage so a missing GHCR
# token does not prevent the release entry from being created.
# Pre-release tags get a short [Unreleased] pointer; stable tags extract
# their section from the assembled CHANGELOG.md.
# ---------------------------------------------------------------------------

release:create:
  stage: deploy
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs: []
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+/'
  script:
    - |
      VERSION="${CI_COMMIT_TAG#v}"
      if echo "$VERSION" | grep -qE '(alpha|beta|rc)'; then
        BASE="${VERSION%%-*}"
        printf '**TruePPM %s** — pre-release.\n\nChanges are accumulating in `[Unreleased]` until **%s** ships stable.\nSee [CHANGELOG.md](https://gitlab.com/trueppm/trueppm/-/blob/%s/CHANGELOG.md) for the current list.\n' \
          "${CI_COMMIT_TAG}" "$BASE" "${CI_COMMIT_TAG}" > release_notes.md
      else
        awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md \
          | sed '/^[[:space:]]*$/d' > release_notes.md
      fi
  release:
    tag_name: '$CI_COMMIT_TAG'
    name: 'TruePPM $CI_COMMIT_TAG'
    description: './release_notes.md'
