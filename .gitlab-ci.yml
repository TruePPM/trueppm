stages:
  - lint      # fastest jobs, most commonly fail — run first, gate everything
  - analyze   # type-check, static analysis, migration/schema checks
  - test      # unit + integration tests (per-package, DAG-gated on analyze)
  - security  # CVE scans + license audit (MR + main only)
  - publish   # tag-triggered: package registries (PyPI/npm) + Docker images + Helm
  - deploy    # docs deployment to GitLab Pages

default:
  interruptible: true
  retry:
    max: 2
    # Retry only on pure-infrastructure failure classes — never `script_failure`
    # (#1212): a genuine test failure must fail fast, not re-run twice and waste
    # minutes for a slow red signal. Everything below is the runner/GitLab
    # platform misbehaving, where a retry cannot mask a real regression.
    when:
      - runner_system_failure   # runner died / lost connection
      - stuck_or_timeout_failure # job stuck with no output, or hit timeout
      - api_failure             # transient GitLab API comms failure
      - scheduler_failure       # runner could not be assigned to the job
      - stale_schedule          # scheduled-pipeline race (boundary:check runs on schedule)
      - data_integrity_failure  # transient platform data error
  after_script:
    # Free workspace disk before cache upload to reduce runner disk pressure.
    # NOTE: this runner's builds_dir is under /tmp (/tmp/builds/...), so a bare
    # `rm -rf /tmp/*` deletes the checkout and the post-job `cd` back into the
    # project fails with exit 1 — failing an otherwise-green job. Exclude the
    # build dir so we reclaim scratch space without destroying the workspace.
    - find /tmp -mindepth 1 -maxdepth 1 ! -name builds -exec rm -rf {} + 2>/dev/null || true

variables:
  # Runner-managed phase durability (#1310). These heal the clone / artifact /
  # cache phases that run *before* before_script — which neither retry() (it
  # wraps only `script:` commands) nor default.retry's failure classes cover.
  # All default to 1 (no retry). GET_SOURCES_ATTEMPTS specifically auto-heals
  # the recurring `get_sources` HTTP 502 clone flake that was previously retried
  # by hand (e.g. api:migration-numbering).
  GET_SOURCES_ATTEMPTS: "3"        # git clone/fetch of the project source
  ARTIFACT_DOWNLOAD_ATTEMPTS: "3"  # pulling artifacts from upstream DAG jobs
  RESTORE_CACHE_ATTEMPTS: "3"      # restoring the pip/npm cache
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  # Dependency-fetch durability (#1212). Public-registry blips (ECONNRESET,
  # timeouts) used to fail a whole job on first occurrence — `default.retry`
  # excludes `script_failure`, so a flaky `npm ci`/`pip install` got zero
  # retries. These make the package managers self-heal with backoff, and
  # `NPM_CONFIG_CACHE` points npm's content cache at a path the web jobs cache
  # so `npm ci --prefer-offline` hits zero network for already-seen packages.
  PIP_RETRIES: "5"
  PIP_DEFAULT_TIMEOUT: "60"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.cache/npm"
  NPM_CONFIG_FETCH_RETRIES: "5"
  NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: "20000"
  NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: "120000"
  POSTGRES_DB: trueppm_test
  POSTGRES_USER: trueppm
  POSTGRES_PASSWORD: trueppm
  # Playwright base-image tag, mirrored into our registry by
  # ci:mirror-playwright-base and consumed by ci:build-integration-image so MR
  # pipelines never pull anonymously from mcr.microsoft.com (which throttles CI
  # runner IPs). Bump alongside the Dockerfile ARG default and packages/web.
  PLAYWRIGHT_BASE_TAG: "v1.58.2-noble"

# ---------------------------------------------------------------------------
# retry() — surgical command-level retry for flaky network steps (#1212).
# GitLab job-level `retry` can only rerun the WHOLE job, and would have to
# include `script_failure` to catch a network blip — which would also rerun
# genuine test failures twice (slow red signal, wasted minutes). Wrapping just
# the network commands (`npm ci`, `pip install`, the health-check `curl`) in a
# `before_script` retries the command, not the job: real test failures in
# `script:` still fail fast. Source via `- *retry-fn` at the top of a
# before_script, then prefix the flaky command with `retry`.
# ---------------------------------------------------------------------------
.retry-fn: &retry-fn |
  retry() {
    n=0; max=4; delay=10
    until "$@"; do
      n=$((n + 1))
      if [ "$n" -ge "$max" ]; then
        echo "retry: '$*' still failing after $max attempts — giving up" >&2
        return 1
      fi
      echo "retry: '$*' failed (attempt $n/$max); sleeping ${delay}s…" >&2
      sleep "$delay"
      delay=$((delay * 2))
    done
  }

# ---------------------------------------------------------------------------
# Prevent duplicate pipelines.
# MR pipeline runs when an MR exists for the branch; branch pipeline runs
# for pushes without an open MR. Both run on main after merge.
#
# auto_cancel: feature branches and MRs cancel older pipelines when a new
# commit lands (saves runner minutes during iteration). main is exempt —
# every merge into main must run to completion so each commit on the
# protected branch has its own green/red signal.
# ---------------------------------------------------------------------------
workflow:
  auto_cancel:
    on_new_commit: interruptible
  rules:
    # Scheduled pipelines are permitted only for the Renovate runner
    # (RENOVATE == "true") and the nightly SonarCloud scan (SONAR_SCHEDULED ==
    # "true"). Block any other scheduled trigger so a stray schedule can't spin
    # up a full pipeline. Both permitted schedules run on `main` and fall through
    # to the branch rule below; sonar:scan is the only job gated to the Sonar
    # schedule, so day-to-day MR/push pipelines are unaffected (#2092).
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $RENOVATE != "true" && $SONAR_SCHEDULED != "true"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
      auto_cancel:
        on_new_commit: none
    - if: '$CI_COMMIT_TAG =~ /^v\d+/'
      auto_cancel:
        on_new_commit: none
    - if: '$CI_COMMIT_TAG =~ /^scheduler-v\d+/'
      auto_cancel:
        on_new_commit: none
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_COMMIT_BRANCH'

# ---------------------------------------------------------------------------
# Path-change rule templates.
#
# Every package job uses one of these anchors so it only runs when files in
# that package (or the CI config itself) change. On main the changes: filter
# is omitted — the protected branch always gets a full green signal.
#
# api includes scheduler paths because the API package installs the scheduler
# as a dependency; a scheduler change can break API type-checking.
#
# The API-side license:check:py job declares a single optional needs on
# ci:build-api-image so it enters DAG mode and runs in parallel with the test
# stage rather than waiting for it to finish. The optional+single-dep shape
# avoids blocked-job cascades on single-package MRs: if only the API changed,
# web:test is skipped, but license:check:py still runs because it doesn't depend
# on web:test. (Python SCA itself is now security:osv, which uses no needs.)
# ---------------------------------------------------------------------------

.rules-scheduler: &rules-scheduler
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/scheduler/**/*
        - .gitlab-ci.yml

.rules-api: &rules-api
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/api/**/*
        - packages/scheduler/**/*
        - .gitlab-ci.yml

.rules-web: &rules-web
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/web/**/*
        - .gitlab-ci.yml

.rules-mobile: &rules-mobile
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/mobile/**/*
        - .gitlab-ci.yml

.rules-website: &rules-website
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG =~ /^v\d+/'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/website/**/*
        - .gitlab-ci.yml

.rules-wasm: &rules-wasm
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/wasm-scheduler/**/*
        - .gitlab-ci.yml

.rules-helm: &rules-helm
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/helm/**/*
        - .gitlab-ci.yml

.rules-mcp: &rules-mcp
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/mcp/**/*
        - .gitlab-ci.yml

# ---------------------------------------------------------------------------
# Base templates
# Cache keys are derived from each package's dependency manifest so the
# Minio-backed cache is automatically invalidated when dependencies change.
# ---------------------------------------------------------------------------

# Bounded timeout for trivial check jobs whose real work is seconds (#1461).
# These inherit the 60-minute project default, but their `script:` runs in well
# under a minute. The failure mode this guards is a `get_sources` hang: a NUC
# runner does a fresh full clone and the fetch intermittently crawls for
# 5–79 minutes before succeeding (observed: mcp:typecheck 24.7m, api:openapi
# -check 79m). GET_SOURCES_ATTEMPTS retries a clone *failure*, not a slow-but
# -successful one, so nothing bounds the hang. Capping these jobs at 8m makes a
# hung fetch trip `stuck_or_timeout_failure`, which default.retry DOES heal —
# turning a 24m+ stall into ~8m plus one clean retry on a fresh slot. Apply
# only to jobs whose work is comfortably under 8m even on a cold cache; never to
# image builds, WASM/web compiles, DB-backed tests, e2e, or coverage.
.fast-job:
  timeout: 8m

#
# Uses the custom ci-scheduler image (built by `ci:build-scheduler-image`)
# which pre-bakes the scheduler[dev] wheel tree. The runtime `pip install -e`
# only re-links the editable package — no wheel downloads.
# Kaizen #651: shaves cold-install time off each of the five scheduler:* jobs.
.scheduler:
  image: $CI_REGISTRY_IMAGE/ci-scheduler:py3.11
  needs:
    - job: ci:build-scheduler-image
      optional: true
  cache: &scheduler-cache
    key:
      files:
        - packages/scheduler/pyproject.toml
      prefix: scheduler-pip
    paths:
      - .cache/pip/
  before_script:
    # Image already has scheduler[dev] wheels resident; this is a fast
    # editable re-link against the checked-out source.
    - pip install -e "packages/scheduler[dev]" --quiet

# Full API template — postgres + valkey services, used by api:test only.
# Valkey is the BSD-licensed Redis fork; wire-compatible, REDIS_URL unchanged.
#
# Uses the custom ci-api image (built by `ci:build-api-image`) which pre-bakes
# libpq-dev + gcc and all dev-deps wheels. The runtime `pip install -e` only
# re-links the editable packages — no wheel downloads, no apt-get.
# Kaizen #640 item 3: shaves ~3min off each of the six api:* jobs.
.api:
  image: $CI_REGISTRY_IMAGE/ci-api:py3.11
  needs:
    - job: ci:build-api-image
      optional: true
  cache: &api-cache
    key:
      files:
        - packages/api/pyproject.toml
      prefix: api-pip
    paths:
      - .cache/pip/
  services:
    - name: postgres:16-alpine
      alias: postgres
    - name: valkey/valkey:8-alpine
      alias: valkey
  variables:
    DJANGO_SETTINGS_MODULE: trueppm_api.settings.dev
    TRUEPPM_ALLOW_DEV_SETTINGS: "1"
    DATABASE_URL: "postgres://trueppm:trueppm@postgres/trueppm_test"
    REDIS_URL: "redis://valkey:6379"
  before_script:
    # Image already has libpq-dev + gcc + all dev-dep wheels resident; this
    # install is a fast editable re-link against the checked-out source.
    - pip install -e "packages/scheduler[dev]" --quiet
    - pip install -e "packages/api[dev]" --quiet

# Lean API template — no DB/Valkey, for jobs that only need Django importable
# (type-check, migration check, schema generation). DATABASE_URL is set so
# django-environ parses cleanly; no actual connection is made.
.api-no-db:
  image: $CI_REGISTRY_IMAGE/ci-api:py3.11
  needs:
    - job: ci:build-api-image
      optional: true
  cache:
    <<: *api-cache
    policy: pull
  variables:
    DJANGO_SETTINGS_MODULE: trueppm_api.settings.dev
    TRUEPPM_ALLOW_DEV_SETTINGS: "1"
    DATABASE_URL: "postgres://trueppm:trueppm@localhost/trueppm_test"
  before_script:
    # api[dev] (not bare api) — the image has dev-dep wheels resident so
    # the re-link cost is the same and downstream jobs (type-check, schema)
    # need the dev extras (mypy stubs, drf-spectacular validators).
    - pip install -e "packages/scheduler[dev]" --quiet
    - pip install -e "packages/api[dev]" --quiet

.web:
  image: node:20-alpine@sha256:fb4cd12c85ee03686f6af5362a0b0d56d50c58a04632e6c0fb8363f609372293
  # Cache npm's content cache (NPM_CONFIG_CACHE), not node_modules: `npm ci`
  # deletes node_modules and reinstalls every run, so a node_modules cache buys
  # nothing — but a warm content cache lets `npm ci --prefer-offline` rebuild it
  # with zero network for already-seen packages (#1212).
  cache: &web-cache
    key:
      files:
        - packages/web/package-lock.json
      prefix: web-npm-cacache
    paths:
      - .cache/npm/
  before_script:
    - *retry-fn
    - cd packages/web
    - retry npm ci --prefer-offline --quiet

# Mobile (bare React Native) — node-only template for the lint/type-check gates.
# Both run on the standard node runners (no emulator/Xcode/Gradle): they only
# need the JS/TS toolchain. The native Detox e2e jobs are deferred — they need
# an Android-emulator (KVM) + macOS runner that the shared runners don't provide
# (issues #29/#30; ADR-0026 §Risks). Mirrors the `.web` cache strategy: cache
# npm's content cache, not node_modules (npm ci reinstalls every run).
.mobile:
  image: node:20-alpine@sha256:fb4cd12c85ee03686f6af5362a0b0d56d50c58a04632e6c0fb8363f609372293
  cache: &mobile-cache
    key:
      files:
        - packages/mobile/package-lock.json
      prefix: mobile-npm-cacache
    paths:
      - .cache/npm/
  before_script:
    - *retry-fn
    - cd packages/mobile
    - retry npm ci --prefer-offline --quiet

.website:
  # node:22 — Astro 6 requires Node >=22.12 (dropped Node 20 support).
  image: node:22-alpine@sha256:ab07539e0988b63558ff621f5fbe1077054c39d9809112974fb79993949d41cd
  cache:
    key:
      files:
        - packages/website/package-lock.json
      prefix: website-npm-cacache
    paths:
      - .cache/npm/
  before_script:
    - *retry-fn
    - cd packages/website
    - retry npm ci --prefer-offline --quiet

.wasm:
  # Uses the custom ci-wasm image (built by ci:build-wasm-image), which pre-bakes
  # the clippy component, the wasm32-unknown-unknown target, pinned wasm-pack +
  # cargo-deny, and a warm cargo registry — so wasm:* jobs skip the rustup adds,
  # tool downloads, and crates.io index/source fetch on every run. ci:build-wasm-
  # image is optional: when Cargo.lock/Cargo.toml/the Dockerfile are unchanged it
  # isn't in the pipeline and the job pulls the existing tag from the registry.
  image: $CI_REGISTRY_IMAGE/ci-wasm:1.85
  needs:
    - job: ci:build-wasm-image
      optional: true
  # No cargo target cache — the ~1 GB target/ directory was exhausting shared
  # runner disk. Cold compiles take ~40s which is acceptable until we have a
  # self-hosted runner with more disk (issues #29/#30). The warm registry above
  # only removes the network-bound fetch, not the compile.
  before_script:
    - cd packages/wasm-scheduler

# ---------------------------------------------------------------------------
# LINT — fastest jobs, highest failure rate. Gates all downstream work.
# ---------------------------------------------------------------------------

changelog:check:
  extends: .fast-job
  # Pure git diff — ~10 seconds. Run first so MR authors get instant feedback
  # if they forgot a changelog fragment, before any build jobs start.
  #
  # Changelog fragments live in changelog.d/<slug>.<type>.md (not CHANGELOG.md).
  # Fragments are assembled into CHANGELOG.md at release time by
  # scripts/assemble-changelog.sh. See changelog.d/README.md for details.
  #
  # Exempt branches: chore/*, ci/*, docs/* carry no user-visible change.
  # Exempt MRs: add the ~no-changelog label in GitLab to skip this check.
  stage: lint
  image: alpine:3.20@sha256:d9e853e87e55526f6b2917df91a2115c36dd7c696a35be12163d44e6e2a4b6bc
  variables:
    # Full history so `git diff origin/<target>...HEAD` finds a merge base even
    # on long-running feature branches. GitLab's default GIT_DEPTH=20 broke
    # this job whenever a branch had >20 commits since branching from main.
    GIT_DEPTH: "0"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^(chore|ci|docs)\//i'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  before_script:
    - apk add --no-cache git
  script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
    - |
      # Skip if the MR has the ~no-changelog label
      if echo "$CI_MERGE_REQUEST_LABELS" | grep -qF "no-changelog"; then
        echo "Skipping changelog check — ~no-changelog label present."
        exit 0
      fi
    - |
      CHANGED=$(git diff --name-only "origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME...HEAD")
      FRAGMENTS=$(echo "$CHANGED" | grep -E '^changelog\.d/[^/]+\.(added|changed|fixed|security)\.md$' || true)
      if [ -z "$FRAGMENTS" ]; then
        echo "ERROR: No changelog fragment found on this branch."
        echo ""
        echo "Create a file in changelog.d/ with the format:"
        echo "  changelog.d/<slug>.<type>.md"
        echo ""
        echo "Types: added, changed, fixed, security"
        echo "Example: changelog.d/auth-retry-race.fixed.md"
        echo ""
        echo "See changelog.d/README.md for details."
        echo "To skip this check, add the ~no-changelog label to the MR."
        exit 1
      fi
      echo "OK: Changelog fragment(s) found:"
      echo "$FRAGMENTS"

scripts:test:
  extends: .fast-job
  # Unit tests for the release tooling called by scripts/release.sh at tag time:
  #   - rotate-scheduler-changelog.sh — dates the scheduler package CHANGELOG
  #     section the PyPI wheel ships;
  #   - assemble-changelog.sh — folds changelog.d/ fragments into [Unreleased];
  #   - release-staging — the changelog.d/ git-add contract (#1386);
  #   - release-preflight — the pre-tag image Trivy scan, incl. the TRIVY_VERSION
  #     lockstep with this file (#1391). That lockstep is why .gitlab-ci.yml is a
  #     trigger below: a Trivy bump here that forgets release.sh must fail here.
  #   - wt — the worktree helper's ADR/migration number reservation (the atomic
  #     claim that stops parallel agents colliding on the same number).
  # There is no other test harness for these scripts, so guard the logic
  # directly. Pinned python image (bash + python3), ~5s. The wt-reserve test
  # stages real throwaway git repos and runs scripts/wt against them, so this
  # otherwise-zero-install image needs git — installed in before_script below.
  # Only runs when the tooling it covers — or the CI Trivy pin — changes.
  #
  # Note: this image runs bash 5, so it cannot catch a bash-3.2 regression on the
  # macOS release machine; assemble-changelog.test.sh guards that statically.
  stage: lint
  image: python:3.11-slim@sha256:ae52c5bef62a6bdd42cd1e8dffef86b9cd284bde9427da79839de7a4b983e7ca
  before_script:
    # wt-reserve.test.sh needs a real git binary (it stages sandbox repos).
    - apt-get update -qq && apt-get install -y -qq --no-install-recommends git
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - scripts/rotate-scheduler-changelog.sh
        - scripts/assemble-changelog.sh
        - scripts/release.sh
        - scripts/wt
        - scripts/tests/rotate-scheduler-changelog.test.sh
        - scripts/tests/assemble-changelog.test.sh
        - scripts/tests/release-staging.test.sh
        - scripts/tests/release-preflight.test.sh
        - scripts/tests/wt-reserve.test.sh
        - .gitlab-ci.yml
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - scripts/rotate-scheduler-changelog.sh
        - scripts/assemble-changelog.sh
        - scripts/release.sh
        - scripts/wt
        - scripts/tests/rotate-scheduler-changelog.test.sh
        - scripts/tests/assemble-changelog.test.sh
        - scripts/tests/release-staging.test.sh
        - scripts/tests/release-preflight.test.sh
        - scripts/tests/wt-reserve.test.sh
        - .gitlab-ci.yml
  script:
    - bash scripts/tests/rotate-scheduler-changelog.test.sh
    - bash scripts/tests/assemble-changelog.test.sh
    - bash scripts/tests/release-staging.test.sh
    - bash scripts/tests/release-preflight.test.sh
    - bash scripts/tests/wt-reserve.test.sh

boundary:check:
  extends: .fast-job
  # Detect open OSS issues that describe enterprise functionality (labeled
  # `enterprise` or `portfolio`) and therefore violate the Two-Repo Rule
  # (CLAUDE.md). Two GitLab API calls; ~2s. Runs on main pushes (catches
  # the moment a violation lands) and on schedule (catches violations that
  # were created via the GitLab UI without an MR).
  #
  # An optional BOUNDARY_CHECK_TOKEN (project- or group-level access token)
  # can be set in CI/CD variables; otherwise CI_JOB_TOKEN is used.
  stage: lint
  image: alpine:3.20@sha256:d9e853e87e55526f6b2917df91a2115c36dd7c696a35be12163d44e6e2a4b6bc
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - apk add --no-cache curl jq bash
  script:
    - bash scripts/check-issue-boundary.sh

lint:todo-grep:
  extends: .fast-job
  # Stale stub-marker gate (#350). STUB:/WIP: never ship; TODO(#NNN) must
  # point at an open issue. Bare TODOs warn only. Excludes packages/web/e2e
  # (Playwright follow-up TODOs are valid), docs/, and *.md.
  #
  # Runs on every MR pipeline. ~5–10s incl. issue-state lookups.
  stage: lint
  image: alpine:3.20@sha256:d9e853e87e55526f6b2917df91a2115c36dd7c696a35be12163d44e6e2a4b6bc
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - apk add --no-cache bash curl jq grep git
  script:
    - bash scripts/check-todo-grep.sh
    - bash scripts/check-todo-grep.sh --self-test

lint:design-system-v2:
  extends: .fast-job
  # Design System v2 conformance gate (ADR-0125). Blocks design drift: arbitrary
  # Tailwind color/shadow value classes (zero tolerance) and new raw hex literals
  # in component source (ratchet against a committed baseline). This is the
  # enforcement that makes "all future work inherits the v2 golden standard" real.
  # See docs/design/v2-golden-standard.md. ~2s.
  stage: lint
  image: alpine:3.20@sha256:d9e853e87e55526f6b2917df91a2115c36dd7c696a35be12163d44e6e2a4b6bc
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - apk add --no-cache bash grep
  script:
    - bash scripts/check-design-system-v2.sh

lint:adr-collisions:
  extends: .fast-job
  # ADR number-collision gate (#918). Fails if any two files under docs/adr/
  # share a four-digit prefix — the recurring failure mode where parallel
  # branches each grab "the next free number" off a stale main and silently
  # corrupt the design-decision audit trail (a `per ADR-NNNN` reference stops
  # resolving to a single file).
  #
  # In an MR pipeline the script also runs a cross-branch scan so the collision
  # is caught *before* merge, not on the post-merge main job: it compares the
  # ADR number(s) this MR adds against (a) the numbers already on the target
  # branch (git-only) and (b) the numbers other open MRs add (GitLab API). Half
  # (b) uses the built-in CI_JOB_TOKEN — the same credential check-issue-boundary
  # and check-todo-grep already use for same-project reads, so no extra token is
  # provisioned. (The optional ADR_GATE_TOKEN is only for instances that lock
  # down the job-token API scope.) GIT_DEPTH:0 gives the merge-base history the
  # diff needs. ~2s.
  stage: lint
  image: alpine:3.20@sha256:d9e853e87e55526f6b2917df91a2115c36dd7c696a35be12163d44e6e2a4b6bc
  variables:
    GIT_DEPTH: "0"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - apk add --no-cache bash git curl jq
  script:
    - bash scripts/check-adr-collisions.sh

docs:version-accuracy:
  extends: .fast-job
  # Version-status tense gate (#807). A past/present-tense version claim in the
  # website docs ("shipped in 0.X", "added in 0.X", "In 0.X the Y is …") may
  # only reference a version that has actually shipped. Referencing an Underway
  # or Planned version in past/present tense is a user-facing accuracy bug (the
  # 2026-05-28 "0.2 shipped" regression) — readers hunt for behavior that does
  # not exist yet.
  #
  # Single source of truth for shipped-vs-unshipped is the "## Shipped" section
  # of packages/website/src/content/docs/overview/roadmap.md. The roadmap page
  # itself and docs/adr/** are exempt (forward-tense is correct there). See the
  # CLAUDE.md "Version-status tense" rule. ~2s.
  stage: lint
  image: alpine:3.20@sha256:d9e853e87e55526f6b2917df91a2115c36dd7c696a35be12163d44e6e2a4b6bc
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - apk add --no-cache bash grep sed findutils
  script:
    - bash scripts/check-version-status.sh
    - bash scripts/check-version-status.sh --self-test

security:demo-nginx-allowlist:
  extends: .fast-job
  # Public-demo nginx allowlist gate (#1763). The hosted read-only demo
  # (try.trueppm.com / docker-compose.demo.yml) bakes a fixed SECRET_KEY that is
  # safe ONLY because the demo has zero accounts and no authenticated write path —
  # access is exclusively the anonymous, tokenized, read-only share link. A
  # blanket `location /api/ { proxy_pass … }` on the demo's nginx template (the
  # production posture) would expose the full authenticated API to the public
  # internet, breaking that invariant. This gate fails the pipeline if
  # nginx/demo.conf.template ever regresses to proxying anything beyond the vetted
  # allowlist (share endpoints, liveness probe, static, loopback admin). ~1s.
  stage: lint
  image: alpine:3.20@sha256:d9e853e87e55526f6b2917df91a2115c36dd7c696a35be12163d44e6e2a4b6bc
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - apk add --no-cache bash grep sed
  script:
    - bash scripts/check-demo-nginx-allowlist.sh
    - bash scripts/check-demo-nginx-allowlist.sh --self-test

ci:build-api-image:
  # Rebuild and push the custom ci-api image used by the .api / .api-no-db
  # job templates and by mcp:typecheck / mcp:test. Pre-bakes libpq-dev + gcc +
  # all dev-dep wheels (scheduler + api + mcp) so the downstream api:* jobs skip
  # ~3min of cold install on every run (kaizen #640 item 3) and the mcp:* jobs
  # skip their cold mcp[dev] install.
  #
  # Trigger:
  #   - MR pipelines where the Dockerfile or either pyproject.toml changes
  #   - main pipelines where the same files change
  #   - scheduled pipelines (weekly safety net for transitive drift)
  #
  # Jobs that use the image declare `needs: [{job: ci:build-api-image,
  # optional: true}]` so they wait for the build when it's in the pipeline,
  # and pull the existing registry tag when it isn't (the steady state).
  stage: lint
  image: docker:27@sha256:aa3df78ecf320f5fafdce71c659f1629e96e9de0968305fe1de670e0ca9176ce
  services:
    - docker:27-dind@sha256:aa3df78ecf320f5fafdce71c659f1629e96e9de0968305fe1de670e0ca9176ce
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE: "$CI_REGISTRY_IMAGE/ci-api:py3.11"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - packages/api/pyproject.toml
        - packages/scheduler/pyproject.toml
        - packages/mcp/pyproject.toml
        - .gitlab/ci-images/api.Dockerfile
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/api/pyproject.toml
        - packages/scheduler/pyproject.toml
        - packages/mcp/pyproject.toml
        - .gitlab/ci-images/api.Dockerfile
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    # --cache-from lets a no-op rebuild reuse the previously published layers.
    - docker pull "$IMAGE" || true
    - docker build
        --cache-from "$IMAGE"
        --tag "$IMAGE"
        --file .gitlab/ci-images/api.Dockerfile
        .
    - docker push "$IMAGE"

ci:build-scheduler-image:
  # Rebuild and push the custom ci-scheduler image used by the .scheduler
  # template. Pre-bakes the scheduler[dev] wheel tree so the five
  # scheduler:* jobs skip the cold install on every run (kaizen #651,
  # follow-up to #640).
  #
  # Trigger: same shape as ci:build-api-image — Dockerfile / pyproject
  # changes, plus the weekly scheduled run as a transitive-drift safety
  # net. .gitlab-ci.yml is deliberately NOT in the trigger list (see the
  # equivalent decision on ci:build-api-image above).
  stage: lint
  image: docker:27@sha256:aa3df78ecf320f5fafdce71c659f1629e96e9de0968305fe1de670e0ca9176ce
  services:
    - docker:27-dind@sha256:aa3df78ecf320f5fafdce71c659f1629e96e9de0968305fe1de670e0ca9176ce
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE: "$CI_REGISTRY_IMAGE/ci-scheduler:py3.11"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - packages/scheduler/pyproject.toml
        - .gitlab/ci-images/scheduler.Dockerfile
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/scheduler/pyproject.toml
        - .gitlab/ci-images/scheduler.Dockerfile
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker pull "$IMAGE" || true
    - docker build
        --cache-from "$IMAGE"
        --tag "$IMAGE"
        --file .gitlab/ci-images/scheduler.Dockerfile
