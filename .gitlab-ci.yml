helm:lint:
  extends: .fast-job
  image:
    name: alpine/helm:3.14.0@sha256:a90798c9c2b671e3546b10db1ae0b845f9abccc9f9ff79b34744a1ba146b67ed
    entrypoint: [""]
  stage: lint
  <<: *rules-helm
  script:
    - helm lint packages/helm/
    # Guard the bug class from #777: a `DJANGO_SETTINGS_MODULE` typo in the chart
    # (e.g. `settings.production` vs the real `settings.prod`) crash-loops every
    # fresh deploy yet passes `helm lint` silently. Verify every settings module
    # the chart names actually exists in packages/api. Dependency-free (no
    # `helm template`, which would require the subcharts to be built first).
    - |
      fail=0
      for mod in $(grep -rhoE 'trueppm_api\.settings\.[a-z_]+' packages/helm/ | sort -u); do
        f="packages/api/src/$(echo "$mod" | tr '.' '/').py"
        if [ ! -f "$f" ]; then
          echo "ERROR: chart references settings module '$mod' but $f does not exist"
          fail=1
        fi
      done
      [ "$fail" -eq 0 ] || exit 1

backup:restore-drill:
  # Restore drill (#320): the standing evidence that scripts/backup.sh and
  # scripts/restore.sh actually work end to end. Seeds a database (required
  # ltree + pg_trgm extensions and two tables with known row counts), backs it up
  # into a single artifact, DROPs the database, restores from the artifact, and
  # asserts the row counts match and the extensions survived. A schema-only proof
  # — it deliberately does NOT boot Django, so it stays self-contained on the
  # Debian-based postgres:16 image (which carries bash + pg_dump/pg_restore/psql/
  # pg_isready), needing no prebaked registry image.
  #
  # Trigger: nightly schedule (catches rot between changes) + any change to the
  # scripts or the CronJob template (and this CI file, so the job tests itself).
  stage: test
  image:
    name: postgres:16
    # The postgres image ENTRYPOINT starts a database; blank it so GitLab runs
    # the job script instead (same override helm:lint uses for alpine/helm).
    entrypoint: [""]
  services:
    # The service reads POSTGRES_DB/USER/PASSWORD from the global variables block.
    - name: postgres:16-alpine
      alias: postgres
  variables:
    PGPASSWORD: trueppm
    DATABASE_URL: "postgres://trueppm:trueppm@postgres:5432/drilldb"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - scripts/backup.sh
        - scripts/restore.sh
        - packages/helm/templates/cronjob-backup.yaml
        - .gitlab-ci.yml
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - scripts/backup.sh
        - scripts/restore.sh
        - packages/helm/templates/cronjob-backup.yaml
        - .gitlab-ci.yml
  script:
    - echo "waiting for the postgres service..."
    - until pg_isready -h postgres -U trueppm >/dev/null 2>&1; do sleep 1; done
    - psql -h postgres -U trueppm -d trueppm_test -c "CREATE DATABASE drilldb;"
    # Seed a representative schema: the two extensions the real schema depends on
    # (ltree powers wbs_path, pg_trgm powers trigram search) plus two tables with
    # known row counts to assert against after the round-trip.
    - |
      psql "$DATABASE_URL" <<'SQL'
      CREATE EXTENSION IF NOT EXISTS ltree;
      CREATE EXTENSION IF NOT EXISTS pg_trgm;
      CREATE TABLE projects_project (id serial PRIMARY KEY, name text);
      INSERT INTO projects_project (name) SELECT 'p' || g FROM generate_series(1, 42) g;
      CREATE TABLE projects_task (id serial PRIMARY KEY, wbs_path ltree, title text);
      INSERT INTO projects_task (wbs_path, title)
        SELECT ('1.' || g)::ltree, 't' || g FROM generate_series(1, 100) g;
      SQL
    - BEFORE_PROJECTS=$(psql "$DATABASE_URL" -tAc "SELECT count(*) FROM projects_project;")
    - BEFORE_TASKS=$(psql "$DATABASE_URL" -tAc "SELECT count(*) FROM projects_task;")
    - echo "seeded projects=$BEFORE_PROJECTS tasks=$BEFORE_TASKS"
    # 1. back up
    - ./scripts/backup.sh --output-dir "$CI_PROJECT_DIR/drill-backups"
    - ARTIFACT=$(ls -1 "$CI_PROJECT_DIR"/drill-backups/trueppm-backup-*.tar.gz | head -n1)
    - echo "artifact=$ARTIFACT"
    # 2. destroy the source (FORCE drops any lingering connection from pg_dump)
    - psql -h postgres -U trueppm -d trueppm_test -c "DROP DATABASE drilldb WITH (FORCE);"
    - psql -h postgres -U trueppm -d trueppm_test -c "CREATE DATABASE drilldb;"
    # 3. restore (restore.sh verifies ltree + pg_trgm internally and exits non-zero if absent)
    - ./scripts/restore.sh --artifact "$ARTIFACT" --yes
    # 4. assert the round-trip preserved every row
    - AFTER_PROJECTS=$(psql "$DATABASE_URL" -tAc "SELECT count(*) FROM projects_project;")
    - AFTER_TASKS=$(psql "$DATABASE_URL" -tAc "SELECT count(*) FROM projects_task;")
    - echo "restored projects=$AFTER_PROJECTS tasks=$AFTER_TASKS"
    - |
      if [ "$AFTER_PROJECTS" != "$BEFORE_PROJECTS" ] || [ "$AFTER_TASKS" != "$BEFORE_TASKS" ]; then
        echo "RESTORE DRILL FAILED: row counts differ after restore" >&2
        echo "  projects: before=$BEFORE_PROJECTS after=$AFTER_PROJECTS" >&2
        echo "  tasks:    before=$BEFORE_TASKS after=$AFTER_TASKS" >&2
        exit 1
      fi
    - echo "restore drill GREEN — row counts match and required extensions present"

mcp:lint:
  extends: .fast-job
  # Standalone MCP server (packages/mcp, ADR-0186). A pure HTTP client with no
  # prebaked CI image — mirror api:lint's plain-python-slim + pip-install-ruff
  # shape rather than the scheduler's custom-image pattern.
  stage: lint
  image: python:3.11-slim@sha256:ae52c5bef62a6bdd42cd1e8dffef86b9cd284bde9427da79839de7a4b983e7ca
  <<: *rules-mcp
  before_script:
    - pip install ruff --quiet
  script:
    - cd packages/mcp
    - ruff check src/ tests/
    - ruff format --check src/ tests/

# ---------------------------------------------------------------------------
# ANALYZE — type-check, static analysis, migration/schema validation.
# Each job uses needs: to start as soon as its package's lint job passes,
# without waiting for other packages' lint jobs.
# ---------------------------------------------------------------------------

scheduler:type-check:
  extends: [.scheduler, .fast-job]
  stage: analyze
  # Two caches: the inherited pip cache (re-stated via the anchor, since a
  # list cache replaces the template's map rather than merging) plus the mypy
  # incremental cache. mypy --strict is cold-slow; persisting .mypy_cache
  # across pipelines turns most runs into incremental re-checks. Keyed on
  # pyproject.toml so a dependency/stub bump resets it cleanly.
  cache:
    - <<: *scheduler-cache
    - key:
        files:
          - packages/scheduler/pyproject.toml
        prefix: scheduler-mypy
      paths:
        - packages/scheduler/.mypy_cache/
  # ci:build-scheduler-image is optional — when deps haven't changed it
  # isn't in the pipeline and the job pulls the existing tag from the
  # registry. Same pattern repeated on every scheduler:* consumer that
  # overrides needs (GitLab replaces needs on extension).
  needs:
    - scheduler:lint
    - job: ci:build-scheduler-image
      optional: true
  <<: *rules-scheduler
  script:
    - cd packages/scheduler
    # Self-heal an occasionally-corrupt restored incremental cache (#2233). mypy
    # exits 2 on a fatal INTERNAL ERROR (distinct from exit 1 = real type errors);
    # on a crash, drop .mypy_cache and retry once from cold so a corrupt cache
    # flakes green instead of failing the pipeline, while genuine type errors
    # still fast-fail. The happy path keeps the incremental speedup.
    - |
      mypy || {
        rc=$?
        if [ "$rc" -eq 2 ]; then
          echo "mypy INTERNAL ERROR (exit 2) — clearing .mypy_cache and retrying cold"
          rm -rf .mypy_cache
          mypy
        else
          exit "$rc"
        fi
      }

api:type-check:
  extends: [.api-no-db, .fast-job]
  stage: analyze
  # Two caches: the inherited pip cache (re-stated via the anchor with its
  # pull policy, since a list cache replaces the template's map rather than
  # merging) plus the mypy incremental cache. mypy --strict is cold-slow;
  # persisting .mypy_cache across pipelines turns most runs into incremental
  # re-checks. Keyed on pyproject.toml so a dependency/stub bump resets it.
  cache:
    - <<: *api-cache
      policy: pull
    - key:
        files:
          - packages/api/pyproject.toml
        prefix: api-mypy
      paths:
        - packages/api/.mypy_cache/
  # ci:build-api-image is optional — when deps haven't changed it isn't in
  # the pipeline and the job pulls the already-published image from the
  # registry. Same pattern repeated on every job that uses the ci-api image.
  needs:
    - api:lint
    - job: ci:build-api-image
      optional: true
  <<: *rules-api
  script:
    - cd packages/api
    # Self-heal an occasionally-corrupt restored incremental cache (#2233). mypy
    # exits 2 on a fatal INTERNAL ERROR (distinct from exit 1 = real type errors);
    # on a crash, drop .mypy_cache and retry once from cold so a corrupt cache
    # flakes green instead of failing the pipeline, while genuine type errors
    # still fast-fail. The happy path keeps the incremental speedup.
    - |
      mypy src/trueppm_api || {
        rc=$?
        if [ "$rc" -eq 2 ]; then
          echo "mypy INTERNAL ERROR (exit 2) — clearing .mypy_cache and retrying cold"
          rm -rf .mypy_cache
          mypy src/trueppm_api
        else
          exit "$rc"
        fi
      }

api:migration-check:
  # makemigrations --check --dry-run compares model state to migration files.
  # No database connection is made; .api-no-db template is sufficient.
  #
  # Runs on every MR pipeline (no `changes:` filter) — kaizen #640 N5. The job
  # is ~36s and catches inter-MR migration drift that the per-MR `changes:`
  # filter misses (two MRs landing close together each pass migration-check on
  # their own diff, but their merged result fails on main).
  extends: [.api-no-db, .fast-job]
  stage: analyze
  needs:
    - job: api:lint
      optional: true
    - job: ci:build-api-image
      optional: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - cd packages/api
    - python manage.py makemigrations --check --dry-run

api:migration-numbering:
  # Cross-branch migration-numbering collision guard. makemigrations --check
  # (above) only sees THIS branch's tree, so it cannot catch two parallel
  # branches that each number a migration projects/0080_*.py off the same base:
  # both pass, the first merges, and the second — still on a stale base — merges
  # too, leaving main with two 0080 leaf migrations (a conflict that needs a
  # renumber or a --merge migration, with main red in the meantime).
  #
  # This job compares the branch against origin/main and fails if a NEW migration
  # reuses a number main already assigns to a different migration — the state that
  # becomes a two-leaf conflict at merge, detectable on the second branch BEFORE
  # it merges. Pure git + stdlib Python: no DB, no Django, no dependency install,
  # so before_script (the api[dev] pip install) is skipped. GIT_DEPTH:0 + an
  # explicit fetch make origin/main available under GitLab's shallow clone.
  extends: [.api-no-db, .fast-job]
  stage: analyze
  variables:
    GIT_DEPTH: "0"
  needs:
    - job: ci:build-api-image
      optional: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  before_script: []
  script:
    # The ci-api image's step_script runs as a different UID than the runner's
    # get_sources checkout, so git 2.35.2+ refuses the fetch with "detected
    # dubious ownership" unless the build dir is marked safe. This is the only
    # ci-api job that runs git on the main pipeline (before_script:[] skips the
    # pip install too), so the exception is scoped here rather than shared.
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - git fetch origin "$CI_DEFAULT_BRANCH" --quiet
    - python3 scripts/check-migration-numbering.py "origin/$CI_DEFAULT_BRANCH"

api:openapi-check:
  # drf-spectacular schema generation is pure view/serializer introspection;
  # no database queries are made. --validate checks for valid OpenAPI 3;
  # --fail-on-warn promotes warnings to errors.
  extends: [.api-no-db, .fast-job]
  stage: analyze
  needs:
    - api:lint
    - job: ci:build-api-image
      optional: true
  <<: *rules-api
  script:
    - cd packages/api
    - python manage.py spectacular --validate --file /dev/null

api:schema-drift:
  # Ensures docs/api/openapi.json stays in sync with the live DRF schema.
  # Fails the pipeline if a model/serializer/view change alters the public
  # surface without the committed artifact being regenerated.
  #
  # api:lint is optional because this job's changes: filter includes
  # docs/api/openapi.json — a docs-only branch (e.g. an openapi regen
  # alongside ADR commits) matches this job's rules without matching
  # api:lint's rules-api. needs:optional avoids the "needs job does
  # not exist in the pipeline" creation failure in that case.
  extends: [.api-no-db, .fast-job]
  stage: analyze
  needs:
    - job: api:lint
      optional: true
    - job: ci:build-api-image
      optional: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/api/**/*
        - packages/scheduler/**/*
        - docs/api/openapi.json
        - scripts/export-openapi.sh
        - .gitlab-ci.yml
  script:
    - ./scripts/export-openapi.sh --check

api:uv-lock-check:
  extends: .fast-job
  # Verify packages/api/uv.lock stays in sync with packages/api/pyproject.toml
  # (#904 supply-chain hardening). Both the api (application) and the scheduler
  # (published library) commit a resolved lockfile — for reproducible installs
  # and a scannable dependency surface (an SCA tool can audit a lockfile; it
  # cannot audit a range). This gate fails if pyproject changed without
  # re-locking; refresh with `cd packages/api && uv lock`. uv is pinned so the
  # committed lock's revision stays stable across CI runs and Renovate's
  # lockFileMaintenance owns the routine refreshes.
  stage: analyze
  image: python:3.11-slim@sha256:ae52c5bef62a6bdd42cd1e8dffef86b9cd284bde9427da79839de7a4b983e7ca
  needs: []
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/api/pyproject.toml
        - packages/api/uv.lock
        - .gitlab-ci.yml
  before_script:
    - pip install uv==0.9.5 --quiet
  script:
    - cd packages/api
    - uv lock --check

scheduler:uv-lock-check:
  extends: .fast-job
  # Verify packages/scheduler/uv.lock stays in sync with the scheduler's
  # pyproject.toml (#1153 scheduler OSV migration). The scheduler now commits a
  # resolved lock — not to pin the published wheel (it still ships version ranges
  # from pyproject.toml) but to give security:osv a scannable dependency surface
  # (OSV can audit a lockfile; it cannot audit a range). This gate fails if
  # pyproject changed without re-locking; refresh with
  # `cd packages/scheduler && uv lock`. uv is pinned so the committed lock's
  # revision stays stable across CI runs and Renovate's lockFileMaintenance owns
  # the routine refreshes. Mirrors api:uv-lock-check; kept as its own job so a
  # scheduler-only change does not pull in the api manifests and vice versa.
  stage: analyze
  image: python:3.11-slim@sha256:ae52c5bef62a6bdd42cd1e8dffef86b9cd284bde9427da79839de7a4b983e7ca
  needs: []
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/scheduler/pyproject.toml
        - packages/scheduler/uv.lock
        - .gitlab-ci.yml
  before_script:
    - pip install uv==0.9.5 --quiet
  script:
    - cd packages/scheduler
    - uv lock --check

web:type-check:
  extends: [.web, .fast-job]
  stage: analyze
  needs: [web:lint]
  <<: *rules-web
  script:
    - npm run typecheck

mcp:typecheck:
  extends: .fast-job
  # mypy --strict over packages/mcp. Uses the custom ci-api image, which now
  # pre-bakes the mcp[dev] wheels (mcp SDK + httpx + stubs) alongside api's; the
  # runtime install is a fast editable re-link, not a cold download. mypy reads
  # the package's own pyproject config (packages = ["trueppm_mcp"], strict).
  # ci:build-api-image is optional — when deps haven't changed it isn't in the
  # pipeline and the job pulls the existing tag from the registry.
  stage: analyze
  image: $CI_REGISTRY_IMAGE/ci-api:py3.11
  needs:
    - mcp:lint
    - job: ci:build-api-image
      optional: true
  <<: *rules-mcp
  before_script:
    - pip install -e "packages/mcp[dev]" --quiet
  script:
    - cd packages/mcp
    - mypy

mobile:type-check:
  extends: [.mobile, .fast-job]
  stage: analyze
  needs: [mobile:lint]
  <<: *rules-mobile
  script:
    - npm run typecheck

wasm:build:
  # Verify the WASM crate compiles to wasm32. The pkg/ output is not passed
  # downstream — this validates the build is clean.
  extends: .wasm
  stage: analyze
  # wasm-pack + the wasm32 target are baked into the ci-wasm image; the job just
  # builds. Re-add the optional ci:build-wasm-image need (extends replaces the
  # template's needs list).
  needs:
    - wasm:lint
    - job: ci:build-wasm-image
      optional: true
  <<: *rules-wasm
  script:
    - wasm-pack build --target web --release

web:build:
  # Builds the production bundle and publishes dist/ as an artifact so the
  # sharded web:e2e jobs can serve it via `vite preview` (webServer in
  # playwright.config.ts) without each shard rebuilding. web:test runs vitest
  # independently.
  extends: .web
  stage: analyze
  needs: [web:lint]
  <<: *rules-web
  script:
    - npm run build
  artifacts:
    paths:
      - packages/web/dist/
    expire_in: 1 day

security:bandit:scheduler:
  extends: .fast-job
  # Python static security analysis for the scheduler package.
  # Runs in analyze stage alongside type-check — static, no test results needed.
  # -ll = medium severity and above.
  stage: analyze
  needs: [scheduler:lint]
  image: python:3.11-slim@sha256:ae52c5bef62a6bdd42cd1e8dffef86b9cd284bde9427da79839de7a4b983e7ca
  <<: *rules-scheduler
  before_script:
    - pip install bandit --quiet
  script:
    - bandit -r packages/scheduler/src/ -ll
        --exclude packages/scheduler/src/trueppm_scheduler/__pycache__

security:bandit:api:
  extends: .fast-job
  # Python static security analysis for the API package.
  # Split from bandit:scheduler so each gates only on its own lint job —
  # a web-only branch no longer triggers a full Python security scan.
  stage: analyze
  needs: [api:lint]
  image: python:3.11-slim@sha256:ae52c5bef62a6bdd42cd1e8dffef86b9cd284bde9427da79839de7a4b983e7ca
  <<: *rules-api
  before_script:
    - pip install bandit --quiet
  script:
    - bandit -r packages/api/src/ -ll
        --exclude packages/api/src/trueppm_api/settings,packages/api/src/trueppm_api/apps/projects/migrations,packages/api/src/trueppm_api/apps/resources/migrations

# ---------------------------------------------------------------------------
# TEST — unit + integration tests.
# Each package starts as soon as its own analyze jobs pass, not when all
# packages' analyze jobs are done (DAG via needs:).
# ---------------------------------------------------------------------------

scheduler:test:
  extends: .scheduler
  stage: test
  needs:
    - scheduler:lint
    - scheduler:type-check
    - job: ci:build-scheduler-image
      optional: true
  <<: *rules-scheduler
  script:
    - cd packages/scheduler
    - pytest --cov=trueppm_scheduler --cov-report=term-missing --cov-report=xml --cov-fail-under=80
  coverage: '/TOTAL.*\s(\d+%)/'
  artifacts:
    paths:
      - packages/scheduler/coverage.xml
    expire_in: 7 days
    when: always

mcp:test:
  # pytest over packages/mcp. The auth + transport surface is exercised against
  # httpx.MockTransport, so no running API or network is needed. 80% floor
  # mirrors the other Python packages. Uses the ci-api image (mcp[dev] baked);
  # the runtime install is a fast editable re-link. ci:build-api-image is
  # optional — pulls the existing registry tag when deps haven't changed.
  stage: test
  image: $CI_REGISTRY_IMAGE/ci-api:py3.11
  needs:
    - mcp:lint
    - mcp:typecheck
    - job: ci:build-api-image
      optional: true
  <<: *rules-mcp
  before_script:
    - pip install -e "packages/mcp[dev]" --quiet
  script:
    - cd packages/mcp
    - pytest --cov=trueppm_mcp --cov-report=term-missing --cov-report=xml --cov-fail-under=80
  coverage: '/TOTAL.*\s(\d+%)/'
  artifacts:
    paths:
      - packages/mcp/coverage.xml
    expire_in: 7 days
    when: always

scheduler:bench:
  # Performance regression guard for the CPM engine.
  # Runs on every MR that touches packages/scheduler/ and on main.
  # Timing output is stored as an artifact so regressions can be spotted
  # by comparing successive runs in the GitLab UI.
  # The test itself hard-fails at 2s (catastrophic regression circuit-breaker);
  # the > 20% regression signal requires manual comparison of artifacts.
  extends: .scheduler
  stage: test
  needs:
    - scheduler:test
    - job: ci:build-scheduler-image
      optional: true
  <<: *rules-scheduler
  script:
    - cd packages/scheduler
    - pytest tests/test_bench.py -v --tb=short 2>&1 | tee bench-output.txt
  artifacts:
    paths:
      - packages/scheduler/bench-output.txt
    expire_in: 30 days

scheduler:notebooks:
  # Execute all scheduler notebooks to catch code drift and broken examples.
  # jupyter nbconvert --execute runs each cell in order; a cell that raises an
  # exception fails the job. matplotlib is optional — notebooks guard against
  # ImportError with a try/except so missing it is not a failure.
  extends: .scheduler
  stage: test
  needs:
    - scheduler:test
    - job: ci:build-scheduler-image
      optional: true
  <<: *rules-scheduler
  script:
    - cd packages/scheduler
    - pip install jupyter nbconvert
    - jupyter nbconvert --to notebook --execute --inplace notebooks/*.ipynb
  artifacts:
    paths:
      - packages/scheduler/notebooks/*.ipynb
    expire_in: 7 days

scheduler:fuzz-deep:
  # Tier B of the contract-fuzzing strategy (#1456). The deterministic Tier A
  # gate runs inside scheduler:test on every MR (the `gate` Hypothesis profile);
  # this job runs the same properties under the `deep` profile — stochastic, with
  # a large example budget and a persisted corpus — and ONLY on scheduled
  # pipelines, so it never blocks an MR. A failure here is a real contract
  # finding: triage it into a deterministic case in test_redteam_hardening.py.
  extends: .scheduler
  stage: test
  needs:
    - job: ci:build-scheduler-image
      optional: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  # Persist Hypothesis's example database across scheduled runs so the search
  # accumulates a shrinking corpus of interesting inputs rather than starting
  # cold each night. Separate cache key from the pip cache (a list cache replaces
  # the template map, so re-state the pip cache via the anchor).
  cache:
    - <<: *scheduler-cache
      policy: pull
    - key: scheduler-fuzz-corpus
      paths:
        - packages/scheduler/.hypothesis/
  variables:
    HYPOTHESIS_PROFILE: deep
    FUZZ_MAX_EXAMPLES: "50000"
  script:
    - cd packages/scheduler
    - pytest -m fuzz -p no:cacheprovider --no-cov
  artifacts:
    paths:
      - packages/scheduler/.hypothesis/
    expire_in: 30 days
    when: always

api:fuzz:
  # Nightly OpenAPI contract-fuzzing of the live HTTP API with Schemathesis
  # (#2121) — the API-surface sibling of scheduler:fuzz-deep. Schedule-only and
  # non-gating: it runs on the existing nightly pipeline (the workflow rules
  # admit only the Renovate and SonarCloud schedules, and this piggybacks on
  # them the same way scheduler:fuzz-deep does) and NEVER blocks an MR. A red run
  # is a triage signal, not a merge gate — reproduce the failing case as a
  # deterministic pytest, then fix.
  #
  # `allow_failure: true` (#2212) encodes exactly that intent: a fuzz finding must
  # NOT red the nightly *schedule* pipeline, which is shared with Renovate and
  # SonarCloud — a red there conflates "the API has a 500" with "a dependency
  # needs review" and trains maintainers to ignore nightly red. The findings stay
  # visible via the JUnit report (pipeline Tests tab + a ⚠️ warning on the job)
  # and the 30-day artifact; a green pipeline is still the correct outcome. The
  # durable signal (failure -> auto-file/notify) is tracked in #2212.
  #
  # Boots the same real stack as web:integration (Django + PostgreSQL + Valkey),
  # seeds the integration fixtures, mints a JWT for the seeded OWNER user, then
  # fuzzes every documented operation as an authenticated caller.
  #
  # Checks are deliberately scoped to `not_a_server_error` (unhandled 500s) and
  # `response_schema_conformance` (responses that violate the declared schema) —
  # NOT `--checks all`. The other checks (undocumented 4xx status codes,
  # negative-data rejection) fire on hundreds of operations that merely document
  # their responses loosely; including them buries the real defects under
  # thousands of conformance nits. Tighten the schema first, then add those
  # checks back if we want a documentation-accuracy gate.
  stage: test
  allow_failure: true
  image: $CI_REGISTRY_IMAGE/ci-integration:noble
  needs:
    - job: ci:build-integration-image
      optional: true
  services:
    - name: postgres:16-alpine
      alias: postgres
    - name: valkey/valkey:8-alpine
      alias: valkey
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  variables:
    DJANGO_SETTINGS_MODULE: trueppm_api.settings.dev
    TRUEPPM_ALLOW_DEV_SETTINGS: "1"
    DATABASE_URL: "postgres://trueppm:trueppm@postgres/trueppm_test"
    REDIS_URL: "redis://valkey:6379"
    # Non-secret CI key — dev settings enforce ALLOWED_HOSTS=* + AllowAny guard.
    SECRET_KEY: "ci-fuzz-secret-not-for-production"
    INTEGRATION_USER_EMAIL: "ci@trueppm.test"
    INTEGRATION_USER_PASSWORD: "ci-fuzz-pw"
    # The fuzzer signs in once to mint a token; relax the per-account login
    # throttle so token exchange isn't rate-limited (as web:integration, #1717).
    TRUEPPM_THROTTLE_LOGIN_ACCOUNT_RATE: "1000/min"
    # Hypothesis examples per operation. ~550 operations, so 30/op is a
    # substantial nightly pass without running for hours.
    FUZZ_MAX_EXAMPLES: "30"
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  before_script:
    - *retry-fn
    # Image bakes scheduler[dev] + api[dev]; re-link editable + add the fuzz
    # extra (Schemathesis). [binary] pulls psycopg for the DB connection.
    - retry pip install -e "packages/scheduler[dev]" --quiet
    - retry pip install -e "packages/api[binary,fuzz]" --quiet
    - cd packages/api
    - python manage.py migrate --noinput
    - python manage.py seed_integration_fixtures
    # Start the Django ASGI server in the background.
    - >
      PYTHONPATH=src uvicorn trueppm_api.asgi:application
      --host 127.0.0.1 --port 8000 &
    - cd ../..
    # Wait up to 30 s for Django to accept connections.
    - >
      timeout 30 sh -c
      'until curl -sf http://127.0.0.1:8000/api/v1/health/ > /dev/null;
       do sleep 1; done'
    # Mint a JWT for the seeded OWNER user so the fuzzer exercises authenticated
    # read+write operations, not just the anonymous 401 path.
    - >
      FUZZ_TOKEN=$(curl -sf -X POST http://127.0.0.1:8000/api/v1/auth/token/
      -H 'Content-Type: application/json'
      -d "{\"username\":\"$INTEGRATION_USER_EMAIL\",\"password\":\"$INTEGRATION_USER_PASSWORD\"}"
      | python -c 'import sys, json; print(json.load(sys.stdin)["access"])')
    - export FUZZ_TOKEN
  script:
    - cd packages/api
    - >
      schemathesis run http://127.0.0.1:8000/api/schema/
      --url http://127.0.0.1:8000
      --checks not_a_server_error,response_schema_conformance
      --max-examples "$FUZZ_MAX_EXAMPLES"
      --header "Authorization: Bearer $FUZZ_TOKEN"
      --workers 4
      --report junit --report-junit-path junit-fuzz.xml
  artifacts:
    when: always
    reports:
      junit: packages/api/junit-fuzz.xml
    paths:
      - packages/api/junit-fuzz.xml
    expire_in: 30 days

wasm:test:
  extends: .wasm
  stage: test
  needs:
    - wasm:lint
    - wasm:build
    - job: ci:build-wasm-image
      optional: true
  <<: *rules-wasm
  script:
    - cargo test --all-targets

wasm:conformance:
  # Cross-engine conformance: run the Python scheduler against the same shared
  # fixtures that the Rust tests use. If both pass, the engines agree.
  stage: test
  image: python:3.11-slim@sha256:ae52c5bef62a6bdd42cd1e8dffef86b9cd284bde9427da79839de7a4b983e7ca
  needs:
    # Both needs are optional: this job fires on scheduler OR wasm-scheduler
    # changes, but scheduler:lint only fires on scheduler changes and
    # wasm:lint only fires on wasm-scheduler changes. A wasm-scheduler-only
    # MR schedules conformance + wasm:lint but not scheduler:lint (and vice
    # versa for a scheduler-only MR). Without optional on both, GitLab fails
    # the whole pipeline with "needs job does not exist" the moment either
    # side is scheduled without the other.
    - job: scheduler:lint
      optional: true
    - job: wasm:lint
      optional: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/wasm-scheduler/**/*
        - packages/scheduler/**/*
        - .gitlab-ci.yml
  cache:
    <<: *scheduler-cache
    policy: pull
  before_script:
    - pip install -e "packages/scheduler[dev]" --quiet
  script:
    - cd packages/scheduler
    - pytest tests/test_wasm_conformance.py -v

api:testdb-dump:
  # Run real migrations ONCE per pipeline and dump the resulting schema+data so
  # the api:test shards clone each pytest-xdist worker DB from it instead of
  # replaying ~147 migrations per worker (#688, follow-up to #680 sharding).
  # The dump preserves the ltree extension, the wbs_path GiST index, and the
  # data backfills that `--no-migrations` would skip. Runs in the lint stage,
  # overlapping lint/type-check. Since #1121 trimmed api:test's gates to data
  # deps only, api:test starts the moment this job's artifact is ready — so this
  # job IS the api:test start-gate. To keep that gate cheap, the migrate + dump
  # is cached on a migration-file fingerprint (#1122): on the ~70% of MRs that
  # touch no migration, the cached dump is reused and the migrate is skipped.
  extends: .api
  stage: lint
  <<: *rules-api
  cache:
    # Two caches as a list (a list cache replaces the template's map, so the
    # inherited pip cache is re-stated). The second entry persists the migrated
    # schema dump + its fingerprint across pipelines under a static, branch-
    # agnostic key, so a feature-branch run can reuse a dump built by a recent
    # main pipeline. Correctness never depends on cache contents — the in-script
    # fingerprint guard re-migrates on any drift (#1122). Bump -v1 to bust.
    - <<: *api-cache
      policy: pull
    - key: api-testdb-schema-v1
      paths:
        - testdb-schema.sql
        - .testdb-migrations.sha256
  script:
    # Reuse a cached schema dump when no migration changed (#1122). Fingerprint
    # every api migration file by content; if it matches the fingerprint saved
    # next to a cached dump, the schema is identical and we skip the ~150s
    # migrate + dump (and the #1039 cold-Postgres variance). The guard is
    # authoritative — a cache miss or any drift (added/edited/deleted migration)
    # falls through to a full migrate, so correctness never rests on the cache.
    - |
      MIG_FP=$(find packages/api/src -path '*/migrations/*.py' -not -name '__init__.py' \
        | sort | xargs sha256sum | sha256sum | awk '{print $1}')
      echo "migration fingerprint: $MIG_FP"
      if [ -f testdb-schema.sql ] && [ -f .testdb-migrations.sha256 ] \
         && [ "$(cat .testdb-migrations.sha256)" = "$MIG_FP" ]; then
        echo "migrations unchanged since cached dump — reusing it, skipping migrate+pg_dump"
        exit 0
      fi
      echo "migrations changed or no cached dump — running full migrate + dump"
    # Bootstrap fallback for a stale cached image. The ci-api image bakes
    # postgresql-client-16 (api.Dockerfile), but it ships under the mutable
    # :py3.11 tag, and runners here pull with if-not-present (they disallow
    # `always`) — so the very pipeline that first adds the client can land on a
    # runner still holding the prior image without it. Install at runtime only
    # when pg_dump is missing; once main rebuilds the image this is a no-op.
    # Mirrors the Dockerfile's PGDG install (#688).
    - &ensure-pg-client |
      if ! command -v pg_dump >/dev/null 2>&1; then
        echo "pg_dump missing — installing postgresql-client-16 (stale cached image)"
        apt-get update -qq
        apt-get install -y -qq --no-install-recommends curl ca-certificates gnupg
        install -d /usr/share/postgresql-common/pgdg
        curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
        # Verify the PGDG signing key against a known sha256 (#904 supply-chain
        # hardening) — same pinned hash as .gitlab/ci-images/api.Dockerfile. A
        # substituted key (postgresql.org compromise / DNS hijack) aborts here
        # rather than signing a substituted postgresql-client. Bump both if PGDG
        # ever re-publishes the key (fingerprint must stay ACCC4CF8).
        echo "0144068502a1eddd2a0280ede10ef607d1ec592ce819940991203941564e8e76  /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc" | sha256sum -c -
        echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt bookworm-pgdg main" > /etc/apt/sources.list.d/pgdg.list
        apt-get update -qq
        apt-get install -y -qq --no-install-recommends postgresql-client-16
      fi
    - cd packages/api
    # Wait for the Postgres service to accept connections before migrating —
    # on cold runner starts `migrate` stalls in the TCP connect phase and
    # inflates this job 30s→170s, dragging the api:test critical path (#1039).
    # Non-fatal: if Postgres still isn't up after 30s, migrate fails with its
    # own clearer error.
    - timeout 30 sh -c 'until pg_isready --dbname "$DATABASE_URL" >/dev/null 2>&1; do sleep 1; done' || echo "warning - postgres not ready after 30s, proceeding"
    - python manage.py migrate --no-input
    # --no-owner/--no-privileges keep the dump role-portable so it reloads
    # cleanly into the `migrated` template under the same CI role on the shards.
    - pg_dump --no-owner --no-privileges --dbname "$DATABASE_URL" --file "$CI_PROJECT_DIR/testdb-schema.sql"
    # Persist the fingerprint beside the dump so the next pipeline's guard can
    # validate the cache. Written at repo root to match the cache: paths above.
    - echo "$MIG_FP" > "$CI_PROJECT_DIR/.testdb-migrations.sha256"
  artifacts:
    paths:
      - testdb-schema.sql
    expire_in: 1 day
    when: always

api:test:
  extends: .api
  stage: test
  # Sharded into 4 groups with pytest-split; each shard fans out to a FIXED -n 4
  # xdist workers (#1303). NOT -n auto: xdist's `auto` resolves to os.cpu_count()
  # — the host logical-CPU count, ignoring any cgroup quota — so on a multi-slot
  # runner (concurrency > 1) every co-tenant shard would grab the whole box
  # (12–16 workers each) and thrash the cores, plus stack a postgres service per
  # shard. A fixed -n 4 keeps the whole stage at 4 shards × 4 = 16 workers, which
  # fits within the two-NUC fleet (6c/12t + 8c/16t) even when shards co-tenant,
  # so the slowest shard — which gates api:coverage (it needs all 4) — runs at a
  # deterministic speed instead of contending. Retune this if runner cores/
  # concurrency change materially. pytest-django gives every xdist worker its own
  # test DB (test_trueppm_test_gw0, _gw1, …) so isolation is preserved.
  # pytest-split reads the committed packages/api/.test_durations baseline and
  # rebalances the per-test timings into N groups at runtime, so the same
  # baseline works for any shard count — bumping 2→4 (#1120) needs no regen,
  # though the api:test-durations job (manual + scheduled, #687) still refreshes
  # it. If the baseline is ever missing, pytest-split falls back to an even
  # test-count split. Each shard emits a partial coverage data file
  # (.coverage.<index>); api:coverage combines them into coverage.xml for the
  # diff-coverage gate and the package soft floor. Mirrors the web:e2e shard →
  # web:e2e:report stitch pattern.
  parallel: 4
  # needs lists only api:test's true data dependencies (#1121): the lint gate
  # (cheap fail-fast, keeps a full sharded run off obviously-broken code) and
  # the testdb-dump artifact it clones the template DB from. type-check,
  # migration-check, and openapi-check are independent quality gates — tests
  # consume none of their output — so they no longer block test start; they run
  # in parallel and still gate the MR merge. Trade-off: a run can proceed while
  # one of those gates is failing (rare), spending runner minutes we'd
  # previously have short-circuited. Worth it — they're the analyze-stage long
  # poles, and decoupling lets the 4 shards start as soon as testdb-dump lands.
  needs:
    - api:lint
    - job: api:testdb-dump
      artifacts: true
    - job: ci:build-api-image
      optional: true
  <<: *rules-api
  variables:
    # Distinct data file per shard so api:coverage's combine doesn't clash.
    # pytest-cov honors COVERAGE_FILE for the final xdist-combined data file.
    COVERAGE_FILE: ".coverage.$CI_NODE_INDEX"
    # Activates the test-only TEST.TEMPLATE branch in settings.dev (#688) so
    # pytest-django clones each worker DB from `migrated` instead of replaying
    # migrations. Built from the api:testdb-dump artifact in before_script.
    TRUEPPM_TEST_DB_TEMPLATE: migrated
  before_script:
    # Same stale-image bootstrap fallback as api:testdb-dump — installs psql/
    # pg_dump when the cached image predates them; a no-op once baked (#688).
    - *ensure-pg-client
    # before_script OVERRIDES (does not merge with) .api's, so the editable
    # re-link is repeated here.
    - pip install -e "packages/scheduler[dev]" --quiet
    - pip install -e "packages/api[dev]" --quiet
    # Build the `migrated` template DB from the dumped schema (#688). Each
    # parallel shard has its own postgres service, so each builds its own copy;
    # the dump already contains CREATE EXTENSION ltree + the GiST index + data.
    - psql "postgres://trueppm:trueppm@postgres/trueppm_test" -c "CREATE DATABASE migrated;"
    - psql "postgres://trueppm:trueppm@postgres/migrated" -f "$CI_PROJECT_DIR/testdb-schema.sql"
  script:
    - cd packages/api
    - python -m pytest tests/ --tb=short -q -n 4
        --splits "$CI_NODE_TOTAL" --group "$CI_NODE_INDEX"
        --cov=trueppm_api --cov-report=
  artifacts:
    paths:
      - packages/api/.coverage.*
    expire_in: 1 day
    when: always

api:coverage:
  # Combines the per-shard coverage data from api:test into a single coverage.xml
  # for api:diff-coverage (the primary tests gate) and enforces the package-total
  # soft floor against legacy regressions. Runs in the same ci-api image the
  # shards used, so the coverage data format matches.
  extends: .api-no-db
  stage: test
  needs:
    - job: api:test
      artifacts: true
    - job: ci:build-api-image
      optional: true
  <<: *rules-api
  script:
    - cd packages/api
    - coverage combine
    - coverage xml
    - coverage report --fail-under=80
  coverage: '/TOTAL.*\s(\d+%)/'
  artifacts:
    paths:
      - packages/api/coverage.xml
    expire_in: 7 days
    when: always

api:test-durations:
  # Generates packages/api/.test_durations — the per-test wall-time baseline
  # pytest-split uses to balance the two api:test shards (#687, follow-up to
  # the #680 sharding). Without this file pytest-split falls back to an even
  # test-COUNT split, which unbalances the shards whenever a few slow tests
  # dominate one group and erases the sharding win.
  #
  # Runs serially and WITHOUT coverage so the recorded numbers are clean
  # per-test wall-times: coverage tracing and xdist contention both skew them,
  # and pytest-split only needs the relative ordering to pack the groups.
  # --clean-durations prunes entries for tests that no longer exist so the
  # committed baseline doesn't accumulate dead weight across refreshes.
  #
  # Trigger:
  #   - scheduled pipelines refresh the baseline as the suite grows;
  #   - manual on any MR or main to regenerate on demand.
  # This job does NOT commit its result — it publishes .test_durations as an
  # artifact. Refresh cadence: download the artifact from the latest scheduled
  # run and commit it to packages/api/.test_durations (a periodic chore, or
  # whenever shard balance visibly drifts). allow_failure keeps a slow or
  # flaky full-suite run from ever blocking an MR.
  extends: .api
  stage: test
  needs:
    - job: ci:build-api-image
      optional: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
      allow_failure: true
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: true
  script:
    - cd packages/api
    - python -m pytest tests/ -q --store-durations --clean-durations
  artifacts:
    paths:
      - packages/api/.test_durations
    expire_in: 30 days
    when: always

web:test-integrity:
  # Guards issue #1657: web:test's only vitest call is `npm run test:coverage`, and
  # a positional path filter in that script silently drops whole directories of
  # specs from CI (src/workers, src/utils, src/styles, App.test.tsx, scripts/*)
  # without failing anything. check-all-tests-run.mjs fails if any test file on
  # disk is not collected by that command. `needs: []` runs it as soon as the
  # pipeline starts (independent of the slow shards) so a re-introduced allowlist
  # fails fast.
  extends: [.web, .fast-job]
  stage: test
  needs: []
  <<: *rules-web
  script:
    - node scripts/check-all-tests-run.mjs

web:test:
  extends: .web
  stage: test
  # Sharded across 4 runners (vitest splits by test file). The configured
  # singleFork pool (fileParallelism: false) keeps each shard's jsdom heap bounded;
  # since the runner is single-core per shard, intra-shard parallelism would not
  # help wall-clock and only reinflates the heap that forced singleFork — so the
  # lever is shard count, not pool concurrency. Profiling (#1295) showed the suite
  # is evenly distributed (no dominant spec; the two old shards ran 301s/302s — a
  # <0.5% imbalance), so wall-clock per shard scales ~linearly with shard count.
  # At parallel: 2 each shard ran ~301s — 2x the next-longest test job (api:test
  # 4/4 at ~161s). At parallel: 4 each shard handles ~115 files (~150s), dropping
  # web:test into the api:test band so it is no longer the critical-path leader;
  # more shards also means fewer files per shard, which *eases* OOM pressure rather
  # than adding to it. api:test already runs parallel: 4 on the same pool. Each
  # shard is a single core (singleFork), so each added shard costs only +1 worker
  # on the fleet — unlike api:test's 4-xdist shards, bumping web:test's shard count
  # does not risk the 28-thread ceiling api:test is tuned against. Raised 4 → 6
  # (#1702) after the 0.4 test-suite growth (+172 web spec files in one week) crept
  # each shard back to ~219s and re-made web:test the critical-path pole; at 6 it
  # handles ~77 files/shard (~100s), ceding the pole to api:test again with runway
  # for continued growth. Each
  # shard writes partial istanbul coverage (coverage-final.json) to
  # coverage-<index>/; web:coverage stitches them (merge-coverage.mjs discovers the
  # coverage-<n>/ dirs dynamically — shard-count-agnostic) for the diff-coverage
  # gate. The `--` forwards the shard + output-dir flags to vitest while preserving
  # the dir filter and coverage config from test:coverage.
  needs: [web:lint, web:type-check, web:build]
  parallel: 6
  <<: *rules-web
  script:
    - npm run test:coverage --
        --shard="$CI_NODE_INDEX/$CI_NODE_TOTAL"
        --coverage.reportsDirectory="coverage-$CI_NODE_INDEX"
  artifacts:
    paths:
      - packages/web/coverage-*/coverage-final.json
    expire_in: 1 day
    when: always

web:coverage:
  # Stitches the per-shard istanbul coverage from web:test into a single
  # coverage/lcov.info for web:diff-coverage (the primary tests gate) and enforces
  # the package-total line floor. Runs in the cached node image (.web) and merges
  # the coverage maps with scripts/merge-coverage.mjs — no GNU lcov install. The
  # old python:3.11-slim job had to `apt-get install lcov`, which drags in
  # perl + binutils for ~5 min while the merge itself took <1s; the map-level
  # merge here is <1s and also sidesteps the istanbul duplicate-function-name
  # inconsistency that forced --ignore-errors on the lcov text-merge path.
  extends: .web
  stage: test
  needs:
    - job: web:test
      artifacts: true
  <<: *rules-web
  variables:
    # Package-total line floor against legacy regressions, enforced on the merged
    # result (vitest can't — no single shard sees it). Mirrors the api:coverage
    # --fail-under=80 soft floor. The primary gate is web:diff-coverage.
    WEB_COVERAGE_MIN: "75"
    # Full history — check-added-files-covered.mjs diffs against the MR target's
    # merge-base, which a shallow clone may not contain.
    GIT_DEPTH: "0"
  script:
    - node scripts/merge-coverage.mjs
    # Fail if a file ADDED in this MR never entered the merged coverage map —
    # the new-untested-file dodge diff-cover cannot see (issue #1510). Runs here
    # (not web:diff-coverage) because that job's python:3.11-slim image has no
    # node. node:alpine has no git, so install it only in MR context where the
    # check actually diffs.
    - |
      if [ -n "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME" ]; then
        apk add --no-cache --quiet git
        git config --global --add safe.directory "$CI_PROJECT_DIR"
        git fetch --quiet origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
        node scripts/check-added-files-covered.mjs
      fi
  coverage: '/line coverage ([\d.]+)%/'
  artifacts:
    paths:
      - packages/web/coverage/lcov.info
    expire_in: 7 days
    when: always

# ---------------------------------------------------------------------------
# DIFF COVERAGE — gate on lines changed vs the MR target branch.
# Enforces ≥ $COVERAGE_DIFF_MIN% line coverage on new/changed code, regardless
# of whether the package total moves. This is the primary "new feature must
# have tests" gate; the package-total --cov-fail-under flag stays as a soft
# floor against legacy regressions.
#
# Bump COVERAGE_DIFF_MIN to 90 post-beta. MR-only — there's no diff to
# measure on main.
# ---------------------------------------------------------------------------

.diff-coverage:
  stage: test
  variables:
    GIT_DEPTH: "0"
    COVERAGE_DIFF_MIN: "80"

scheduler:diff-coverage:
  extends:
    - .scheduler
    - .diff-coverage
  needs:
    - job: scheduler:test
      artifacts: true
    - job: ci:build-scheduler-image
      optional: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/scheduler/**/*
        - .gitlab-ci.yml
  script:
    # python:3.11-slim ships without git; required by `git fetch` and by
    # diff-cover internally (it shells out to `git diff`).
    - apt-get update -qq && apt-get install -y -qq --no-install-recommends git
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
    - cd packages/scheduler
    - diff-cover coverage.xml
        --compare-branch="origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
        --fail-under="$COVERAGE_DIFF_MIN"

api:diff-coverage:
  extends: .diff-coverage
  # Run on the pre-baked ci-api image (same one api:coverage uses) instead of
  # bare python:3.11-slim + a runtime `pip install diff-cover`. The bare-slim
  # path booted a fresh image and installed diff-cover on every run, so a single
  # runner holding a corrupted cached python:3.11-slim layer — pip's own vendored
  # files failing to decode — reliably reddened this gate with nothing wrong in
  # the code (#2234). ci-api bakes git + diff-cover (via packages/api[dev]), so
  # no apt-get / pip install is needed at job time.
  image: $CI_REGISTRY_IMAGE/ci-api:py3.11
  needs:
    - job: api:coverage
      artifacts: true
    - job: ci:build-api-image
      optional: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/api/**/*
        - .gitlab-ci.yml
  script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
    - cd packages/api
    - diff-cover coverage.xml
        --compare-branch="origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
        --fail-under="$COVERAGE_DIFF_MIN"

web:diff-coverage:
  extends: .diff-coverage
  # diff-cover is a python tool that reads lcov natively, so run it on the same
  # pre-baked ci-api image (git + diff-cover resident) rather than bare
  # python:3.11-slim + a runtime `pip install`. Same corrupted-cached-layer
  # hazard as api:diff-coverage (#2234); the baked image removes the per-run apt
  # + pip install entirely. Still a python image (not node) — no npm install.
  image: $CI_REGISTRY_IMAGE/ci-api:py3.11
  needs:
    - job: web:coverage
      artifacts: true
    - job: ci:build-api-image
      optional: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/web/**/*
        - .gitlab-ci.yml
  script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
    - cd packages/web
    - diff-cover coverage/lcov.info
        --compare-branch="origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
        --fail-under="$COVERAGE_DIFF_MIN"

web:e2e:coverage:
  # Playwright E2E line coverage for SonarCloud (#2117). SonarCloud imports LCOV;
  # it does not run tests. The vitest report already imports, but every UI file
  # exercised only by E2E — a large share of the app — is analyzed by Sonar yet
  # absent from that LCOV, so it counts as 0% covered and drags the reported total
  # far below the true API-94%/web-unit-78.5% figures. This job builds an
  # istanbul-instrumented bundle (VITE_COVERAGE=true), runs the mocked, self-
  # contained Chromium suite (specs mock all /api and /ws at the browser — no
  # backend), and the coverage fixture (e2e/fixtures/coverage.ts) writes each
  # page's `window.__coverage__`; merge-e2e-coverage.mjs stitches them into an
  # LCOV with repo-root-relative SF paths that sonar:scan imports.
  #
  # Scheduled-only (mirrors sonar:scan) so day-to-day MR pipelines are unchanged,
  # and allow_failure so a coverage hiccup never reds the nightly run. Builds its
  # OWN instrumented dist rather than reusing web:build's production artifact —
  # the production build is never instrumented. Unsharded so all pages' coverage
  # lands in one workspace for the merge. Independent of the web gate jobs (which
  # the scheduled pipeline may not run); the only need is the optional Playwright
  # mirror gate, present on the scheduled pipeline so this job waits for the
  # image and never pulls from throttled MCR.
  stage: test
  image: $CI_REGISTRY_IMAGE/playwright-base:$PLAYWRIGHT_BASE_TAG
  needs:
    - job: ci:mirror-playwright-base
      optional: true
  variables:
    VITE_COVERAGE: "true"
  cache:
    <<: *web-cache
    policy: pull
  before_script:
    - *retry-fn
    - cd packages/web
    - retry npm ci --prefer-offline --quiet
  script:
    - npm run build
    # Always merge + upload whatever coverage was collected, even when some specs
    # fail. Capture Playwright's exit code, run the merge unconditionally, then
    # re-exit with it: without this a single spec failure exits 1 and SKIPS the
    # merge step, so the coverage from the ~1.1k passing specs is discarded and
    # Sonar imports nothing (#2228 — this, plus needs: [] on sonar:scan, is why
    # the dashboard read 0%). The job still reports red on genuine failures (so
    # they stay visible), but allow_failure + artifacts:when:always mean the
    # partial LCOV is uploaded and sonar:scan (which needs: this allow_failure
    # job) still imports it. The merge script already tolerates missing/truncated
    # per-page snapshots, so a partial .nyc_output merges cleanly.
    - set +e; npx playwright test --project=chromium; TEST_EXIT=$?; set -e
    - node scripts/merge-e2e-coverage.mjs
    - exit $TEST_EXIT
  artifacts:
    when: always
    paths:
      - packages/web/coverage/e2e/lcov.info
    expire_in: 7 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SONAR_SCHEDULED == "true"'
  allow_failure: true

sonar:scan:
  # Nightly SonarCloud analysis WITH coverage import (#2090, #2092, #2113, #2117).
  #
  # Runs ONLY on the scheduled pipeline (SONAR_SCHEDULED == "true"), never on MR
  # or push pipelines — so day-to-day pipeline latency is unchanged. SonarCloud
  # does not run tests; it imports the coverage reports produced by the test
  # stage, via the reportPaths declared in sonar-project.properties.
  #
  # `needs:` the five coverage producers so their reports land in this job's
  # workspace. This RE-COUPLES the scan to coverage (reverting the 2026-07-19
  # `needs: []` decouple, #2228): on a nightly scheduled job, starting the scan
  # ~5 min earlier bought nothing — SonarCloud stores one analysis per project,
  # so a later coverage-bearing scan would just overwrite an early analysis-only
  # one, and nobody watches a 4am pipeline's intermediate state. The only
  # observable outcome is the final dashboard, which needs coverage. So the scan
  # correctly waits for the producers. stage: security keeps it after `test`
  # (a job cannot `needs:` a later-stage job — the producers live in `test`).
  # allow_failure means a Sonar/network hiccup never turns the nightly red.
  stage: security
  image: sonarsource/sonar-scanner-cli:12.1.0.3233_8.0.1@sha256:23ca0f137965d9dff2198074043fd48d386280bc5d0ccac8c8349cea4cf096a9
  needs:
    - job: api:coverage
      artifacts: true
    - job: web:coverage
      artifacts: true
    - job: scheduler:test
      artifacts: true
    - job: mcp:test
      artifacts: true
    # Playwright E2E line coverage (#2117) — nightly, same schedule gate as this
    # job, allow_failure + artifacts:when:always, so even a partial run (some
    # specs failing) still hands over the merged LCOV it managed to collect.
    - job: web:e2e:coverage
      artifacts: true
  variables:
    # Full history so SonarCloud's new-code detection and SCM blame are accurate
    # (the default shallow clone makes Sonar warn and skip blame attribution).
    GIT_DEPTH: "0"
    # Keep the analysis cache inside the workspace so it can be cached below.
    SONAR_USER_HOME: "$CI_PROJECT_DIR/.sonar"
  cache:
    key: sonar-scanner
    paths:
      - .sonar/cache
  script:
    # Each report rewrite is guarded on the source file existing. The producers
    # are in `needs:`, so all reports are normally present; the guards keep a
    # single producer that failed (e.g. the allow_failure web:e2e:coverage job)
    # from aborting the scan — its absent report is skipped and the rest import.
    #
    # The web LCOV records `SF:src/...` paths relative to packages/web; the
    # scanner runs from the checkout root, so rewrite them to
    # `SF:packages/web/src/...` — the same prefix scripts/sonar-scan.sh and the
    # Makefile diff-cover target apply.
    - if [ -f packages/web/coverage/lcov.info ]; then sed 's|^SF:|SF:packages/web/|' packages/web/coverage/lcov.info > packages/web/coverage/lcov.sonar.info; fi
    # The API report emits an EMPTY `<source></source>` because packages/api sets
    # `[tool.coverage.run] relative_files = true` (needed for the cross-runner
    # shard combine, #1348); its class filenames are `src/trueppm_api/...`. With
    # no source root the scanner resolves them from the repo root — `<repo>/src/
    # trueppm_api/...` — and drops all 328 files (#2113). Inject the real package
    # root so they resolve to `<repo>/packages/api/src/...`, matching the absolute
    # <source> the scheduler/mcp reports already carry. Point the reportPath at
    # coverage.sonar.xml (sonar-project.properties) — the same generated-file
    # pattern as the web lcov above.
    - if [ -f packages/api/coverage.xml ]; then sed "s#<source></source>#<source>${CI_PROJECT_DIR}/packages/api</source>#" packages/api/coverage.xml > packages/api/coverage.sonar.xml; fi
    # SONAR_TOKEN and SONAR_HOST_URL come from masked CI/CD variables and are
    # read from the environment by sonar-scanner automatically. Don't block on
    # the quality-gate compute task — this is a dashboard refresh, not a gate.
    - sonar-scanner -Dsonar.qualitygate.wait=false
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SONAR_SCHEDULED == "true"'
  allow_failure: true

web:e2e:
  # End-to-end Playwright tests against the production build, sharded across
  # 2 runners. One shard per runner: the shards run in a single parallel wave
  # (wall-clock ≈ total/2) and cannot co-locate, so the per-shard `workers` in
  # playwright.config.ts stays safe. `fullyParallel`
  # balances the split by test rather than by file, so uneven specs still
  # divide evenly.
  #
  # Consumes dist/ from web:build instead of rebuilding per shard. Emits a blob
  # report per shard; web:e2e:report stitches them into a single HTML report.
  stage: test
  image: $CI_REGISTRY_IMAGE/playwright-base:$PLAYWRIGHT_BASE_TAG
  # ci:mirror-playwright-base is optional — absent in steady state (this pulls
  # the existing registry mirror tag), present on a Playwright bump so the pull
  # waits for the fresh mirror instead of hitting throttled MCR.
  needs:
    - web:lint
    - web:type-check
    - web:build
    - job: ci:mirror-playwright-base
      optional: true
  parallel: 2
  <<: *rules-web
  cache:
    <<: *web-cache
    policy: pull
  before_script:
    - *retry-fn
    - cd packages/web
    - retry npm ci --prefer-offline --quiet
  script:
    - npx playwright test --shard="$CI_NODE_INDEX/$CI_NODE_TOTAL" --reporter=blob
  artifacts:
    when: always
    paths:
      - packages/web/blob-report/
    expire_in: 1 day

web:e2e:report:
  # Stitches the per-shard blob reports into one HTML report. Runs even when a
  # shard fails (when: always) — that is exactly when the report matters. Pulls
  # the blob artifacts from all parallel web:e2e instances via needs.
  #
  # --config=playwright.merge.config.ts (not a bare --reporter): the two web:e2e
  # shards bake an ABSOLUTE testDir into their blobs and can run on runners with
  # different builds_dir (/tmp/builds vs /mnt/nvme1/...); merge-reports then aborts
  # with "recorded with different test directories" (issue 1348). The merge config
  # supplies one resolved testDir to rebase every blob onto, and sets reporter:html
  # (the base config uses 'line' in CI, which emits no HTML report).
  stage: test
  image: $CI_REGISTRY_IMAGE/playwright-base:$PLAYWRIGHT_BASE_TAG
  needs:
    - "web:e2e"
    - job: ci:mirror-playwright-base
      optional: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/web/**/*
        - .gitlab-ci.yml
      when: always
  cache:
    <<: *web-cache
    policy: pull
  before_script:
    - *retry-fn
    - cd packages/web
    - retry npm ci --prefer-offline --quiet
  script:
    - npx playwright merge-reports --config=playwright.merge.config.ts ./blob-report
    # Surface flaky outcomes (tests that only passed on retry) LOUDLY (issue 1514).
    # CI retries otherwise let a non-deterministic test green the job silently.
    # Warn-only for now (exit 0); set TRUEPPM_FLAKY_FAIL=1 to make it a hard gate
    # once the suite is clean. Reads flaky-report.json from the merge step above.
    - node scripts/check-flaky.mjs
  artifacts:
    when: always
    paths:
      - packages/web/playwright-report/
      - packages/web/flaky-report.json
    expire_in: 7 days

web:integration:
  # Full-stack integration tests: real Django + PostgreSQL + Valkey + Vite dev
  # proxy. Covers the three scenarios the mocked web:e2e job cannot exercise:
  #   1. Auth token exchange via the real /api/v1/auth/token/ endpoint
  #   2. Task CRUD write contract against the live database
  #   3. WebSocket broadcast — mutation in one context, assertion in another
  #
  # Runs after every merge to verify end-to-end stack health, and on MRs that
  # touch auth or real-time surfaces (see rules below). The mocked web:e2e job
  # cannot see this class of bug: this is the only job that exercises the full
  # stack across a real page reload, where the in-memory access token, the
  # cookie-based refresh, and WebSocket auth interact (#911 — a reload-only auth
  # regression that slipped through because this job was previously main-only).
  #
  # Uses the custom ci-integration image (built by `ci:build-integration-image`)
  # which pre-bakes Python 3 + libpq-dev + gcc + uvicorn + scheduler[dev] +
  # api[dev] dev-deps on top of the Playwright base. The runtime `pip install -e`
  # only re-links the editable packages — no apt-get, no wheel downloads.
  # Mirrors the #640 ci-api / #651 ci-scheduler pattern.
  stage: test
  image: $CI_REGISTRY_IMAGE/ci-integration:noble
  needs:
    - job: ci:build-integration-image
      optional: true
  services:
    - name: postgres:16-alpine
      alias: postgres
    - name: valkey/valkey:8-alpine
      alias: valkey
  variables:
    DJANGO_SETTINGS_MODULE: trueppm_api.settings.dev
    TRUEPPM_ALLOW_DEV_SETTINGS: "1"
    DATABASE_URL: "postgres://trueppm:trueppm@postgres/trueppm_test"
    REDIS_URL: "redis://valkey:6379"
    # Non-secret CI key — dev settings enforce ALLOWED_HOSTS=* + AllowAny guard
    SECRET_KEY: "ci-integration-secret-not-for-production"
    # Vite proxy target: routes /api and /ws/v1 to the local Django process.
    API_URL: "http://127.0.0.1:8000"
    INTEGRATION_USER_EMAIL: "ci@trueppm.test"
    INTEGRATION_USER_PASSWORD: "ci-integration-pw"
    # Every integration spec signs in as the single seeded INTEGRATION_USER, so
    # the whole suite's logins land in one per-account throttle bucket (#1717,
    # default 5/min). Relax that bucket here — this job exercises the real auth
    # *flow* across a live reload, not throttle behavior (covered by the pytest
    # unit tests in tests/apps/access/test_login_throttle.py).
    TRUEPPM_THROTTLE_LOGIN_ACCOUNT_RATE: "1000/min"
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    # Block MRs that change an auth or real-time surface — the interacting
    # in-memory-token / cookie-refresh / WebSocket-auth paths only break under a
    # real reload against the live stack, which web:e2e (mocked) cannot reach.
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/web/src/api/client.ts
        - packages/web/src/stores/authStore.ts
        - packages/web/src/features/auth/**/*
        - packages/web/src/hooks/useProjectWebSocket.ts
        - packages/web/src/hooks/useWorkshopSocket.ts
        - packages/web/e2e/integration/**/*
        - packages/api/src/trueppm_api/core/auth_views.py
        - packages/api/src/trueppm_api/apps/sync/consumers.py
        - packages/api/src/trueppm_api/apps/workshops/consumers.py
  cache:
    # npm content cache (not node_modules — `npm ci` wipes it), so the runtime
    # `npm ci --prefer-offline` rebuilds with zero network on a warm cache (#1212).
    - key:
        files:
          - packages/web/package-lock.json
        prefix: web-npm-cacache
      paths:
        - .cache/npm/
    - key:
        files:
          - packages/api/pyproject.toml
        prefix: api-pip
      paths:
        - .cache/pip/
      policy: pull
  before_script:
    - *retry-fn
    # Image has Python 3 + uvicorn + scheduler[dev] + api[dev] dev-deps resident
    # under /opt/api-venv (on PATH). These installs are fast editable re-links
    # against the checked-out source. `retry` guards the rare case where pip
    # still reaches the index (PIP_RETRIES also applies); the editable re-link
    # itself is offline.
    - retry pip install -e "packages/scheduler[dev]" --quiet
    - retry pip install -e "packages/api[dev]" --quiet
    # Migrate and seed integration fixtures.
    - cd packages/api
    - python manage.py migrate --noinput
    - python manage.py seed_integration_fixtures
    # Start the Django ASGI server in the background.
    - >
      PYTHONPATH=src uvicorn trueppm_api.asgi:application
      --host 127.0.0.1 --port 8000 &
    - cd ../..
    # Wait up to 30 s for Django to accept connections.
    - >
      timeout 30 sh -c
      'until curl -sf http://127.0.0.1:8000/api/v1/health/ > /dev/null;
       do sleep 1; done'
    # Install web dependencies — the step that ECONNRESET-failed in #1212.
    - cd packages/web && retry npm ci --prefer-offline --quiet && cd ../..
  script:
    - cd packages/web
    - npx playwright test e2e/integration/ --config playwright.integration.config.ts --reporter=line
  artifacts:
    when: on_failure
    paths:
      - packages/web/playwright-report/
    expire_in: 7 days

website:build:
  # Verify the Starlight documentation site builds cleanly.
  # Catches broken links, invalid frontmatter, and build errors early.
  extends: .website
  # `npm run build` renders ```mermaid fences to static inline SVG at build time
  # via rehype-mermaid, which drives a headless Chromium through Playwright
  # (ADR-0198). The shared `.website` base image is node:22-alpine (musl libc),
  # on which Playwright's bundled Chromium — a glibc binary — cannot launch, so
  # the build would fail there. Override to the same glibc Playwright image the
  # web:e2e suite already uses; Chromium is pre-installed at $PLAYWRIGHT_BROWSERS_PATH
  # and its version matches the `playwright` devDependency (v1.58.2). The client
  # payload stays JS-free — the browser runs only on this build machine.
  image: $CI_REGISTRY_IMAGE/playwright-base:$PLAYWRIGHT_BASE_TAG
  stage: test
  <<: *rules-website
  script:
    - npm run build
  artifacts:
    paths:
      - packages/website/dist/
    expire_in: 1 day

# ---------------------------------------------------------------------------
# DEPLOY — GitLab Pages for documentation.
#
# - Release tags (v*): auto-deploy (docs always ship with a release)
# - Main branch: manual deploy for "next" (unreleased) docs
# ---------------------------------------------------------------------------

pages:
  # GitLab Pages requires the job name to be "pages" and artifacts in public/.
  extends: .website
  # Rebuilds the site, so it renders Mermaid and needs the same glibc Playwright
  # image as website:build (see the note there — Alpine's musl can't run Chromium).
  image: $CI_REGISTRY_IMAGE/playwright-base:$PLAYWRIGHT_BASE_TAG
  stage: deploy
  needs: ["website:build"]
  rules:
    # Auto-deploy on release tags
    - if: '$CI_COMMIT_TAG =~ /^v\d+/'
      when: on_success
    # Manual deploy from main (for "next" docs)
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: true
  script:
    - npm run build
    # GitLab Pages serves from public/ at the repo root
    - mkdir -p ../../public
    - cp -r dist/* ../../public/
  artifacts:
    paths:
      - public/
    expire_in: 7 days

# ---------------------------------------------------------------------------
# SECURITY — CVE scans + license audit. MR + main only.
#
# The SCA job (security:osv) and the license:check:* jobs use no needs: and rely
# on stage ordering. This avoids blocked-job cascades on single-package MRs: if
# only the API changed, web:test is skipped; a needs: [api:test, web:test] would
# then skip security too, silently dropping the dependency CVE scan.
# ---------------------------------------------------------------------------

scheduler:sbom:
  # Generate + validate a CycloneDX SBOM for the PUBLISHED trueppm-scheduler
  # dependency set so PyPI consumers can verify transparent sources (#936).
  #
  # This job blocks the pipeline on MRs/main: a missing or invalid SBOM is a
  # supply-chain regression for PyPI consumers, so it must fail the pipeline
  # (the same validation is enforced independently in scheduler:publish: before
  # a release is cut). The 0.3 shake-out that ran this non-blocking is over
  # (v0.3.0-alpha.3 shipped), so allow_failure has been removed.
  #
  # cyclonedx-bom is pinned + resident in the ci-scheduler image
  # (.gitlab/ci-images/scheduler.Dockerfile), but the image is published under
  # the mutable :py3.11 tag and our runners only permit the if-not-present pull
  # policy, so a runner holding a pre-rebuild :py3.11 runs without cyclonedx-py
  # ("command not found") on the pipeline that first adds the tool. The
  # before_script install (mirroring scheduler:publish, which runs on a vanilla
  # base) is a fast no-op when the resident copy is present and supplies the
  # tool when the cached image is stale — making the job robust to image churn.
  #
  # The SBOM describes the RUNTIME closure only (networkx + numpy), not dev
  # tooling. It is materialized from the committed packages/scheduler/uv.lock
  # via `uv sync --frozen` — the SAME lockfile security:osv audits — so the SBOM
  # records the exact, hash-verified resolved versions rather than whatever a
  # fresh PyPI resolve happens to return at run time. `--no-editable` installs
  # the project as a built wheel (matching the published artifact); the `dev`
  # extra is opt-in, so a default sync excludes it. cyclonedx-py then describes
  # that locked venv — same analyzer + output shape as before, deterministic
  # input. (uv is pinned to the same 0.9.5 as the api/scheduler uv-lock-check
  # jobs; it is not baked into the ci-scheduler image, so it installs here.)
  extends: .scheduler
  stage: security
  <<: *rules-scheduler
  cache:
    <<: *scheduler-cache
    policy: pull
  before_script:
    - pip install --quiet cyclonedx-bom==7.3.0 uv==0.9.5
  script:
    # only-system pins uv to the image's resident CPython 3.11 instead of
    # downloading a managed interpreter; the locked versions are interpreter-
    # independent, but this keeps the job hermetic.
    - UV_PYTHON_PREFERENCE=only-system uv sync --frozen --no-editable --project packages/scheduler
    - cyclonedx-py environment packages/scheduler/.venv/bin/python
        --validate
        --output-format JSON
        --output-reproducible
        --sv 1.6
        -o packages/scheduler/sbom.cdx.json
    - echo "SBOM generated + validated (locked from uv.lock):" && head -c 400 packages/scheduler/sbom.cdx.json
  artifacts:
    paths:
      - packages/scheduler/sbom.cdx.json
    expire_in: 30 days

security:osv:
  # Unified SCA across the committed lockfiles using the OSV database:
  #   - npm:    packages/web, packages/website
  #   - Cargo:  packages/wasm-scheduler
  #   - Python: packages/api (uv.lock), packages/scheduler (uv.lock)
  # Replaces the per-package npm-audit jobs (former web:security + website:security)
  # and adds Rust coverage that nothing scanned before. This is also where #904's
  # "add npm-audit" finding lands: OSV's surgical, expiring per-advisory ignores
  # supersede a blanket `npm audit --audit-level=high`, so re-adding npm-audit
  # would regress the control rather than strengthen it. The API joined here once
  # its uv.lock was committed (#904), retiring the former combined api+scheduler
  # pip-audit job (#1153 step 1); the scheduler joined once it committed its own
  # uv.lock (#1153 scheduler half), retiring security:pip-audit:scheduler. OSV
  # can only scan a lockfile, so each ecosystem joins here as it commits one.
  #
  # OSV-Scanner exits non-zero on any non-ignored advisory (it has no
  # --audit-level threshold). Not-yet-fixable or sub-HIGH advisories are
  # suppressed via per-directory osv-scanner.toml files that each carry a
  # `reason` and an `ignoreUntil` expiry, so suppressions stay documented and
  # self-expire rather than rotting silently (see packages/api/osv-scanner.toml
  # and packages/scheduler/osv-scanner.toml, which carry the suppressions
  # migrated off pip-audit). This is a stricter, more honest posture than the
  # prior --audit-level=high blanket: the surgical, expiring ignore is the
  # control npm audit lacked.
  #
  # Pinned binary download (the official image is distroless / shell-less, which
  # GitLab's script runner can't use); the linux build is a static Go binary.
  stage: security
  image: alpine:3.20@sha256:d9e853e87e55526f6b2917df91a2115c36dd7c696a35be12163d44e6e2a4b6bc
  needs: []
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/web/package-lock.json
        - packages/website/package-lock.json
        - packages/wasm-scheduler/Cargo.lock
        - packages/api/uv.lock
        - packages/scheduler/uv.lock
        - "**/osv-scanner.toml"
        - .gitlab-ci.yml
  before_script:
    - apk add --no-cache wget
    - wget -q -O /usr/local/bin/osv-scanner "https://github.com/google/osv-scanner/releases/download/v2.3.8/osv-scanner_linux_amd64"
    - chmod +x /usr/local/bin/osv-scanner
  script:
    # Per-directory osv-scanner.toml files are auto-discovered next to each
    # lockfile (do NOT pass --config, which would force a single global file and
    # break the per-package scoping that keeps a web regression from being masked
    # by a website ignore).
    - osv-scanner scan source
        -L packages/web/package-lock.json
        -L packages/website/package-lock.json
        -L packages/wasm-scheduler/Cargo.lock
        -L packages/api/uv.lock
        -L packages/scheduler/uv.lock

security:gitleaks:
  # Secret scanning across the whole working tree (#1251). The one scanner the
  # suite was missing: bandit/semgrep cover insecure code, osv covers
  # vulnerable deps, trivy covers IaC — none of them catch a committed
  # credential. Runs on every MR and on main (a secret can appear in ANY file,
  # so unlike the dep scanners this carries no `changes:` filter), and is also
  # wired as a pre-commit hook for the earliest catch.
  #
  # `gitleaks dir` scans the checked-out tree (not git history) — fast, and
  # robust to GitLab's shallow clone; it catches anything currently in the tree,
  # including a secret slipped past the local hook via `git push --no-verify`.
  # Scoped, documented allowlists live in .gitleaks.toml (extends the upstream
  # default ruleset). Pinned static binary download, matching the osv/trivy jobs.
  stage: security
  image: alpine:3.20
  needs: []
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  before_script:
    - apk add --no-cache wget
    - wget -q -O /tmp/gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz"
    - tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks
    - chmod +x /usr/local/bin/gitleaks
  script:
    - gitleaks dir . --config .gitleaks.toml --no-banner --redact --exit-code 1

security:trivy:config:
  # IaC misconfiguration scan (Dockerfiles + Helm chart) via Trivy. Complements
  # security:osv (which covers dependency CVEs): this catches container/k8s
  # hardening regressions — missing non-root USER, readOnlyRootFilesystem,
  # dropped capabilities, etc. Gates on HIGH/CRITICAL.
  #
  # Justified, scoped suppressions live in .trivyignore.yaml (currently the
  # intentional readOnlyRootFilesystem omission on the bundled dev/demo
  # postgres + valkey sub-charts). Image-layer CVE scanning runs at release time
  # in the publish jobs (trivy image before push).
  stage: security
  # alpine + pinned binary download via the official install script. Avoids
  # depending on the trivy container image's tag scheme and matches the install
  # used by the trivy image scan in the publish jobs.
  image: alpine:3.20@sha256:d9e853e87e55526f6b2917df91a2115c36dd7c696a35be12163d44e6e2a4b6bc
  needs: []
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/**/Dockerfile
        - packages/helm/**/*
        - .trivyignore.yaml
        - .gitlab-ci.yml
  variables:
    TRIVY_NO_PROGRESS: "true"
    TRIVY_CACHE_DIR: ".trivycache/"
  cache:
    key: trivy-db
    paths:
      - .trivycache/
  before_script:
    - apk add --no-cache curl
    # Install a pinned, checksum-verified Trivy release instead of piping the
    # mutable upstream install.sh through `sh` (#904 supply-chain hardening — the
    # OpenSSF Scorecard "Pinned-Dependencies" failure). Mirrors the cargo-deny /
    # wasm-pack pinned-tarball pattern. Bump version + hash together when upgrading.
    - |
      TRIVY_VERSION=0.71.0
      TRIVY_SHA256=30a3d22b23f88c233f1658f562fb477cae3b3e8b4761109d515b7698daf85814
      TRIVY_TARBALL="trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
      curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/${TRIVY_TARBALL}" -o /tmp/trivy.tar.gz
      echo "${TRIVY_SHA256}  /tmp/trivy.tar.gz" | sha256sum -c -
      tar xzf /tmp/trivy.tar.gz -C /usr/local/bin trivy
  script:
    - trivy config --severity HIGH,CRITICAL --exit-code 1 --ignorefile .trivyignore.yaml --skip-dirs '**/node_modules' packages/

security:semgrep:
  # SAST for the application source: JS/TS/React (web) + Python/Django
  # (api, scheduler). Complements bandit (Python-only) and the SCA scanners
  # (security:osv) / IaC scanner (security:trivy:config).
  #
  # Gates on ERROR + WARNING severity. The WARNING-level best-practice findings
  # were triaged in #1154 (fixed or inline-justified with `# nosemgrep`), so the
  # gate now fails on WARNING too. INFO-level findings stay un-gated (out of
  # scope for #1154) — hence the explicit severity list rather than the default.
  #
  # Rules are VENDORED under .semgrep/ (p/default, p/react, p/django), not pulled
  # live from the registry — so the scan runs fully offline. The live registry
  # fetch was the pipeline's largest tail-variance source (34s→113s swing, #1639)
  # and a reproducibility hole (a registry rule change could fail an unrelated
  # MR). Refresh with scripts/update-semgrep-rules.sh; keep the pack list there in
  # lockstep with the .semgrep/*.yml configs below. No Semgrep AppSec Platform
  # account or token is used — this is a self-contained, local-rules run.
  stage: security
  image:
    name: semgrep/semgrep:1.166.0@sha256:c180f0c93a17b420c0af5006214a29d3c747c5459c732b740191adf657dd0068
    entrypoint: [""]
  needs: []
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/web/src/**/*
        - packages/api/src/**/*
        - packages/scheduler/src/**/*
        - .semgrep/**/*
        - .gitlab-ci.yml
  variables:
    SEMGREP_SEND_METRICS: "off"
  script:
    # --config against local files (not p/ pack names) → no network, no registry
    # variance. Scope, severity gate, and excludes are unchanged from the live run.
    - semgrep scan
        --config .semgrep/default.yml --config .semgrep/django.yml --config .semgrep/react.yml
        --severity ERROR --severity WARNING --error --metrics off
        --exclude 'node_modules' --exclude 'dist'
        --exclude '*.test.ts' --exclude '*.test.tsx' --exclude 'e2e' --exclude 'tests'
        packages/web/src packages/api/src packages/scheduler/src

renovate:
  # Self-hosted Renovate runner (the #1153 rollout, step 4). Opens grouped
  # dependency-update MRs so transitives never go stale enough to become a CVE
  # scramble (the root cause of #1152). Behaviour is configured in renovate.json
  # (no auto-merge — project policy; major bumps are opt-in via the dashboard).
  #
  # ONE-TIME SETUP (a maintainer must do this — the runner stays dormant until):
  #   1. Create a GitLab access token (project or group) with `api` +
  #      `write_repository` scope. Add it as a MASKED CI/CD variable RENOVATE_TOKEN.
  #   2. Create a Pipeline Schedule (Settings -> CI/CD -> Pipeline schedules):
  #      daily cron, with a variable RENOVATE = "true". renovate.json restricts
  #      actual PR creation to Monday mornings, so a daily run is cheap.
  #   3. RECOMMENDED isolation: point the schedule at a dedicated `renovate-bot`
  #      branch (created off main). Because every other job is gated on
  #      `branch == main`, only this job runs there — the schedule won't spin up
  #      a full main pipeline. (A schedule on main also works but runs everything.)
  stage: security
  image: renovate/renovate:43@sha256:498de63b02c02b49c34dfe0119b59da8e5232e701c813960bcbee80760b148dd
  needs: []
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $RENOVATE == "true"'
  variables:
    RENOVATE_PLATFORM: gitlab
    RENOVATE_ENDPOINT: "${CI_API_V4_URL}"
    RENOVATE_TOKEN: "${RENOVATE_TOKEN}"
    RENOVATE_AUTODISCOVER: "false"
    RENOVATE_REPOSITORIES: "${CI_PROJECT_PATH}"
    LOG_LEVEL: "info"
  script:
    - renovate

license:check:py:
  # Verify no copyleft-licensed Python dependency has been introduced.
  # LGPL is permitted (library-linking exemption applies).
  #
  # Split from a former single license:check job (kaizen): mixing Python +
  # Node in one container forced a per-run `apt-get install nodejs npm` onto
  # the python-slim ci-api image (network-bound, the dominant cost) and made
  # the two halves run serially. Splitting drops the apt install entirely,
  # runs the halves in parallel, and scopes each rule to its own manifests so
  # a web-only dep bump no longer pays the Python re-link and vice versa.
  # Mirrors the existing security:osv (Python+node+cargo) per-manifest scoping.
  #
  # Kaizen #640 N1: `changes:` is dep manifests only — license composition
  # only changes when manifests/lock files do; main + scheduled runs catch
  # transitive drift that a lock-file refresh might miss.
  stage: security
  image: $CI_REGISTRY_IMAGE/ci-api:py3.11
  needs:
    - job: ci:build-api-image
      optional: true
  cache:
    <<: *api-cache
    policy: pull
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/scheduler/pyproject.toml
        - packages/api/pyproject.toml
        - .gitlab-ci.yml
  before_script:
    # Image already has scheduler[dev] + api[dev] dev-dep wheels resident;
    # these installs are fast editable re-links against the checked-out source.
    - pip install pip-licenses --quiet
    - pip install -e "packages/scheduler[dev]" --quiet
    - pip install -e packages/api --quiet
  script:
    - pip-licenses --order=license --format=plain-vertical
    - >-
      pip-licenses
      --fail-on="GNU General Public License v2 (GPLv2);
                 GNU General Public License v3 (GPLv3);
                 GNU Affero General Public License v3 (AGPLv3)"

license:check:web:
  # Verify no copyleft-licensed npm dependency has been introduced.
  # node:20-alpine already ships node, so there is no apt install to pay.
  # See license:check:py above for why this was split out.
  stage: security
  # needs:[] so this starts immediately instead of waiting for the whole test
  # stage — it runs its own `npm ci` and consumes no build artifact, so stage
  # gating only made it the last job to finish (its six sibling security jobs
  # already use needs:[]).
  needs: []
  image: node:20-alpine@sha256:fb4cd12c85ee03686f6af5362a0b0d56d50c58a04632e6c0fb8363f609372293
  cache:
    <<: *web-cache
    policy: pull
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/web/package.json
        - packages/web/package-lock.json
        - .gitlab-ci.yml
  before_script:
    - *retry-fn
    - cd packages/web
    # npm ci is deterministic against the lockfile and faster than npm install.
    # --omit=dev installs only the production dependency subset: a license audit
    # of `--production` deps never needs the ~600 dev-tool packages, so skipping
    # them shrinks both the install and the tree license-checker has to walk.
    # --prefer-offline resolves from the pulled web-npm cache.
    - retry npm ci --omit=dev --prefer-offline --quiet
  script:
    # --onlyAllow covers --failOn implicitly: any license not in the list fails.
    # @trueppm/web declares license "Apache-2.0" in package.json and is audited
    # like any other package. It must NOT be "private": true — license-checker
    # force-reports every private package as UNLICENSED (lib/index.js), which the
    # allow-list then rejects. Dropping `private` lets its real license show.
    - npx license-checker --production
        --onlyAllow "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;CC0-1.0;CC-BY-3.0;CC-BY-4.0;Python-2.0;Unlicense;WTFPL;BlueOak-1.0.0"

wasm:license-check:
  # Verify no copyleft-licensed Rust dependency has been introduced, and that no
  # crate carries an unignored RustSec advisory or has been yanked.
  # Uses cargo-deny to check crate licenses + advisories against deny.toml.
  extends: .wasm
  stage: security
  # git + the pinned cargo-deny 0.19.9 are baked into the ci-wasm image (0.19.x
  # is required to parse CVSS 4.0 entries in the live RustSec DB); the job just
  # runs the check. Re-add the optional ci:build-wasm-image need (extends
  # replaces the template's needs list); before_script falls back to .wasm's cd.
  needs:
    - wasm:test
    - job: ci:build-wasm-image
      optional: true
  <<: *rules-wasm
  script:
    - cargo deny check licenses advisories

# ---------------------------------------------------------------------------
# PUBLISH — tag-triggered release jobs.
#
# Trigger: push a git tag matching `scheduler-vX.Y.Z` (e.g. scheduler-v0.1.0).
# The tag must be pushed AFTER the main pipeline is green — there is no
# explicit needs: here because publish jobs run on tag events, not MR events,
# and the security stage will not have run on the tag itself.
#
# Status (#937): the PyPI project name is NOT pending reservation — it is LIVE.
# `trueppm-scheduler` already has two manually-uploaded alpha releases (0.1.0a1
# on 2026-05-15, 0.2.0a1 on 2026-05-31). The 0.3 promotion (#914) should publish
# via THIS tagged CI path, not a laptop, so the release is reproducible.
#
# Authentication: PyPI Trusted Publishing via GitLab OIDC (#938). The job
# presents a short-lived GitLab ID token that PyPI exchanges for a scoped,
# single-use upload token — there is NO long-lived secret on the publish path.
# The former static PYPI_TOKEN CI/CD variable is no longer read and may be
# deleted from Settings → CI/CD → Variables.
#
# PyPI-side configuration: a Trusted Publisher must be registered on the
# `trueppm-scheduler` PyPI project matching this pipeline's OIDC claims exactly —
# namespace `trueppm`, project `trueppm`, top-level pipeline file `.gitlab-ci.yml`,
# and a BLANK environment name (this job sets no `environment:`; a non-blank value
# would itself 422). If that publisher is missing, the mint-token step below fails
# HTTP 422 before any upload — this is what bit the first OIDC tag, 0.3.0a1 (#1387);
# 0.1/0.2 published via the now-removed static PYPI_TOKEN so never exercised it.
# PyPI project ownership: the maintainer account (Kelly Hair) that uploaded the
# 0.1/0.2 alphas. Full registration steps are in the release runbook
# (packages/website/src/content/docs/contributing/release.md).
#
# Provenance (#938): the job also emits PEP 740 digital attestations for the
# exact sdist + wheel it uploads, signed via Sigstore with a second GitLab OIDC
# token (aud: sigstore). PyPI verifies the attestation against the Trusted
# Publisher and renders a "built by this CI, unmodified" badge on the project.
#
# The job builds an sdist + wheel using `python -m build` (PEP 517 standard),
# generates + validates a CycloneDX SBOM (#936), signs PEP 740 attestations,
# then uploads with `twine`. hatchling is the build backend (pyproject.toml).
# ---------------------------------------------------------------------------

scheduler:publish:
  # Publishes trueppm-scheduler to PyPI. Closes issue #37.
  stage: publish
  image: python:3.11-slim@sha256:ae52c5bef62a6bdd42cd1e8dffef86b9cd284bde9427da79839de7a4b983e7ca
  rules:
    # Only fire on tags matching the scheduler version format.
    # Never fire on branch pushes or MR events.
    - if: '$CI_COMMIT_TAG =~ /^scheduler-v\d+\.\d+\.\d+/'
  cache:
    <<: *scheduler-cache
    policy: pull
  # GitLab OIDC tokens for PyPI Trusted Publishing (#938). Two audiences:
  #   PYPI_ID_TOKEN (aud: pypi)         — exchanged at PyPI's mint-token endpoint
  #                                       for a short-lived, project-scoped token.
  #   SIGSTORE_ID_TOKEN (aud: sigstore) — ambient identity Sigstore uses to sign
  #                                       the PEP 740 attestations (read by
  #                                       sigstore-python's GitLab detector).
  id_tokens:
    PYPI_ID_TOKEN:
      aud: pypi
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  variables:
    # Suppress the keyring warning that fires in non-interactive environments.
    PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring
  before_script:
    # cyclonedx-bom pinned to match the resident version in the ci-scheduler
    # image (.gitlab/ci-images/scheduler.Dockerfile); this job runs on the
    # python:3.11-slim base, so it installs the tooling here. twine>=6.1 uploads
    # the PEP 740 attestation sidecars passed to it (see the upload step below);
    # pypi-attestations signs them via Sigstore — pinned so its CLI cannot drift
    # silently like the other tools on this line. uv (pinned to 0.9.5, matching
    # the uv-lock-check jobs) materializes the locked SBOM input below.
    - pip install build "twine>=6.1" cyclonedx-bom==7.3.0 pypi-attestations==0.0.28 uv==0.9.5 --quiet
  script:
    # Verify the tag version matches the version declared in pyproject.toml.
    # Mismatches (e.g. forgot to bump the version) fail fast before uploading.
    - |
      PKG_VERSION=$(python -c "
      import tomllib, sys
      with open('packages/scheduler/pyproject.toml', 'rb') as f:
          d = tomllib.load(f)
      print(d['project']['version'])
      ")
      TAG_VERSION="${CI_COMMIT_TAG#scheduler-v}"
      if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
        echo "ERROR: tag version ($TAG_VERSION) does not match pyproject.toml version ($PKG_VERSION)"
        echo "Bump the version in packages/scheduler/pyproject.toml before tagging."
        exit 1
      fi
      echo "Version check passed: $PKG_VERSION"
      # Every published version must ship dated release notes. scripts/release.sh
      # rotates packages/scheduler/CHANGELOG.md [Unreleased] into a "## [<version>]"
      # section at tag time (scripts/rotate-scheduler-changelog.sh); this guards a
      # hand-cut tag that skipped that step from shipping a perpetual [Unreleased].
      if ! grep -qF "## [$PKG_VERSION]" packages/scheduler/CHANGELOG.md; then
        echo "ERROR: packages/scheduler/CHANGELOG.md has no '## [$PKG_VERSION]' release-notes section."
        echo "Run scripts/release.sh (which rotates [Unreleased] into a dated section) or add it by hand before tagging."
        exit 1
      fi
      echo "Release notes present for $PKG_VERSION"
    - cd packages/scheduler
    - python -m build
    # Generate + validate the CycloneDX SBOM BEFORE uploading (#936). Ordering
    # matters: never let twine succeed (the release goes live) and then fail the
    # job on a malformed SBOM. The runtime closure is materialized from the
    # committed uv.lock (`uv sync --frozen --no-editable`, hash-verified) — the
    # same locked, OSV-audited surface scheduler:sbom describes on MRs/main — so
    # the published SBOM is reproducible rather than a fresh PyPI resolve. The
    # `dev` extra is opt-in, so a default sync keeps build/dev tooling out.
    - UV_PYTHON_PREFERENCE=only-system uv sync --frozen --no-editable
    - cyclonedx-py environment .venv/bin/python --validate --output-format JSON --output-reproducible --sv 1.6 -o dist/sbom.cdx.json
    # Sign PEP 740 attestations for the SAME sdist + wheel uploaded below — the
    # exact artifacts the SBOM is generated from — NOT the SBOM itself, which is
    # not a PyPI distribution file (the explicit *.tar.gz / *.whl globs exclude
    # dist/sbom.cdx.json). Sigstore signs using the ambient SIGSTORE_ID_TOKEN.
    - python -m pypi_attestations sign dist/*.tar.gz dist/*.whl
    # Mint a short-lived, project-scoped PyPI upload token from the GitLab OIDC
    # token (Trusted Publishing) — no static PYPI_TOKEN. The minted token is
    # passed only via the twine environment below and is never echoed.
    - |
      PYPI_API_TOKEN=$(python -c '
      import json, os, sys, urllib.request, urllib.error
      req = urllib.request.Request("https://pypi.org/_/oidc/mint-token", data=json.dumps({"token": os.environ["PYPI_ID_TOKEN"]}).encode(), headers={"Content-Type": "application/json"})
      try:
          resp = urllib.request.urlopen(req)
      except urllib.error.HTTPError as e:
          # PyPI states the exact reason (e.g. no Trusted Publisher matches the
          # pipeline OIDC claims) in the response body; surface it on stderr
          # instead of the bare "HTTP Error 422" traceback so the failure is
          # self-diagnosing (#1387). Only the token goes to stdout (captured by
          # the command substitution); diagnostics must not pollute it.
          sys.stderr.write("PyPI mint-token failed: HTTP %s %s\n" % (e.code, e.reason))
          sys.stderr.write(e.read().decode("utf-8", "replace") + "\n")
          sys.exit(1)
      print(json.load(resp)["token"])
      ')
    # Upload the wheel + sdist plus their `.publish.attestation` sidecars. In
    # twine >= 6.1 `--attestations` is an opt-in GATE (fail if none present), NOT
    # filesystem discovery — twine only attaches attestation files passed as
    # explicit arguments (it splits inputs by `*.*.attestation`). The sidecars
    # must therefore be in the upload arg list, or twine errors with
    # "has no associated attestations" before any upload (#1390). The SBOM is
    # never passed, so the explicit globs keep dist/sbom.cdx.json a CI artifact /
    # Release asset rather than a PyPI file.
    - TWINE_USERNAME=__token__ TWINE_PASSWORD="$PYPI_API_TOKEN" twine upload --attestations dist/*.tar.gz dist/*.whl dist/*.publish.attestation --non-interactive --verbose
  artifacts:
    # Keep the built wheel + sdist + SBOM as a CI artifact for traceability.
    # The SBOM ships here today; attaching dist/sbom.cdx.json to the GitLab
    # Release awaits a scheduler release-cli job. It is never a PyPI file.
    paths:
      - packages/scheduler/dist/
    expire_in: 30 days

# scheduler:publish:test (TestPyPI on every main merge) was removed earlier.
# The tag-triggered scheduler:publish above is LIVE, not dormant: the PyPI name
# is reserved and two alphas are published (#937). Push a `scheduler-vX.Y.Z`
# tag (after a green main pipeline) to release.

# ---------------------------------------------------------------------------
# PUBLISH — Docker images and Helm chart.
#
# Trigger: push a git tag matching `v*` (e.g. v0.1.0).
# Each job pushes to GHCR under ghcr.io/$GHCR_USER/{api,web,charts}.
# Tags pushed: full semver (0.1.0), major.minor (0.1), and latest.
#
# Supply-chain (#940): every published api/web image is Trivy-scanned (release
# fails on fixable HIGH/CRITICAL CVEs) and gets a CycloneDX SBOM generated by
# Syft, retained as a non-expiring job artifact. Cosign signing + SBOM
# attestation of the public images/chart is the remaining #940 box — gated on
# GHCR enablement (#939), so it lands once GHCR credentials are configured.
#
# Required CI/CD variables (Settings → CI/CD → Variables):
#   GHCR_TOKEN — GitHub PAT with write:packages scope. Mark Masked + Protected.
#   GHCR_USER  — GitHub org/username (e.g. trueppm). Mark Protected.
#
# Multi-arch (linux/arm64) is deferred to 0.5 — single-platform amd64 for 0.1.
# ---------------------------------------------------------------------------

# Fires on any semver tag — stable and pre-release alike.
.rules-release-tag: &rules-release-tag
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+/'

# Shared base for Docker publish jobs.
# GitLab Container Registry credentials ($CI_REGISTRY_*) are injected
# automatically by the runner — no CI/CD variable setup needed.
# GHCR is pushed only when $GHCR_USER and $GHCR_TOKEN are both set;
# missing credentials are a silent skip, not a failure.
.docker-publish-base:
  stage: publish
  image: docker:27@sha256:aa3df78ecf320f5fafdce71c659f1629e96e9de0968305fe1de670e0ca9176ce
  services:
    - docker:27-dind@sha256:aa3df78ecf320f5fafdce71c659f1629e96e9de0968305fe1de670e0ca9176ce
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}" "${CI_REGISTRY}"
    # Trivy scans each built image before it is pushed (the docker save |
    # trivy image --input gate) and Syft generates a CycloneDX SBOM per image
    # (see api:publish / web:publish).
    - apk add --no-cache curl
    # Install pinned, checksum-verified Trivy + Syft releases instead of piping
    # the mutable upstream install.sh through `sh` (#904 supply-chain hardening —
    # the OpenSSF Scorecard "Pinned-Dependencies" failure). Mirrors the
    # cargo-deny / wasm-pack pinned-tarball pattern. Bump version + hash together
    # when upgrading.
    - |
      TRIVY_VERSION=0.71.0
      TRIVY_SHA256=30a3d22b23f88c233f1658f562fb477cae3b3e8b4761109d515b7698daf85814
      TRIVY_TARBALL="trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
      curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/${TRIVY_TARBALL}" -o /tmp/trivy.tar.gz
      echo "${TRIVY_SHA256}  /tmp/trivy.tar.gz" | sha256sum -c -
      tar xzf /tmp/trivy.tar.gz -C /usr/local/bin trivy
    - |
      SYFT_VERSION=1.18.1
      SYFT_SHA256=066c251652221e4d44fcc4d115ce3df33a91769da38c830a8533199db2f65aab
      SYFT_TARBALL="syft_${SYFT_VERSION}_linux_amd64.tar.gz"
      curl -sSfL "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/${SYFT_TARBALL}" -o /tmp/syft.tar.gz
      echo "${SYFT_SHA256}  /tmp/syft.tar.gz" | sha256sum -c -
      tar xzf /tmp/syft.tar.gz -C /usr/local/bin syft

api:publish:
  extends: .docker-publish-base
  <<: *rules-release-tag
  script:
    - |
      VERSION="${CI_COMMIT_TAG#v}"
      GL_IMAGE="${CI_REGISTRY_IMAGE}/api"
      docker build -f packages/api/Dockerfile \
        -t "${GL_IMAGE}:${CI_COMMIT_TAG}" \
        -t "${GL_IMAGE}:latest" \
        .
      # Scan the built image before publishing — fail the release on fixable
      # HIGH/CRITICAL CVEs. --ignore-unfixed skips base-image CVEs with no
      # available patch (unactionable) while still gating on anything fixable.
      docker save "${GL_IMAGE}:${CI_COMMIT_TAG}" -o /tmp/api-image.tar
      trivy image --input /tmp/api-image.tar --no-progress --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1
      # Generate a CycloneDX SBOM from the same image tarball (no daemon
      # dependency) so operators can audit the exact published image. Exposed as
      # a job artifact; cosign signing + SBOM attestation is the remaining #940
      # box, gated on GHCR enablement (#939).
      mkdir -p sbom
      syft "docker-archive:/tmp/api-image.tar" -o "cyclonedx-json=sbom/api-${VERSION}.cdx.json"
      docker push "${GL_IMAGE}:${CI_COMMIT_TAG}"
      docker push "${GL_IMAGE}:latest"
      if [ -n "${GHCR_USER}" ] && [ -n "${GHCR_TOKEN}" ]; then
        echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
        GH_IMAGE="ghcr.io/${GHCR_USER}/api"
        docker tag "${GL_IMAGE}:${CI_COMMIT_TAG}" "${GH_IMAGE}:${VERSION}"
        docker tag "${GL_IMAGE}:latest" "${GH_IMAGE}:latest"
        docker push "${GH_IMAGE}:${VERSION}"
        docker push "${GH_IMAGE}:latest"
      else
        echo "INFO: GHCR_USER/GHCR_TOKEN not set — GitLab registry only"
      fi
  artifacts:
    name: "api-sbom-${CI_COMMIT_TAG}"
    paths:
      - sbom/
    expire_in: never

web:publish:
  extends: .docker-publish-base
  <<: *rules-release-tag
  script:
    - |
      VERSION="${CI_COMMIT_TAG#v}"
      GL_IMAGE="${CI_REGISTRY_IMAGE}/web"
      cd packages/web
      docker build \
        -t "${GL_IMAGE}:${CI_COMMIT_TAG}" \
        -t "${GL_IMAGE}:latest" \
        .
      # Scan the built image before publishing (see api:publish for rationale).
      docker save "${GL_IMAGE}:${CI_COMMIT_TAG}" -o /tmp/web-image.tar
      trivy image --input /tmp/web-image.tar --no-progress --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1
      # CycloneDX SBOM from the image tarball (see api:publish for rationale).
      mkdir -p sbom
      syft "docker-archive:/tmp/web-image.tar" -o "cyclonedx-json=sbom/web-${VERSION}.cdx.json"
      docker push "${GL_IMAGE}:${CI_COMMIT_TAG}"
      docker push "${GL_IMAGE}:latest"
      if [ -n "${GHCR_USER}" ] && [ -n "${GHCR_TOKEN}" ]; then
        echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
        GH_IMAGE="ghcr.io/${GHCR_USER}/web"
        docker tag "${GL_IMAGE}:${CI_COMMIT_TAG}" "${GH_IMAGE}:${VERSION}"
        docker tag "${GL_IMAGE}:latest" "${GH_IMAGE}:latest"
        docker push "${GH_IMAGE}:${VERSION}"
        docker push "${GH_IMAGE}:latest"
      else
        echo "INFO: GHCR_USER/GHCR_TOKEN not set — GitLab registry only"
      fi
  artifacts:
    name: "web-sbom-${CI_COMMIT_TAG}"
    paths:
      - sbom/
    expire_in: never

helm:publish:
  # Helm chart → GHCR OCI registry (conditional on GHCR credentials).
  # GitLab Container Registry does not support Helm OCI push in this runner
  # setup, so GHCR is the only target. Job exits 0 when credentials are absent
  # rather than failing the pipeline — pre-1.0 GHCR access is optional.
  stage: publish
  image:
    name: alpine/helm:3.14.0@sha256:a90798c9c2b671e3546b10db1ae0b845f9abccc9f9ff79b34744a1ba146b67ed
    entrypoint: [""]
  <<: *rules-release-tag
  before_script:
    - apk add --no-cache curl
  script:
    - |
      if [ -z "${GHCR_USER}" ] || [ -z "${GHCR_TOKEN}" ]; then
        echo "INFO: GHCR_USER/GHCR_TOKEN not set — skipping Helm chart push"
        exit 0
      fi
      helm registry login ghcr.io -u "$GHCR_USER" -p "$GHCR_TOKEN"
      helm dependency update packages/helm
      helm package packages/helm
      CHART_FILE=$(ls trueppm-*.tgz)
      helm push "$CHART_FILE" "oci://ghcr.io/${GHCR_USER}/charts"

# ---------------------------------------------------------------------------
# PUBLISH — OSS package registries (PyPI wheel + npm).
#
# Trigger: push a git tag matching `v*` (the same release tag as the Docker
# image jobs above). These publish the two remaining OSS packages — trueppm-api
# (PyPI) and @trueppm/web (npm) — as versioned, installable artifacts so that
# trueppm-enterprise can pin exact OSS versions instead of path-dep references
# (Enterprise ADR E-0005, phase-2 switchover). Closes #479.
#
# Like helm:publish, each job exits 0 — not fail — when its registry token is
# absent. This keeps the release pipeline green before the tokens and the
# PyPI/npm project-name reservations land (the scheduler:publish job is dormant
# for the same reason); once the tokens are configured, a v* tag publishes
# automatically and the E-0005 remote agent detects both packages.
#
# Required CI/CD variables (Settings → CI/CD → Variables), Masked + Protected:
#   PYPI_TOKEN — PyPI API token with upload scope for the trueppm-api project.
#   NPM_TOKEN  — npm automation token with publish scope for the @trueppm scope.
# ---------------------------------------------------------------------------

api:publish:pypi:
  # trueppm-api → PyPI sdist + wheel. Mirrors scheduler:publish (PEP 517 build
  # via hatchling, twine upload). Distinct from api:publish, which ships the
  # Docker image to the container registry.
  stage: publish
  image: python:3.11-slim@sha256:ae52c5bef62a6bdd42cd1e8dffef86b9cd284bde9427da79839de7a4b983e7ca
  <<: *rules-release-tag
  variables:
    TWINE_USERNAME: __token__
    TWINE_PASSWORD: $PYPI_TOKEN
    # Suppress the keyring warning that fires in non-interactive environments.
    PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring
  script:
    - |
      if [ -z "${PYPI_TOKEN}" ]; then
        echo "INFO: PYPI_TOKEN not set — skipping PyPI publish of trueppm-api"
        exit 0
      fi
    - pip install build twine --quiet
    # Verify the tag version matches the version declared in pyproject.toml.
    # A mismatch (e.g. forgot to bump) fails fast before uploading.
    - |
      PKG_VERSION=$(python -c "
      import tomllib
      with open('packages/api/pyproject.toml', 'rb') as f:
          print(tomllib.load(f)['project']['version'])
      ")
      TAG_VERSION="${CI_COMMIT_TAG#v}"
      if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
        echo "ERROR: tag version ($TAG_VERSION) does not match packages/api/pyproject.toml version ($PKG_VERSION)"
        echo "Bump the version in packages/api/pyproject.toml before tagging."
        exit 1
      fi
      echo "Version check passed: $PKG_VERSION"
    - cd packages/api
    - python -m build
    - twine upload dist/* --non-interactive --verbose
  artifacts:
    # Keep the built wheel as a CI artifact for traceability (7-day expiry).
    paths:
      - packages/api/dist/
    expire_in: 7 days

web:publish:npm:
  # @trueppm/web → npm registry. Builds the production bundle and publishes
  # dist/ (package.json `files` restricts the tarball to the built output).
  # Distinct from web:publish, which ships the Docker image.
  stage: publish
  image: node:20-alpine@sha256:fb4cd12c85ee03686f6af5362a0b0d56d50c58a04632e6c0fb8363f609372293
  <<: *rules-release-tag
  cache:
    <<: *web-cache
    policy: pull
  script:
    - *retry-fn
    - |
      if [ -z "${NPM_TOKEN}" ]; then
        echo "INFO: NPM_TOKEN not set — skipping npm publish of @trueppm/web"
        exit 0
      fi
    - cd packages/web
    - retry npm ci --prefer-offline --quiet
    # Verify the tag version matches package.json before publishing.
    - |
      PKG_VERSION=$(node -p "require('./package.json').version")
      TAG_VERSION="${CI_COMMIT_TAG#v}"
      if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
        echo "ERROR: tag version ($TAG_VERSION) does not match packages/web/package.json version ($PKG_VERSION)"
        echo "Bump the version in packages/web/package.json before tagging."
        exit 1
      fi
      echo "Version check passed: $PKG_VERSION"
    - npm run build
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
    - npm publish
  artifacts:
    paths:
      - packages/web/dist/
    expire_in: 7 days

# ---------------------------------------------------------------------------
# RELEASE — GitLab Release entry.
#
# Trigger: any v* tag (stable and pre-release).
# needs: [] — runs independently of the publish stage so a missing GHCR
# token does not prevent the release entry from being created.
# Pre-release tags get a short [Unreleased] pointer; stable tags extract
# their section from the assembled CHANGELOG.md.
# ---------------------------------------------------------------------------

release:create:
  stage: deploy
  image: registry.gitlab.com/gitlab-org/release-cli:v0.24.0@sha256:3f52d526f48e8d10625c722fa6d6423ee82aadeae1b1aa91f07b62551d96dacf
  needs: []
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+/'
  script:
    - |
      VERSION="${CI_COMMIT_TAG#v}"
      if echo "$VERSION" | grep -qE '(alpha|beta|rc)'; then
        BASE="${VERSION%%-*}"
        printf '**TruePPM %s** — pre-release.\n\nChanges are accumulating in `[Unreleased]` until **%s** ships stable.\nSee [CHANGELOG.md](https://gitlab.com/trueppm/trueppm/-/blob/%s/CHANGELOG.md) for the current list.\n' \
          "${CI_COMMIT_TAG}" "$BASE" "${CI_COMMIT_TAG}" > release_notes.md
      else
        awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md \
          | sed '/^[[:space:]]*$/d' > release_notes.md
      fi
  release:
    tag_name: '$CI_COMMIT_TAG'
    name: 'TruePPM $CI_COMMIT_TAG'
    description: './release_notes.md'
