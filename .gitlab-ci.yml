stages:
  - lint      # fastest jobs, most commonly fail — run first, gate everything
  - analyze   # type-check, static analysis, migration/schema checks
  - test      # unit + integration tests (per-package, DAG-gated on analyze)
  - security  # CVE scans + license audit (MR + main only)
  - publish   # tag-triggered: scheduler PyPI release

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  POSTGRES_DB: trueppm_test
  POSTGRES_USER: trueppm
  POSTGRES_PASSWORD: trueppm

# ---------------------------------------------------------------------------
# Prevent duplicate pipelines.
# MR pipeline runs when an MR exists for the branch; branch pipeline runs
# for pushes without an open MR. Both run on main after merge.
# ---------------------------------------------------------------------------
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_COMMIT_BRANCH'

# ---------------------------------------------------------------------------
# Path-change rule templates.
#
# Every package job uses one of these anchors so it only runs when files in
# that package (or the CI config itself) change. On main the changes: filter
# is omitted — the protected branch always gets a full green signal.
#
# api includes scheduler paths because the API package installs the scheduler
# as a dependency; a scheduler change can break API type-checking.
#
# Security jobs that span packages (pip-audit, license:check) use no needs:
# and rely on stage ordering instead. This avoids blocked-job cascades when
# only one of their dependency test jobs runs and the other is skipped.
# ---------------------------------------------------------------------------

.rules-scheduler: &rules-scheduler
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/scheduler/**/*
        - .gitlab-ci.yml

.rules-api: &rules-api
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/api/**/*
        - packages/scheduler/**/*
        - .gitlab-ci.yml

.rules-web: &rules-web
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/web/**/*
        - .gitlab-ci.yml

.rules-website: &rules-website
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/website/**/*
        - .gitlab-ci.yml

.rules-wasm: &rules-wasm
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/wasm-scheduler/**/*
        - .gitlab-ci.yml

.rules-helm: &rules-helm
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/helm/**/*
        - .gitlab-ci.yml

# ---------------------------------------------------------------------------
# Base templates
# Cache keys are derived from each package's dependency manifest so the
# Minio-backed cache is automatically invalidated when dependencies change.
# ---------------------------------------------------------------------------

.scheduler:
  image: python:3.11-slim
  cache: &scheduler-cache
    key:
      files:
        - packages/scheduler/pyproject.toml
      prefix: scheduler-pip
    paths:
      - .cache/pip/
  before_script:
    - pip install -e "packages/scheduler[dev]" --quiet

# Full API template — postgres + redis services, used by api:test only.
.api:
  image: python:3.11-slim
  cache: &api-cache
    key:
      files:
        - packages/api/pyproject.toml
      prefix: api-pip
    paths:
      - .cache/pip/
  services:
    - name: postgres:16-alpine
      alias: postgres
    - name: redis:7-alpine
      alias: redis
  variables:
    DJANGO_SETTINGS_MODULE: trueppm_api.settings.dev
    DATABASE_URL: "postgres://trueppm:trueppm@postgres/trueppm_test"
    REDIS_URL: "redis://redis:6379"
  before_script:
    - apt-get update -qq && apt-get install -y -qq libpq-dev gcc
    - pip install -e "packages/scheduler[dev]" --quiet
    - pip install -e "packages/api[dev]" --quiet
    - pip install pytest pytest-django pytest-asyncio --quiet

# Lean API template — no DB/Redis, for jobs that only need Django importable
# (type-check, migration check, schema generation). DATABASE_URL is set so
# django-environ parses cleanly; no actual connection is made.
.api-no-db:
  image: python:3.11-slim
  cache:
    <<: *api-cache
    policy: pull
  variables:
    DJANGO_SETTINGS_MODULE: trueppm_api.settings.dev
    DATABASE_URL: "postgres://trueppm:trueppm@localhost/trueppm_test"
  before_script:
    - apt-get update -qq && apt-get install -y -qq libpq-dev gcc
    - pip install -e "packages/scheduler[dev]" --quiet
    - pip install -e packages/api --quiet

.web:
  image: node:20-alpine
  cache: &web-cache
    key:
      files:
        - packages/web/package-lock.json
      prefix: web-npm
    paths:
      - packages/web/node_modules/
  before_script:
    - cd packages/web
    - npm ci --prefer-offline --quiet

.website:
  image: node:20-alpine
  cache:
    key:
      files:
        - packages/website/package-lock.json
      prefix: website-npm
    paths:
      - packages/website/node_modules/
  before_script:
    - cd packages/website
    - npm ci --prefer-offline --quiet

.wasm:
  image: rust:1.82-slim
  cache:
    key:
      files:
        - packages/wasm-scheduler/Cargo.toml
      prefix: wasm-cargo
    paths:
      - packages/wasm-scheduler/target/
  before_script:
    - rustup component add clippy
    - rustup target add wasm32-unknown-unknown
    - cd packages/wasm-scheduler

# ---------------------------------------------------------------------------
# LINT — fastest jobs, highest failure rate. Gates all downstream work.
# ---------------------------------------------------------------------------

changelog:check:
  # Pure git diff — ~10 seconds. Run first so MR authors get instant feedback
  # if they forgot to update the changelog, before any build jobs start.
  # Exempt: chore/* and ci/* branches carry no user-visible behaviour change.
  stage: lint
  image: alpine:latest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^(chore|ci)\//i'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  before_script:
    - apk add --no-cache git
  script:
    - git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME" --depth=20
    - |
      ADDED=$(git diff "origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME...HEAD" -- CHANGELOG.md \
        | grep '^+' | grep -v '^+++' | wc -l | tr -d ' ')
      if [ "$ADDED" -eq 0 ]; then
        echo "ERROR: CHANGELOG.md has not been updated on this branch."
        echo "Add an entry to the [Unreleased] section before merging."
        exit 1
      fi
      echo "CHANGELOG.md OK — $ADDED line(s) added."

scheduler:lint:
  extends: .scheduler
  stage: lint
  <<: *rules-scheduler
  script:
    - cd packages/scheduler
    - ruff check src/ tests/
    - ruff format --check src/ tests/

api:lint:
  stage: lint
  image: python:3.11-slim
  cache:
    <<: *api-cache
    policy: pull
  <<: *rules-api
  before_script:
    - pip install ruff --quiet
  script:
    - cd packages/api
    - ruff check src/ tests/
    - ruff format --check src/ tests/

web:lint:
  extends: .web
  stage: lint
  <<: *rules-web
  script:
    - npm run lint

wasm:lint:
  extends: .wasm
  stage: lint
  <<: *rules-wasm
  script:
    - cargo clippy --all-targets -- -D warnings

helm:lint:
  image:
    name: alpine/helm:3.14.0
    entrypoint: [""]
  stage: lint
  <<: *rules-helm
  script:
    - helm lint packages/helm/

# ---------------------------------------------------------------------------
# ANALYZE — type-check, static analysis, migration/schema validation.
# Each job uses needs: to start as soon as its package's lint job passes,
# without waiting for other packages' lint jobs.
# ---------------------------------------------------------------------------

scheduler:type-check:
  extends: .scheduler
  stage: analyze
  needs: [scheduler:lint]
  <<: *rules-scheduler
  script:
    - cd packages/scheduler && mypy

api:type-check:
  extends: .api-no-db
  stage: analyze
  needs: [api:lint]
  <<: *rules-api
  before_script:
    - apt-get update -qq && apt-get install -y -qq libpq-dev gcc
    - pip install -e "packages/scheduler[dev]" --quiet
    - pip install -e "packages/api[dev]" --quiet
  script:
    - cd packages/api
    - mypy src/trueppm_api

api:migration-check:
  # makemigrations --check --dry-run compares model state to migration files.
  # No database connection is made; .api-no-db template is sufficient.
  extends: .api-no-db
  stage: analyze
  needs: [api:lint]
  <<: *rules-api
  script:
    - cd packages/api
    - python manage.py makemigrations --check --dry-run

api:openapi-check:
  # drf-spectacular schema generation is pure view/serializer introspection;
  # no database queries are made. --validate checks for valid OpenAPI 3;
  # --fail-on-warn promotes warnings to errors.
  extends: .api-no-db
  stage: analyze
  needs: [api:lint]
  <<: *rules-api
  script:
    - cd packages/api
    - python manage.py spectacular --validate --file /dev/null

web:type-check:
  extends: .web
  stage: analyze
  needs: [web:lint]
  <<: *rules-web
  script:
    - npm run typecheck

wasm:build:
  # Verify the WASM crate compiles to wasm32. The pkg/ output is not passed
  # downstream — this validates the build is clean.
  extends: .wasm
  stage: analyze
  needs: [wasm:lint]
  <<: *rules-wasm
  before_script:
    - rustup target add wasm32-unknown-unknown
    - cargo install wasm-pack --locked || true
    - cd packages/wasm-scheduler
  script:
    - wasm-pack build --target web --release

web:build:
  # Build artifact is not passed downstream — this job validates the build
  # is clean. web:test runs vitest independently.
  extends: .web
  stage: analyze
  needs: [web:lint]
  <<: *rules-web
  script:
    - npm run build

security:bandit:scheduler:
  # Python static security analysis for the scheduler package.
  # Runs in analyze stage alongside type-check — static, no test results needed.
  # -ll = medium severity and above.
  stage: analyze
  needs: [scheduler:lint]
  image: python:3.11-slim
  <<: *rules-scheduler
  before_script:
    - pip install bandit --quiet
  script:
    - bandit -r packages/scheduler/src/ -ll
        --exclude packages/scheduler/src/trueppm_scheduler/__pycache__

security:bandit:api:
  # Python static security analysis for the API package.
  # Split from bandit:scheduler so each gates only on its own lint job —
  # a web-only branch no longer triggers a full Python security scan.
  stage: analyze
  needs: [api:lint]
  image: python:3.11-slim
  <<: *rules-api
  before_script:
    - pip install bandit --quiet
  script:
    - bandit -r packages/api/src/ -ll
        --exclude packages/api/src/trueppm_api/settings,packages/api/src/trueppm_api/apps/projects/migrations,packages/api/src/trueppm_api/apps/resources/migrations

# ---------------------------------------------------------------------------
# TEST — unit + integration tests.
# Each package starts as soon as its own analyze jobs pass, not when all
# packages' analyze jobs are done (DAG via needs:).
# ---------------------------------------------------------------------------

scheduler:test:
  extends: .scheduler
  stage: test
  needs: [scheduler:lint, scheduler:type-check]
  <<: *rules-scheduler
  script:
    - cd packages/scheduler
    - pytest --cov=trueppm_scheduler --cov-report=term-missing --cov-fail-under=80
  coverage: '/TOTAL.*\s(\d+%)/'

wasm:test:
  extends: .wasm
  stage: test
  needs: [wasm:lint, wasm:build]
  <<: *rules-wasm
  script:
    - cargo test --all-targets

wasm:conformance:
  # Cross-engine conformance: run the Python scheduler against the same shared
  # fixtures that the Rust tests use. If both pass, the engines agree.
  stage: test
  image: python:3.11-slim
  needs: [scheduler:lint, wasm:lint]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/wasm-scheduler/**/*
        - packages/scheduler/**/*
        - .gitlab-ci.yml
  cache:
    <<: *scheduler-cache
    policy: pull
  before_script:
    - pip install -e "packages/scheduler[dev]" --quiet
  script:
    - cd packages/scheduler
    - pytest tests/test_wasm_conformance.py -v

api:test:
  extends: .api
  stage: test
  needs: [api:lint, api:type-check, api:migration-check, api:openapi-check]
  <<: *rules-api
  script:
    - cd packages/api
    - python -m pytest tests/ --tb=short -q
        --cov=trueppm_api --cov-report=term-missing --cov-fail-under=65
  coverage: '/TOTAL.*\s(\d+%)/'

web:test:
  extends: .web
  stage: test
  needs: [web:lint, web:type-check, web:build]
  <<: *rules-web
  script:
    - npm run test:coverage
  coverage: '/^All files\s*\|\s*[\d.]+\s*\|\s*[\d.]+\s*\|\s*[\d.]+\s*\|\s*([\d.]+)/'

web:e2e:
  # End-to-end Playwright tests against the production build.
  # Uses the official Playwright Docker image (Chromium pre-installed) to avoid
  # a costly `npx playwright install` download on every run.
  # Runs after web:test so unit coverage is confirmed before E2E spins up.
  stage: test
  image: mcr.microsoft.com/playwright:v1.58.2-noble
  needs: [web:lint, web:type-check, web:build]
  <<: *rules-web
  cache:
    <<: *web-cache
    policy: pull
  before_script:
    - cd packages/web
    - npm ci --prefer-offline --quiet
    # Production build required for `vite preview` (webServer in playwright.config.ts).
    # web:build already verified it compiles; this re-runs to produce the dist/ artifact
    # in the current job's workspace (artifacts are not shared between jobs by default).
    - npm run build
  script:
    - npx playwright test --reporter=line
  artifacts:
    when: on_failure
    paths:
      - packages/web/playwright-report/
    expire_in: 7 days

website:build:
  # Verify the Docusaurus documentation site builds cleanly.
  # Catches broken MDX, missing imports, and broken internal links early.
  extends: .website
  stage: test
  <<: *rules-website
  script:
    - npm run build

# ---------------------------------------------------------------------------
# SECURITY — CVE scans + license audit. MR + main only.
#
# pip-audit and license:check use no needs: and rely on stage ordering.
# This avoids blocked-job cascades on single-package MRs: if only the API
# changed, web:test is skipped; a needs: [api:test, web:test] would then
# skip security too, silently dropping the Python CVE scan.
# ---------------------------------------------------------------------------

security:pip-audit:
  # CVE scan for all installed Python dependencies (scheduler + API).
  stage: security
  image: python:3.11-slim
  cache:
    <<: *api-cache
    policy: pull
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/scheduler/**/*
        - packages/api/**/*
        - .gitlab-ci.yml
  before_script:
    - apt-get update -qq && apt-get install -y -qq libpq-dev gcc
    # Upgrade pip and wheel first so the audit does not flag CVEs in the
    # base-image versions of the build tools themselves.
    - pip install --upgrade pip wheel --quiet
    - pip install pip-audit --quiet
    - pip install -e "packages/scheduler[dev]" --quiet
    - pip install -e packages/api --quiet
  script:
    # CVE-2026-4539: local-access-only ReDoS in pygments AdlLexer (CVSS low/medium).
    # No fix version exists as of 2026-03-25 — pygments 2.19.2 is the latest release.
    # Ignored explicitly so any new HIGH/CRITICAL CVE still blocks the pipeline.
    # Remove this ignore once a patched pygments version is released.
    - pip-audit --progress-spinner=off --desc on --ignore-vuln CVE-2026-4539

web:security:
  # CVE scan for npm dependencies. Equivalent of pip-audit for the web package.
  # --audit-level=high: fail on high/critical CVEs only; moderate is noisy for
  # transitive dev dependencies. Adjust down to =moderate when the tree is stable.
  stage: security
  needs: [web:test]
  image: node:20-alpine
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/web/**/*
        - .gitlab-ci.yml
  before_script:
    - cd packages/web
  script:
    - npm audit --audit-level=high

license:check:
  # Verify no copyleft-licensed dependency has been introduced.
  # Checks both Python (pip-licenses) and npm (license-checker) packages.
  # LGPL is permitted (library-linking exemption applies).
  # No needs: — stage ordering ensures tests passed; see note above.
  stage: security
  image: python:3.11-slim
  cache:
    <<: *api-cache
    policy: pull
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - packages/scheduler/**/*
        - packages/api/**/*
        - packages/web/**/*
        - .gitlab-ci.yml
  before_script:
    - apt-get update -qq && apt-get install -y -qq libpq-dev gcc nodejs npm
    - pip install pip-licenses --quiet
    - pip install -e "packages/scheduler[dev]" --quiet
    - pip install -e packages/api --quiet
    - npm install --prefix packages/web --prefer-offline --quiet
  script:
    # --- Python ---
    - pip-licenses --order=license --format=plain-vertical
    - >-
      pip-licenses
      --fail-on="GNU General Public License v2 (GPLv2);
                 GNU General Public License v3 (GPLv3);
                 GNU Affero General Public License v3 (AGPLv3)"
    # --- npm ---
    # --onlyAllow covers --failOn implicitly: any license not in the list fails.
    - npx --prefix packages/web license-checker --production
        --onlyAllow "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;CC0-1.0;CC-BY-3.0;CC-BY-4.0;Python-2.0;Unlicense;WTFPL;BlueOak-1.0.0"

# ---------------------------------------------------------------------------
# PUBLISH — tag-triggered release jobs.
#
# Trigger: push a git tag matching `scheduler-vX.Y.Z` (e.g. scheduler-v0.1.0).
# The tag must be pushed AFTER the main pipeline is green — there is no
# explicit needs: here because publish jobs run on tag events, not MR events,
# and the security stage will not have run on the tag itself.
#
# Required CI/CD variable (Settings → CI/CD → Variables):
#   PYPI_TOKEN — PyPI API token with upload scope for the trueppm-scheduler project.
#                Mark as "Masked" and "Protected" (tags are protected refs).
#
# The job builds an sdist + wheel using `python -m build` (PEP 517 standard),
# then uploads with `twine`. hatchling is the build backend (pyproject.toml).
# ---------------------------------------------------------------------------

scheduler:publish:
  # Publishes trueppm-scheduler to PyPI. Closes issue #37.
  stage: publish
  image: python:3.11-slim
  rules:
    # Only fire on tags matching the scheduler version format.
    # Never fire on branch pushes or MR events.
    - if: '$CI_COMMIT_TAG =~ /^scheduler-v\d+\.\d+\.\d+/'
  cache:
    <<: *scheduler-cache
    policy: pull
  variables:
    TWINE_USERNAME: __token__
    TWINE_PASSWORD: $PYPI_TOKEN
    # Suppress the keyring warning that fires in non-interactive environments.
    PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring
  before_script:
    - pip install build twine --quiet
  script:
    # Verify the tag version matches the version declared in pyproject.toml.
    # Mismatches (e.g. forgot to bump the version) fail fast before uploading.
    - |
      PKG_VERSION=$(python -c "
      import tomllib, sys
      with open('packages/scheduler/pyproject.toml', 'rb') as f:
          d = tomllib.load(f)
      print(d['project']['version'])
      ")
      TAG_VERSION="${CI_COMMIT_TAG#scheduler-v}"
      if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
        echo "ERROR: tag version ($TAG_VERSION) does not match pyproject.toml version ($PKG_VERSION)"
        echo "Bump the version in packages/scheduler/pyproject.toml before tagging."
        exit 1
      fi
      echo "Version check passed: $PKG_VERSION"
    - cd packages/scheduler
    - python -m build
    - twine upload dist/* --non-interactive
  artifacts:
    # Keep the built wheel as a CI artifact for traceability (7-day expiry).
    paths:
      - packages/scheduler/dist/
    expire_in: 7 days
