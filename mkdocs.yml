site_name: TruePPM
site_description: Open-core Project, Program, and Portfolio Management platform
site_url: https://docs.trueppm.com
repo_url: https://gitlab.com/trueppm/trueppm
repo_name: trueppm/trueppm
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
  - Architecture:
    - Overview: architecture/overview.md
  - Features:
    - CPM Scheduler: features/scheduler.md
    - Role-Based Access Control: features/rbac.md
    - Real-Time Collaboration: features/real-time.md
    - Offline Sync: features/offline-sync.md
  - API Reference: api/index.md
  - ADRs:
    - ADR-0003 RBAC, Auto-Scheduling, WebSockets: adr/0003-rbac-auto-scheduling-websockets.md
