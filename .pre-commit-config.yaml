default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        additional_dependencies: [networkx-stubs, numpy]
        args: [--config-file=packages/scheduler/pyproject.toml]
        files: ^packages/scheduler/
  # Pre-push gate — runs the same checks that gate the CI pipeline so we catch
  # missing migrations, stale openapi.json, and ruff-format drift before they
  # reach GitLab. Requires `make up` (the migration check needs a live DB).
  - repo: local
    hooks:
      - id: pre-push-ci-gates
        name: pre-push CI gates (lint, typecheck, migrations, schema)
        entry: make pre-push
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
