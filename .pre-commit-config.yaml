default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: [--fix]
        stages: [pre-commit]
      - id: ruff-format
        stages: [pre-commit]
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        # types-networkx (the modern stub package) supports DiGraph[T]; the older
        # networkx-stubs package does not, and trueppm_scheduler.engine has used
        # the generic form since the CPM module was written. Match the dev-extras
        # pin in packages/scheduler/pyproject.toml so pre-commit and dev runs agree.
        additional_dependencies: ["types-networkx>=3.0", numpy]
        args: [--config-file=packages/scheduler/pyproject.toml]
        # The mypy config declares `packages = ["trueppm_scheduler"]` — i.e. src
        # only. Match that here; tests are checked by the pytest run, not mypy.
        files: ^packages/scheduler/src/
        stages: [pre-commit]
  # Pre-push gate — checks that require the full codebase state and are NOT
  # covered by the per-file commit hooks above: web eslint and tsc (no
  # commit-time hook because cross-file TS errors need a project-wide pass),
  # missing migrations, and stale openapi.json. Requires `make up` (migrations
  # needs a live DB).
  - repo: local
    hooks:
      - id: pre-push-ci-gates
        name: pre-push CI gates (migrations, schema)
        # Wrapper times each run and appends to .git/pre-push.log (rotated to
        # last 100 lines). Lets us spot when the pre-push gate silently grows
        # past its 60s target.
        entry: bash scripts/pre-push-timed.sh
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
