default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: [--fix]
        stages: [pre-commit]
      - id: ruff-format
        stages: [pre-commit]
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        additional_dependencies: [networkx-stubs, numpy]
        args: [--config-file=packages/scheduler/pyproject.toml]
        files: ^packages/scheduler/
        stages: [pre-commit]
  # Pre-push gate — only checks that require the full codebase state and are
  # NOT covered by the commit-time hooks above: missing migrations and stale
  # openapi.json. Lint and typecheck are intentionally omitted here — they run
  # at commit time on the diff. Requires `make up` (migrations needs a live DB).
  - repo: local
    hooks:
      - id: pre-push-ci-gates
        name: pre-push CI gates (migrations, schema)
        entry: make pre-push
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
