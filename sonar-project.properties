# SonarCloud project configuration.
#
# Project: https://sonarcloud.io/dashboard?id=trueppm_trueppm
#
# This file exists primarily to carry the in-repo issue-exclusion rules below.
# Each block documents *why* a Blocker finding is a false positive so the
# suppression is auditable rather than a silent mute. If a rule genuinely fires
# on new code, remove the matching criterion — do not widen a glob to hide it.
#
# NOTE: `sonar.issue.ignore.multicriteria` is honored by CI-based (sonar-scanner
# CLI) analysis. If this project is switched to SonarCloud *Automatic Analysis*,
# properties files are ignored and these same exclusions must be mirrored under
# Project Settings -> Analysis Scope -> "Ignore Issues on Multiple Criteria".

sonar.projectKey=trueppm_trueppm
sonar.organization=trueppm

# ---------------------------------------------------------------------------
# Test coverage import (issue #2090)
# ---------------------------------------------------------------------------
# SonarCloud does NOT run tests — it *imports* coverage reports from the paths
# below. Without these keys the Coverage metric reads 0.0% no matter how much is
# actually tested (GitLab's ~91% badge is a separate stdout-regex mechanism that
# never reaches the scanner). Generate the reports with `make coverage-diff`
# (or let `scripts/sonar-scan.sh` do it) before scanning.
#
# The scanner runs from the repo root, so path resolution differs per language:
#   - Python Cobertura XML resolves via its absolute <source> roots — no rewrite
#     needed for a local root run (api / scheduler / mcp).
#   - The web LCOV records `SF:src/...` paths relative to packages/web, which do
#     NOT resolve from the repo root. `scripts/sonar-scan.sh` rewrites them to
#     `SF:packages/web/src/...` into lcov.sonar.info — the same prefix the
#     Makefile `coverage-diff-web` target already applies for diff-cover.
sonar.python.coverage.reportPaths=packages/scheduler/coverage.xml,packages/api/coverage.xml,packages/mcp/coverage.xml
sonar.javascript.lcov.reportPaths=packages/web/coverage/lcov.sonar.info

# ---------------------------------------------------------------------------
# Analysis scope exclusions — design/reference artifacts, not product code
# ---------------------------------------------------------------------------
# These trees are static design-handoff mockups and brand-reference documents,
# NOT shipped runtime code: they are never imported by the app, never tested,
# and carry no CI gate. SonarQube was raising their throwaway markup as product
# a11y/reliability findings (missing input id/label, non-native interactive
# elements, missing button type, missing table <th>, global parseInt). Exclude
# them from analysis entirely rather than muting each rule per-file — there is
# nothing here to keep green, and excluding also keeps them out of coverage /
# duplication metrics. If real product code ever moves under these paths, narrow
# the glob rather than deleting the exclusion.
#   - docs/design/handoff/**  : 2026-05 design-handoff HTML/JSX mockups
#                               (visual-specs.html, design-canvas.jsx,
#                               task-content-variations.jsx, …)
#   - packages/web/brand/**   : brand-guidelines.html + token/reference assets
sonar.exclusions=docs/design/handoff/**,packages/web/brand/**

sonar.issue.ignore.multicriteria=secret1,secret2,secret3,secret4,secret5,e2e1,drf1,drf2,drf3,drf4,ts1,ts2,sort1,sort2,sort3,sort4,lit1,lit2,lit3,cli1,cli2,cli3,cli4,sh1,sh2,pipbin1,piplock1,npmscript1,k8sstore1,pycred1,pycred2,pysql1,pyprng1,pytmp1,tspath1,ymlcred1,gherkin1,gherkin2

# ---------------------------------------------------------------------------
# Secret detection (secrets:*) — dev / CI / demo database credentials
# ---------------------------------------------------------------------------
# Every "PostgreSQL password" / "GitLab token" Blocker points at a NON-production
# default, not a leaked credential:
#   - docker-compose*.yml : local dev stack (settings.dev) and the public demo
#     (no accounts, no auth write path — see the demo file header).
#   - .gitlab-ci.yml      : `trueppm:trueppm` on ephemeral CI Postgres service
#     containers that live and die inside a single job.
#   - .gitleaks.toml      : the secret-scanner's own allowlist of FAKE fixture
#     tokens (e.g. the `glpat-abc123-...` round-trip plaintext).
#   - scripts/backup.sh   : the credential appears inside a usage comment.
#   - settings/base.py    : `env.db("DATABASE_URL", default=...)` — the standard
#     django-environ dev fallback; production injects DATABASE_URL from a
#     Kubernetes Secret and never reaches the default.
sonar.issue.ignore.multicriteria.secret1.ruleKey=secrets:*
sonar.issue.ignore.multicriteria.secret1.resourceKey=**/docker-compose*.yml
sonar.issue.ignore.multicriteria.secret2.ruleKey=secrets:*
sonar.issue.ignore.multicriteria.secret2.resourceKey=.gitlab-ci.yml
sonar.issue.ignore.multicriteria.secret3.ruleKey=secrets:*
sonar.issue.ignore.multicriteria.secret3.resourceKey=.gitleaks.toml
sonar.issue.ignore.multicriteria.secret4.ruleKey=secrets:*
sonar.issue.ignore.multicriteria.secret4.resourceKey=scripts/backup.sh
sonar.issue.ignore.multicriteria.secret5.ruleKey=secrets:*
sonar.issue.ignore.multicriteria.secret5.resourceKey=**/settings/base.py

# ---------------------------------------------------------------------------
# S2699 "Add at least one assertion to this test case" — Playwright e2e
# ---------------------------------------------------------------------------
# The rule does not recognize Playwright's `expect.poll(() => captured).toEqual(...)`
# assertion form, which this suite uses idiomatically to verify captured request
# bodies. It also flags the intentional empty `test.skip(...)` placeholders kept
# per the #380 "skip, don't delete" convention. Real assertion gaps are caught in
# review, not by this rule.
sonar.issue.ignore.multicriteria.e2e1.ruleKey=typescript:S2699
sonar.issue.ignore.multicriteria.e2e1.resourceKey=packages/web/e2e/**/*.spec.ts

# ---------------------------------------------------------------------------
# python:S3516 "method always returns the same value" — DRF/permission contracts
# ---------------------------------------------------------------------------
# These fire on framework-contract methods that CANNOT be refactored away:
#   - DRF `validate_<field>(self, value)` must return `value`; the alternate
#     PermissionDenied branch only fires under an Enterprise enforcement lock
#     (never registered in OSS), so Sonar sees the happy path as invariant.
#   - DRF permission `has_permission` returns True or *raises* AuthenticationFailed
#     (401-for-enumeration-safety, ADR-driven) — returning False would flip 401->403
#     and break the security contract.
sonar.issue.ignore.multicriteria.drf1.ruleKey=python:S3516
sonar.issue.ignore.multicriteria.drf1.resourceKey=**/serializers.py
sonar.issue.ignore.multicriteria.drf2.ruleKey=python:S3516
sonar.issue.ignore.multicriteria.drf2.resourceKey=**/permissions.py
sonar.issue.ignore.multicriteria.drf3.ruleKey=python:S3516
sonar.issue.ignore.multicriteria.drf3.resourceKey=**/bulk_settings.py
sonar.issue.ignore.multicriteria.drf4.ruleKey=python:S3516
sonar.issue.ignore.multicriteria.drf4.resourceKey=**/views.py

# ---------------------------------------------------------------------------
# typescript:S3516 "function always returns the same value" — React internals
# ---------------------------------------------------------------------------
# BoardView `myCountByStatus`: a useMemo reducer whose two exits both `return counts`
# (an early-out plus the post-loop return of the same accumulator) — correct.
# UnscheduledGutter `onUp`: a `setDrag(d => ...)` updater that always returns null
# because it clears the drag state; it is used for its side effects.
sonar.issue.ignore.multicriteria.ts1.ruleKey=typescript:S3516
sonar.issue.ignore.multicriteria.ts1.resourceKey=packages/web/src/features/board/BoardView.tsx
sonar.issue.ignore.multicriteria.ts2.ruleKey=typescript:S3516
sonar.issue.ignore.multicriteria.ts2.resourceKey=packages/web/src/features/schedule/UnscheduledGutter.tsx

# ---------------------------------------------------------------------------
# typescript:S2871 "Provide a compare function to sort" — string / ISO-date sorts
# ---------------------------------------------------------------------------
# Every hit sorts arrays of *strings* or *ISO-8601 date strings*, where the
# default lexicographic order is correct and intended:
#   - activity/{changelogUrl,useProjectChangelog}.ts : sort enum filter tokens
#     into a stable, deterministic order for clean URLs and query keys.
#   - schedule/export/schedulePrintData.ts : sort ISO `YYYY-MM-DD` start/finish
#     strings — ISO-8601 sorts chronologically by construction (earliest/latest).
#   - schedule/export/SchedulePrintLayout.tsx : same, ISO-date row ordering.
#   - me/NotificationPreferencesPage.tsx : `.sort()` the "rest" event-type keys,
#     deliberately alphabetized (see the inline comment at the call site).
# A genuine numeric-array sort bug would fire elsewhere and is caught in review;
# these files are scoped explicitly rather than muting S2871 project-wide.
sonar.issue.ignore.multicriteria.sort1.ruleKey=typescript:S2871
sonar.issue.ignore.multicriteria.sort1.resourceKey=packages/web/src/features/project/activity/*.ts
sonar.issue.ignore.multicriteria.sort2.ruleKey=typescript:S2871
sonar.issue.ignore.multicriteria.sort2.resourceKey=packages/web/src/features/schedule/export/schedulePrintData.ts
sonar.issue.ignore.multicriteria.sort3.ruleKey=typescript:S2871
sonar.issue.ignore.multicriteria.sort3.resourceKey=packages/web/src/features/schedule/export/SchedulePrintLayout.tsx
sonar.issue.ignore.multicriteria.sort4.ruleKey=typescript:S2871
sonar.issue.ignore.multicriteria.sort4.resourceKey=packages/web/src/features/me/NotificationPreferencesPage.tsx

# ---------------------------------------------------------------------------
# python:S1192 "Define a constant instead of duplicating this literal" —
# generated migrations & seed/demo fixtures
# ---------------------------------------------------------------------------
# Django migrations are generated files (see the "Migration discipline" section
# in CLAUDE.md) and are squashed with `replaces=`; hand-editing them to hoist an
# app-label string ("projects.task", "projects.program", …) into a constant is
# forbidden and would not survive a regenerate. Seed/demo builders repeat person
# names and feature labels ("Tom Nguyen", "Onboarding flow", event-type strings)
# as fixture DATA, not code duplication worth a constant. S1192 stays active on
# real product code (views/models/services), only these generated/fixture trees
# are excluded.
sonar.issue.ignore.multicriteria.lit1.ruleKey=python:S1192
sonar.issue.ignore.multicriteria.lit1.resourceKey=**/migrations/**
sonar.issue.ignore.multicriteria.lit2.ruleKey=python:S1192
sonar.issue.ignore.multicriteria.lit2.resourceKey=scripts/seeds/**
sonar.issue.ignore.multicriteria.lit3.ruleKey=python:S1192
sonar.issue.ignore.multicriteria.lit3.resourceKey=**/management/commands/seed_*.py

# ---------------------------------------------------------------------------
# {python,js}security:S8705 / security:S8707 / javascript:S4036 — dev/CI script
# subprocess & path handling ("LLM CLI args escape", PATH)
# ---------------------------------------------------------------------------
# These Vulnerability rules fire only on build/CI tooling under scripts/** and
# packages/web/scripts/**, never on runtime/product code. Every hit uses
# list-form `subprocess.run([...])` / `execFileSync('git', [...])` (no shell) on
# internal git refs and repo-relative paths — there is no shell interpolation and
# no untrusted network input in a CI checkout. Scoped to the tooling trees so the
# rules stay active on any product code that ever shells out.
sonar.issue.ignore.multicriteria.cli1.ruleKey=pythonsecurity:S8705
sonar.issue.ignore.multicriteria.cli1.resourceKey=scripts/**
sonar.issue.ignore.multicriteria.cli2.ruleKey=pythonsecurity:S8707
sonar.issue.ignore.multicriteria.cli2.resourceKey=scripts/**
sonar.issue.ignore.multicriteria.cli3.ruleKey=jssecurity:S8705
sonar.issue.ignore.multicriteria.cli3.resourceKey=packages/web/scripts/**
sonar.issue.ignore.multicriteria.cli4.ruleKey=javascript:S4036
sonar.issue.ignore.multicriteria.cli4.resourceKey=packages/web/scripts/**

# ---------------------------------------------------------------------------
# shelldre:S7688 "[[ over [" and shelldre:S131 "case without default" — shell
# ---------------------------------------------------------------------------
# Project shell convention is POSIX-portable `[ ... ]` tests; the `[[ ]]`
# preference is stylistic and not adopted. The `case` statements without a `*)`
# arm are deliberate fall-throughs (a non-match means "not a matched file, keep
# going / exit 0" — e.g. the safety hook and release/backup scripts); an empty
# default arm would be pure ceremony. Scoped to *.sh so switch-default coverage
# stays enforced on TS/Python.
sonar.issue.ignore.multicriteria.sh1.ruleKey=shelldre:S7688
sonar.issue.ignore.multicriteria.sh1.resourceKey=**/*.sh
sonar.issue.ignore.multicriteria.sh2.ruleKey=shelldre:S131
sonar.issue.ignore.multicriteria.sh2.resourceKey=**/*.sh

# ===========================================================================
# 0.4 security-hotspot backlog (#2085). Rule keys verified against the live
# SonarCloud project. The fixable findings were remediated in code (Helm
# automountServiceAccountToken + ephemeral-storage limits, HTTPS-pinned curls,
# --only-binary on the wheel-only pip installs, npm ci, non-root CI images,
# postMessage target origin). The blocks below cover the residual findings that
# are either already mitigated in-source or cannot be satisfied without breaking
# a build. Each documents *why*; remove a block if its rule ever fires on new
# code rather than widening a glob.
# ===========================================================================

# ---------------------------------------------------------------------------
# docker:S8541 "Omitting --only-binary :all: can lead to setup-script execution"
# ---------------------------------------------------------------------------
# Every residual hit is a DELIBERATE local source / editable install that
# --only-binary :all: would reject outright: the first-party packages
# (/build/scheduler, /build/api[c], /build/mcp) and the CI images' runtime
# `pip install -e packages/...` editable re-link. `[c]` also compiles psycopg
# from its sdist against the system libpq (the hardened production driver). The
# genuinely wheel-only bootstraps (the `wheel` upgrade, cyclonedx-bom, the dev
# pre-commit install) DID get --only-binary in code, so this only masks the
# unavoidable source installs, not fetched third-party wheels.
sonar.issue.ignore.multicriteria.pipbin1.ruleKey=docker:S8541
sonar.issue.ignore.multicriteria.pipbin1.resourceKey=**/*Dockerfile

# ---------------------------------------------------------------------------
# docker:S8544 "Using dependencies without locking resolved versions" (pip)
# ---------------------------------------------------------------------------
# Application dependencies ARE locked — every real install resolves from the
# pinned `pyproject.toml` metadata of the first-party packages. The flagged
# lines are the `wheel>=0.46.2` CVE-floor bootstrap (a deliberate lower bound so
# the build tool keeps receiving security fixes, #1388) and the editable
# first-party installs, neither of which is a hash-pinned third-party fetch.
sonar.issue.ignore.multicriteria.piplock1.ruleKey=docker:S8544
sonar.issue.ignore.multicriteria.piplock1.resourceKey=**/*Dockerfile

# ---------------------------------------------------------------------------
# docker:S6505 "Omitting --ignore-scripts allows lifecycle scripts to run"
# ---------------------------------------------------------------------------
# The web image installs with `npm ci` (locked, reproducible). --ignore-scripts
# cannot be added: esbuild (the Vite bundler's core) resolves its platform
# binary through an install lifecycle script, so ignoring scripts breaks
# `npm run build`. The lockfile pins exact versions + integrity hashes, which is
# the real supply-chain guarantee here.
sonar.issue.ignore.multicriteria.npmscript1.ruleKey=docker:S6505
sonar.issue.ignore.multicriteria.npmscript1.resourceKey=packages/web/Dockerfile

# ---------------------------------------------------------------------------
# kubernetes:S6870 "Specify a storage limit for this container"
# ---------------------------------------------------------------------------
# The ephemeral-storage requests/limits ARE set — in packages/helm/values.yaml
# (api/worker/beat/web) and the postgresql/valkey subchart values.yaml. The
# deployment/statefulset templates inject them via `{{ toYaml .Values.resources }}`,
# which the IaC analyzer cannot statically resolve, so it reports a missing
# limit on the template even though the rendered manifest carries one.
sonar.issue.ignore.multicriteria.k8sstore1.ruleKey=kubernetes:S6870
sonar.issue.ignore.multicriteria.k8sstore1.resourceKey=packages/helm/**

# ---------------------------------------------------------------------------
# python:S2068 "Hard-coded credentials" — bootstrap / fixture passwords
# ---------------------------------------------------------------------------
# create_admin.py generates the superuser password with `secrets` and writes it
# to a file; the flagged token is the env-var NAME, not a value. The integration
# fixture default (`ci-integration-pw`) is honored ONLY under settings.DEBUG —
# a public (non-DEBUG) instance always gets a random token (#1375). Neither is a
# credential that ships to production.
sonar.issue.ignore.multicriteria.pycred1.ruleKey=python:S2068
sonar.issue.ignore.multicriteria.pycred1.resourceKey=**/management/commands/create_admin.py
sonar.issue.ignore.multicriteria.pycred2.ruleKey=python:S2068
sonar.issue.ignore.multicriteria.pycred2.resourceKey=**/management/commands/seed_integration_fixtures.py

# ---------------------------------------------------------------------------
# python:S2077 "Formatting SQL queries is security-sensitive"
# ---------------------------------------------------------------------------
# The single interpolated UPDATE in projects/models.py builds its table/column
# identifiers from the model `_meta` (never user input), quotes them via
# `connection.ops.quote_name`, and binds the pk as a parameter — already carries
# `# nosec B608` and a rationale comment. No user-controlled data reaches the SQL.
sonar.issue.ignore.multicriteria.pysql1.ruleKey=python:S2077
sonar.issue.ignore.multicriteria.pysql1.resourceKey=**/apps/projects/models.py

# ---------------------------------------------------------------------------
# python:S2245 "Using pseudorandom number generators is security-sensitive"
# ---------------------------------------------------------------------------
# The seed/demo builders use a SEEDED `random.Random` to synthesize reproducible
# demo data (forecast backfill history, activity replay beats). Determinism is
# the point — `secrets`/`SystemRandom` cannot be seeded — and none of it is a
# security decision (no tokens, keys, or nonces). Scoped to the seed tree so
# S2245 stays active on any runtime code.
sonar.issue.ignore.multicriteria.pyprng1.ruleKey=python:S2245
sonar.issue.ignore.multicriteria.pyprng1.resourceKey=**/apps/projects/seed/**

# ---------------------------------------------------------------------------
# python:S5443 "Using publicly writable directories is security-sensitive"
# ---------------------------------------------------------------------------
# The `/tmp/trueppm_admin_password` default in create_admin.py is a documented
# dev convenience carrying `# nosec B108`; production sets
# TRUEPPM_ADMIN_PASSWORD_FILE to a non-world-writable path (the Helm chart mounts
# an emptyDir at /run/trueppm and points the env var there).
sonar.issue.ignore.multicriteria.pytmp1.ruleKey=python:S5443
sonar.issue.ignore.multicriteria.pytmp1.resourceKey=**/management/commands/create_admin.py

# ---------------------------------------------------------------------------
# typescript:S4036 "Make sure the PATH variable only contains fixed dirs"
# ---------------------------------------------------------------------------
# vite.config.ts shells out to `git rev-parse` at BUILD time to stamp the build
# SHA, resolving `git` from PATH. This runs only in the developer/CI build
# environment (never at runtime, never on user input); a compromised build PATH
# is already game-over. The equivalent packages/web/scripts/** hits are covered
# by cli4; this adds the config file at the package root.
sonar.issue.ignore.multicriteria.tspath1.ruleKey=typescript:S4036
sonar.issue.ignore.multicriteria.tspath1.resourceKey=packages/web/vite.config.ts

# ---------------------------------------------------------------------------
# yaml:S2068 "Hard-coded credentials" — docker-compose dev database password
# ---------------------------------------------------------------------------
# The `POSTGRES_PASSWORD: trueppm` in the compose files is the local dev / demo
# default (settings.dev; the public demo has no auth write path). Production
# injects the password from a Kubernetes Secret and never uses this value. This
# is the yaml-analyzer companion to secret1's `secrets:*` docker-compose block.
sonar.issue.ignore.multicriteria.ymlcred1.ruleKey=yaml:S2068
sonar.issue.ignore.multicriteria.ymlcred1.resourceKey=**/docker-compose*.yml

# ---------------------------------------------------------------------------
# typescript:S7739 "Do not add `then` to an object" — Gherkin acceptance criteria
# ---------------------------------------------------------------------------
# These two files map an AcceptanceCriterion's Gherkin **given / when / then**
# fields (ADR-0105 product-backlog acceptance criteria). The `then` property is
# a `string` (the Gherkin outcome clause), never a function — so the "accidental
# thenable" hazard the rule guards against (an object with a callable `then`
# being unwrapped by `await` / Promise resolution) does not apply: `await x` only
# unwraps when `IsCallable(x.then)`, and a string is not callable. Renaming the
# field would break the server API contract (`c.then`) and the `AcceptanceCriterion`
# type consumed across the UI. Scoped to the two mapper files, not S7739 globally.
sonar.issue.ignore.multicriteria.gherkin1.ruleKey=typescript:S7739
sonar.issue.ignore.multicriteria.gherkin1.resourceKey=packages/web/src/features/project/backlog/api.ts
sonar.issue.ignore.multicriteria.gherkin2.ruleKey=typescript:S7739
sonar.issue.ignore.multicriteria.gherkin2.resourceKey=packages/web/src/hooks/useScheduleTasks.ts
