apiVersion: v2
name: trueppm
description: TruePPM project scheduling platform
type: application
version: 0.2.0
appVersion: "0.2.0"
# Dev/demo PostgreSQL + Valkey are vendored as first-party subcharts under
# charts/ (official postgres / valkey-io images), replacing the deprecated
# Bitnami subcharts (#827). file:// deps resolve from the committed charts/
# directory with no network and no `helm dependency build`, so `helm lint` and
# `helm template` validate offline in CI. Production runs neither — it disables
# both (values-prod.yaml) and points DATABASE_URL/REDIS_URL at managed services.
# Valkey is the BSD-licensed Redis fork; wire-compatible with Redis 7.2, so the
# `REDIS_URL` env name is preserved (rename deferred to 1.0, ADR-0040).
dependencies:
  - name: postgresql
    version: "0.2.0"
    repository: "file://charts/postgresql"
    condition: postgresql.enabled
  - name: valkey
    version: "0.2.0"
    repository: "file://charts/valkey"
    condition: valkey.enabled
