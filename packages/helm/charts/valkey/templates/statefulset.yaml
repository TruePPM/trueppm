apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "valkey.fullname" . }}
  labels:
    {{- include "valkey.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "valkey.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "valkey.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "valkey.selectorLabels" . | nindent 8 }}
    spec:
      # The cache pod makes no in-cluster Kubernetes API calls, so the default
      # ServiceAccount token is never needed and is left unmounted to shrink the
      # blast radius of a compromised container (matches the api/web deployments).
      automountServiceAccountToken: false
      # valkey/valkey image's `valkey` user is uid/gid 999.
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: valkey
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # readOnlyRootFilesystem is omitted because valkey writes its append-
          # only file under /data (a writable PVC mount) but the image also
          # touches /tmp at the root fs. The rest of the restricted profile is
          # applied.
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          {{- if .Values.auth.enabled }}
          # --requirepass reads the password from the env var via a shell so the
          # secret is never baked into the (world-readable) command line / pod
          # spec. The exec-form `command:` above cannot expand $(VAR), so we wrap
          # in `sh -c`.
          command:
            - sh
            - -c
            - exec valkey-server --appendonly yes --requirepass "$VALKEY_PASSWORD"
          env:
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  {{- if include "valkey.hasParent" . }}
                  name: {{ include "valkey.parentConnectionSecret" . }}
                  {{- else }}
                  name: {{ include "valkey.fullname" . }}
                  {{- end }}
                  key: valkey-password
          {{- else }}
          command:
            - valkey-server
            - --appendonly
            - "yes"
          {{- end }}
          ports:
            - name: valkey
              containerPort: 6379
          readinessProbe:
            exec:
              {{- if .Values.auth.enabled }}
              # -a reads $VALKEY_PASSWORD via the shell; the JSON exec array does
              # not expand $(VAR), so wrap in sh -c.
              command: ["sh", "-c", "valkey-cli -a \"$VALKEY_PASSWORD\" ping"]
              {{- else }}
              command: ["valkey-cli", "ping"]
              {{- end }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              {{- if .Values.auth.enabled }}
              command: ["sh", "-c", "valkey-cli -a \"$VALKEY_PASSWORD\" ping"]
              {{- else }}
              command: ["valkey-cli", "ping"]
              {{- end }}
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | quote }}
