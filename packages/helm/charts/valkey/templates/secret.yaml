{{/*
The Valkey password lives in the parent chart's connection Secret
(global.trueppm.connectionSecretName) — the single source of truth shared with
REDIS_URL. This subchart-local Secret is only rendered for standalone use (no
parent global set), so `helm template charts/valkey` still works in CI.
*/}}
{{- if and .Values.auth.enabled (not (include "valkey.hasParent" .)) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "valkey.fullname" . }}
  labels:
    {{- include "valkey.labels" . | nindent 4 }}
type: Opaque
stringData:
  valkey-password: {{ required "valkey.auth.password is required when auth is enabled and rendered without the TruePPM parent chart" .Values.auth.password | quote }}
{{- end }}
