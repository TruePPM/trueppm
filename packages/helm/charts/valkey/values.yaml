# Values for the vendored dev/demo Valkey subchart.
# The parent chart's `valkey:` block maps onto these keys; the parent's
# `condition: valkey.enabled` gates whether this subchart renders at all.
image:
  repository: valkey/valkey
  tag: "8"
  pullPolicy: IfNotPresent

auth:
  # When true, the server requires `--requirepass` and REDIS_URL must include
  # the password. Default ON (the parent chart sources the password from its
  # connection Secret; see global.trueppm in the parent values.yaml). The
  # `password` here is only used for standalone subchart rendering — under the
  # parent it is ignored in favor of the shared connection Secret.
  enabled: true
  password: ""

persistence:
  size: 2Gi
  storageClass: ""

resources:
  requests:
    cpu: 100m
    memory: 256Mi
    # AOF lives on the PVC; ephemeral covers /tmp scratch only.
    ephemeral-storage: 128Mi
  limits:
    cpu: "1"
    memory: 1Gi
    ephemeral-storage: 512Mi
