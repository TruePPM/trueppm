# Values for the vendored dev/demo PostgreSQL subchart.
# The parent chart's `postgresql:` block maps onto these keys, and the parent's
# `condition: postgresql.enabled` gates whether this subchart renders at all.
image:
  repository: postgres
  tag: "16"
  pullPolicy: IfNotPresent

# Credentials seeded into the database on first boot. Under the parent chart the
# PASSWORD is sourced from the parent's connection Secret (single source of truth
# shared with DATABASE_URL); `password` here is only used for standalone subchart
# rendering and is required in that case.
auth:
  username: trueppm
  password: ""
  database: trueppm

persistence:
  size: 8Gi
  # Empty string uses the cluster default StorageClass.
  storageClass: ""

# Default resource requests/limits for the bundled dev/demo database. Tune for
# your data volume; production should run a managed database (postgresql.enabled:
# false) instead.
resources:
  requests:
    cpu: 250m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 4Gi
