apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "postgresql.fullname" . }}
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "postgresql.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "postgresql.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "postgresql.selectorLabels" . | nindent 8 }}
    spec:
      # The database pod makes no in-cluster Kubernetes API calls, so the default
      # ServiceAccount token is never needed and is left unmounted to shrink the
      # blast radius of a compromised container (matches the api/web deployments).
      automountServiceAccountToken: false
      # postgres image's `postgres` user is uid/gid 999; fsGroup makes the PVC
      # group-writable so the non-root process can initialise PGDATA.
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: postgresql
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # readOnlyRootFilesystem is intentionally NOT set: the postgres image
          # writes runtime sockets/locks to /var/run/postgresql and /tmp at the
          # root filesystem. The remaining hardening (no privilege escalation,
          # all capabilities dropped, seccomp) is safe for this image.
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          envFrom:
            # POSTGRES_USER / POSTGRES_DB (non-secret).
            - secretRef:
                name: {{ include "postgresql.fullname" . }}
          env:
            # POSTGRES_PASSWORD: sourced from the parent chart's connection
            # Secret when rendered as a subchart (single source of truth shared
            # with DATABASE_URL); falls back to this subchart's own Secret for
            # standalone rendering.
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  {{- if include "postgresql.hasParent" . }}
                  name: {{ include "postgresql.parentConnectionSecret" . }}
                  {{- else }}
                  name: {{ include "postgresql.fullname" . }}
                  {{- end }}
                  key: POSTGRES_PASSWORD
            # Use a sub-directory so initdb doesn't trip over the volume's
            # lost+found at the mount root.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgresql
              containerPort: 5432
          readinessProbe:
            exec:
              command:
                ["pg_isready", "-U", {{ .Values.auth.username | quote }}, "-d", {{ .Values.auth.database | quote }}]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                ["pg_isready", "-U", {{ .Values.auth.username | quote }}, "-d", {{ .Values.auth.database | quote }}]
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | quote }}
