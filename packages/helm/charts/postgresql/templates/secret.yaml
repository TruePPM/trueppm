{{/*
Non-secret connection params (user, database). The PASSWORD is intentionally NOT
stored here: it lives only in the parent chart's connection Secret
(global.trueppm.connectionSecretName), which is the single source of truth shared
with DATABASE_URL. The statefulset pulls POSTGRES_PASSWORD from that Secret via
secretKeyRef so the server credential and the URL can never drift apart.

When the subchart is rendered standalone (no parent global set), it falls back to
its own auth.password so `helm template charts/postgresql` still works in CI.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "postgresql.fullname" . }}
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.auth.username | quote }}
  POSTGRES_DB: {{ .Values.auth.database | quote }}
  {{- if not (include "postgresql.hasParent" .) }}
  POSTGRES_PASSWORD: {{ required "postgresql.auth.password is required when rendered without the TruePPM parent chart" .Values.auth.password | quote }}
  {{- end }}
