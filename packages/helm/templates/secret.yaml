{{/*
Chart-owned connection Secret — the single source of truth for every credential
the release uses. It holds:
  - DATABASE_URL / REDIS_URL: full connection strings the API and Celery worker
    consume via `secretKeyRef` (the app reads whole URLs, not discrete fields).
  - POSTGRES_PASSWORD / valkey-password: the raw passwords the bundled subcharts
    consume, so the database server and the URL string can never drift apart.

`helm.sh/resource-policy: keep` ensures a `helm uninstall` does NOT delete this
Secret, so an accidental uninstall/reinstall cannot silently mint a new password
and orphan the existing database PVC. The passwords are generate-if-unset
(see trueppm.postgresqlPassword / trueppm.valkeyPassword), so re-renders are
idempotent: an existing Secret's password is read back rather than regenerated.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "trueppm.urlSecretName" . }}
  labels:
    {{- include "trueppm.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  DATABASE_URL: {{ include "trueppm.databaseUrl" . | quote }}
  REDIS_URL: {{ include "trueppm.redisUrl" . | quote }}
  {{- if .Values.postgresql.enabled }}
  POSTGRES_PASSWORD: {{ include "trueppm.postgresqlPassword" . | quote }}
  {{- end }}
  {{- if and .Values.valkey.enabled .Values.valkey.auth.enabled }}
  valkey-password: {{ include "trueppm.valkeyPassword" . | quote }}
  {{- end }}
