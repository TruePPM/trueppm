apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "trueppm.fullname" . }}-celery-worker
  labels:
    {{- include "trueppm.labels" . | nindent 4 }}
    app.kubernetes.io/component: celery-worker
spec:
  # Celery workers are stateless; replica count is independent of the API tier.
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "trueppm.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: celery-worker
  template:
    metadata:
      labels:
        {{- include "trueppm.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: celery-worker
    spec:
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      volumes:
        # /tmp is the only writable path the worker needs (tempfile-backed
        # MS Project parsing and workspace export run in the worker too).
        - name: tmp
          emptyDir: {}
      containers:
        - name: celery-worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command:
            - celery
            - -A
            - trueppm_api.celery
            - worker
            - --loglevel=info
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            {{- include "trueppm.envVars" . | nindent 12 }}
            {{- include "trueppm.connectionEnv" . | nindent 12 }}
            {{- include "trueppm.observabilityEnv" . | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.resources.worker | nindent 12 }}
