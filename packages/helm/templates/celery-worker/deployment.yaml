apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "trueppm.fullname" . }}-celery-worker
  labels:
    {{- include "trueppm.labels" . | nindent 4 }}
    app.kubernetes.io/component: celery-worker
spec:
  # Celery workers are stateless; replica count is independent of the API tier.
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "trueppm.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: celery-worker
  template:
    metadata:
      labels:
        {{- include "trueppm.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: celery-worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: celery-worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - celery
            - -A
            - trueppm_api.celery
            - worker
            - --loglevel=info
          env:
            {{- include "trueppm.envVars" . | nindent 12 }}
          resources: {}
