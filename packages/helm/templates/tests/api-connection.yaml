{{/*
`helm test` connection probe (#2279). Runs on demand via `helm test <release>`
and is the operator-facing proof that a fresh install actually came up end to
end: reaching /api/v1/readyz means the migrate -> bootstrap(create_admin) init
sequence completed, the settings.prod import-time boot guards (#1002, #775) were
satisfied by the supplied secrets, and the api container is serving a schema its
code agrees with (readyz is migration-aware, #2217). CI's helm:install job runs
this same hook, so operators and CI verify the identical invariant.

Kept out of the way of a normal render: `helm test` only instantiates resources
carrying the `helm.sh/hook: test` annotation, so this Pod never deploys during
`helm install`/`upgrade`.
*/}}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "trueppm.fullname" . }}-test-api-connection
  labels:
    {{- include "trueppm.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    helm.sh/hook: test
    # Delete a prior run before creating the next so repeated `helm test` calls
    # don't collide on the Pod name; keep a FAILED pod around for `kubectl logs`
    # by only deleting on success.
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  # No in-cluster API calls, so the token is never needed — shrink blast radius,
  # same as the app pods.
  automountServiceAccountToken: false
  restartPolicy: Never
  securityContext:
    {{- toYaml .Values.podSecurityContext | nindent 4 }}
  containers:
    - name: curl
      image: "{{ .Values.tests.image.repository }}:{{ .Values.tests.image.tag }}"
      imagePullPolicy: {{ .Values.image.pullPolicy }}
      securityContext:
        {{- toYaml .Values.containerSecurityContext | nindent 8 }}
      command:
        - /bin/sh
        - -ec
        - |
          host="{{ include "trueppm.fullname" . }}-api:{{ .Values.service.port }}"
          # --retry rides out the rollout window: the Service may resolve before
          # the readiness gate admits the first pod. Fail hard on any non-2xx.
          echo "probing http://${host}/api/v1/health/ ..."
          curl -fsS --retry 30 --retry-delay 2 --retry-all-errors "http://${host}/api/v1/health/"
          echo
          echo "probing http://${host}/api/v1/readyz ..."
          curl -fsS --retry 30 --retry-delay 2 --retry-all-errors "http://${host}/api/v1/readyz"
          echo
          echo "OK: api /health/ and /readyz reachable — install booted clean"
