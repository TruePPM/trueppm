{{- if .Values.networkPolicy.enabled }}
{{/*
Default-on NetworkPolicy (#1715): the bundled datastores speak PLAINTEXT on the
pod network, so this policy is the transport-security boundary in the dev/demo
posture. Two directions are locked down on each bundled datastore pod:

  - Ingress: ONLY the API and Celery worker pods (matched by selector labels) may
    reach PostgreSQL (5432) / Valkey (6379). Every other pod is denied.
  - Egress: default-DENY. A datastore pod has no legitimate reason to initiate
    outbound connections; policyTypes lists Egress with no egress rules, which
    denies all egress and blocks exfiltration from a compromised datastore.

The API and Celery worker pods are deliberately NOT egress-restricted here: they
make legitimate outbound calls (OIDC/OAuth login to the operator's IdP, SMTP,
S3/object storage, OTLP telemetry) whose endpoints are deployment-specific, so a
chart-imposed egress allowlist would break real installs. Restrict their egress
at the platform layer if your environment requires it.

Requires a CNI that enforces NetworkPolicy (Calico, Cilium, Antrea, etc.); on a
cluster without one these objects are accepted but SILENTLY UNENFORCED.

Only rendered for the datastores the chart actually bundles — when postgresql /
valkey are disabled (managed-service path) the corresponding policy is skipped.
*/}}
{{- if .Values.postgresql.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "trueppm.fullname" . }}-postgresql
  labels:
    {{- include "trueppm.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgresql
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "trueppm.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: api
        - podSelector:
            matchLabels:
              {{- include "trueppm.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: celery-worker
        - podSelector:
            matchLabels:
              {{- include "trueppm.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: celery-beat
      ports:
        - protocol: TCP
          port: 5432
  # No egress rules → default-deny egress from the PostgreSQL pod.
  egress: []
{{- end }}
{{- if .Values.valkey.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "trueppm.fullname" . }}-valkey
  labels:
    {{- include "trueppm.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: valkey
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "trueppm.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: api
        - podSelector:
            matchLabels:
              {{- include "trueppm.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: celery-worker
        - podSelector:
            matchLabels:
              {{- include "trueppm.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: celery-beat
      ports:
        - protocol: TCP
          port: 6379
  # No egress rules → default-deny egress from the Valkey pod.
  egress: []
{{- end }}
{{- end }}
