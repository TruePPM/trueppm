{{- if .Values.web.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "trueppm.fullname" . }}-web
  labels:
    {{- include "trueppm.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicaCount | default .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "trueppm.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "trueppm.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      volumes:
        # The web image is a static nginx build of the SPA. With
        # readOnlyRootFilesystem on, nginx needs writable scratch paths for its
        # PID file, temp bodies, and cache — all ephemeral, so emptyDir suffices.
        - name: tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        # Chart-rendered nginx server config, mounted over the image's baked
        # default.conf so the reverse-proxy upstream points at the release-scoped
        # API Service (`<fullname>-api`) instead of the docker-compose-only `api`.
        - name: nginx-conf
          configMap:
            name: {{ include "trueppm.fullname" . }}-web-nginx
      containers:
        - name: web
          image: "{{ .Values.image.webRepository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.web.containerPort | default 8080 }}
              protocol: TCP
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources.web | nindent 12 }}
{{- end }}
