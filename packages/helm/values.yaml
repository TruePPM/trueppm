replicaCount: 1

# Global values propagate to the bundled postgresql / valkey subcharts. The
# presence of this block tells those subcharts they are running under the parent
# TruePPM chart, so they should source their password from the parent's
# connection Secret (the single credential source of truth) rather than minting
# their own. Leave connectionSecretName empty to use the default name derived
# from the release name; override only if you renamed the connection Secret.
global:
  trueppm:
    connectionSecretName: ""

image:
  repository: registry.gitlab.com/trueppm/trueppm/api
  # Empty by default so the chart pins itself to its own appVersion
  # (reproducible rollbacks). Override per-deploy with a concrete tag.
  tag: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false

postgresql:
  enabled: true
  auth:
    username: trueppm
    # Leave password empty to have the chart generate a strong random password
    # (randAlphaNum 32) on first install and persist it in the chart-owned
    # connection Secret (helm.sh/resource-policy: keep), so re-renders never
    # churn it. Set an explicit value only if you must control the credential;
    # in that case the chart honors it verbatim.
    password: ""
    database: trueppm

valkey:
  # Redis-compatible cache. NOTE: this bundled Valkey pod is SINGLE-NODE — no
  # replication, no failover. It is load-bearing for THREE subsystems at once
  # (Django Channels real-time layer, Celery broker, and Django cache backend),
  # so its loss degrades real-time, async, and caching together. For production
  # on-prem, HA Redis (Sentinel, Cluster, or a managed service such as AWS
  # ElastiCache / Azure Cache for Redis) is effectively mandatory: set
  # `enabled: false` and point `env.REDIS_URL` at your external endpoint.
  # See docs → Administration → Redis (Valkey) High Availability
  # (packages/website/src/content/docs/administration/redis-ha.md).
  # Auth is ON by default. Leave password empty to have the chart generate and
  # persist a strong random password (same pattern as postgresql.auth.password).
  enabled: true
  auth:
    enabled: true
    password: ""

# NetworkPolicy is opt-in. When enabled, the chart restricts ingress to the
# bundled PostgreSQL and Valkey pods so that ONLY the API and Celery worker pods
# (matched by their selector labels) can reach the database and cache. Off by
# default because some clusters lack a CNI that enforces NetworkPolicy and a
# silently-unenforced policy is worse than an explicit opt-in.
networkPolicy:
  enabled: false

# Pod-level and container-level security hardening applied to the API and Celery
# worker pods. Defaults follow the restricted Pod Security Standard.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# Default resource requests/limits for the API and Celery worker containers.
# Tune for your workload; these are conservative single-team defaults.
resources:
  api:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
  worker:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi

env:
  DJANGO_SETTINGS_MODULE: trueppm_api.settings.prod
  # Public origin the web app is served from, e.g. "https://trueppm.example.com".
  # Used to build absolute task deep-links in notification emails (ADR-0143, #1158).
  # Leave empty to omit the link line (emails still carry blocker type/age/actor).
  # No trailing slash, no path. Standardized on the TRUEPPM_ prefix pre-0.3
  # (#1355); the legacy bare FRONTEND_BASE_URL still works as a fallback.
  TRUEPPM_FRONTEND_BASE_URL: ""
  # Retention window (days) for soft-deleted ("trashed") projects. Once a project
  # has been in the trash longer than this, the consolidated retention purge
  # (retention.run_purge, ADR-0173) HARD-deletes it and all its child data via DB
  # CASCADE. Default 30. Set to "0" or omit to keep the default; operators tune the
  # live value from Workspace → Settings → System Health. Set to an empty string to
  # disable auto-purge (trashed projects retained unbounded).
  TRUEPPM_PROJECT_SOFT_DELETE_RETENTION_DAYS: "30"
  # Outbound email / SMTP transport (#764). These bind Django's standard EMAIL_*
  # settings; they flow to the api AND celery worker/beat via `trueppm.envVars`,
  # so the Beat-driven notification drain has the same transport everywhere.
  # Leave EMAIL_HOST empty (the default) to run without outbound mail — the
  # read-only Workspace → Settings → Email & SMTP page then reports "Not
  # configured" and in-app notifications still work. Uncomment and set to enable:
  #   EMAIL_HOST: "smtp.example.com"
  #   EMAIL_PORT: "587"
  #   EMAIL_USE_TLS: "true"          # STARTTLS; mutually exclusive with EMAIL_USE_SSL
  #   EMAIL_USE_SSL: "false"
  #   EMAIL_HOST_USER: "notifications@example.com"
  #   DEFAULT_FROM_EMAIL: "notifications@example.com"
  # EMAIL_HOST_PASSWORD MUST come from a Kubernetes Secret — NEVER a plaintext
  # value here. Create the Secret, then reference it via secretKeyRef (the same
  # map form the chart uses for DATABASE_URL). Uncomment to wire it:
  #   EMAIL_HOST_PASSWORD:
  #     secretKeyRef:
  #       name: trueppm-smtp
  #       key: password
  # DATABASE_URL and REDIS_URL are NOT set here. The chart builds them
  # server-side from the generated credentials and injects them via
  # secretKeyRef against the chart-owned connection Secret, so no password is
  # ever rendered in plaintext into a Deployment manifest. When postgresql /
  # valkey are disabled (managed-DB / production path), set DATABASE_URL /
  # REDIS_URL here (or via an override) to point at your managed services.
  #
  # SECRET_KEY, ALLOWED_HOSTS, and INTEGRATION_ENCRYPTION_KEY must be set via a
  # Kubernetes Secret — do NOT store them here in plaintext. Create a Secret and
  # reference it through `envFrom` below (see the `envFrom:` key further down).

# Bulk-inject env vars from existing Secrets/ConfigMaps into the API, Celery
# worker, AND the bootstrap/migrate init containers. This is the supported way to
# supply the secrets that must not live in plaintext and that prod REFUSES TO
# BOOT without (settings.prod enforces them at import time):
#   SECRET_KEY (#566), ALLOWED_HOSTS, INTEGRATION_ENCRYPTION_KEY (#1002)
# Plus a storage choice — TRUEPPM_DEFAULT_FILE_STORAGE (object storage) or
# TRUEPPM_ALLOW_LOCAL_ATTACHMENT_STORAGE=true (#775).
#
# Create the Secret:
#   kubectl create secret generic trueppm-env \
#     --from-literal=SECRET_KEY=$(python3 -c "import secrets; print(secrets.token_urlsafe(50))") \
#     --from-literal=ALLOWED_HOSTS=trueppm.example.com \
#     --from-literal=INTEGRATION_ENCRYPTION_KEY=$(python3 -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())") \
#     --from-literal=TRUEPPM_DEFAULT_FILE_STORAGE=storages.backends.s3.S3Storage
#
# Then reference it here. Explicit `env:` entries above (e.g. the chart-built
# DATABASE_URL) always take precedence over an envFrom key of the same name.
#   envFrom:
#     - secretRef:
#         name: trueppm-env
envFrom: []

# Admin bootstrap settings.
# The bootstrap init container runs `create_admin` once on first deploy and
# writes the one-time password to passwordFile (emptyDir, 0o600).
# Retrieve it with: kubectl exec <api-pod> -- cat /run/trueppm/admin_password
admin:
  # Path inside the container where the one-time password is written.
  # Must match the emptyDir mountPath in the deployment template.
  passwordFile: /run/trueppm/admin_password
  # Admin email address (defaults to admin@trueppm.dev if not set).
  email: ""
