replicaCount: 1

# Global values propagate to the bundled postgresql / valkey subcharts. The
# presence of this block tells those subcharts they are running under the parent
# TruePPM chart, so they should source their password from the parent's
# connection Secret (the single credential source of truth) rather than minting
# their own. Leave connectionSecretName empty to use the default name derived
# from the release name; override only if you renamed the connection Secret.
global:
  trueppm:
    connectionSecretName: ""

image:
  repository: registry.gitlab.com/trueppm/trueppm/api
  # Web tier image: an nginx build of the compiled React SPA (#1896). Shares the
  # tag and pullPolicy below with the API so a release deploys a matching pair.
  webRepository: registry.gitlab.com/trueppm/trueppm/web
  # Empty by default so the chart pins itself to its own appVersion
  # (reproducible rollbacks). Override per-deploy with a concrete tag.
  tag: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

# Web tier (#1896) — the nginx-served React SPA. On by default so a stock
# `helm install` renders a complete, browsable instance (there was no web tier
# before 0.4). Disable it if you front the SPA from your own CDN / static host and
# only want the API + workers from this chart.
web:
  enabled: true
  # Independent replica count; falls back to the top-level replicaCount when unset.
  replicaCount: 1
  # Port nginx listens on inside the container. The stock unprivileged nginx SPA
  # image serves on 8080 as a non-root user, which satisfies the restricted
  # podSecurityContext (runAsNonRoot).
  containerPort: 8080
  service:
    type: ClusterIP
    port: 80

# Chart-managed Ingress + edge TLS (#1714). Off by default: the ingress class,
# hostnames, and certificate source are cluster-specific, so a default-on ingress
# would render a broken object on first install. Enable it and fill hosts/tls to
# expose the API over HTTPS. The Service stays ClusterIP; the Ingress is the sole
# externally-facing object and the TLS termination point.
ingress:
  enabled: false
  # IngressClass to bind (e.g. "nginx", "traefik"). Empty uses the cluster's
  # default IngressClass, if one is marked default.
  className: ""
  # Controller / cert-manager annotations. Example for cert-manager:
  #   cert-manager.io/cluster-issuer: letsencrypt-prod
  annotations: {}
  # One or more virtual hosts. Each path routes to either the web SPA or the API,
  # selected by its `service:` key (`web` or `api`, default `api`). The default
  # below sends /api and /ws to the Django API Service and everything else (/) to
  # the nginx web tier. List the API prefixes BEFORE / so they win the
  # longest-prefix match on controllers that honor path order. pathType defaults to
  # Prefix when omitted. When web.enabled is false, a `service: web` path falls
  # back to the API Service automatically.
  hosts:
    - host: trueppm.example.com
      paths:
        - path: /api
          pathType: Prefix
          service: api
        - path: /ws
          pathType: Prefix
          service: api
        - path: /
          pathType: Prefix
          service: web
  # TLS termination. Each entry names a Kubernetes TLS Secret and the host(s) it
  # covers. With cert-manager the named Secret is provisioned automatically from
  # the issuer annotation above. LEAVE EMPTY only for a dev/demo cluster — an
  # empty list renders an HTTP-only Ingress, which must never front production.
  tls: []
  #  - secretName: trueppm-tls
  #    hosts:
  #      - trueppm.example.com

postgresql:
  enabled: true
  auth:
    username: trueppm
    # Leave password empty to have the chart generate a strong random password
    # (randAlphaNum 32) on first install and persist it in the chart-owned
    # connection Secret (helm.sh/resource-policy: keep), so re-renders never
    # churn it. Set an explicit value only if you must control the credential;
    # in that case the chart honors it verbatim.
    password: ""
    database: trueppm

valkey:
  # Redis-compatible cache. NOTE: this bundled Valkey pod is SINGLE-NODE — no
  # replication, no failover. It is load-bearing for THREE subsystems at once
  # (Django Channels real-time layer, Celery broker, and Django cache backend),
  # so its loss degrades real-time, async, and caching together. For production
  # on-prem, HA Redis (Sentinel, Cluster, or a managed service such as AWS
  # ElastiCache / Azure Cache for Redis) is effectively mandatory: set
  # `enabled: false` and point `env.REDIS_URL` at your external endpoint.
  # See docs → Administration → Redis (Valkey) High Availability
  # (packages/website/src/content/docs/administration/redis-ha.md).
  # Auth is ON by default. Leave password empty to have the chart generate and
  # persist a strong random password (same pattern as postgresql.auth.password).
  enabled: true
  auth:
    enabled: true
    password: ""

# NetworkPolicy — ON by default (#1715). The bundled PostgreSQL and Valkey pods
# speak PLAINTEXT on the pod network (no in-transit TLS), so on a flat network any
# pod in the cluster could open 5432/6379 and read/write the datastore. When
# enabled the chart restricts ingress to the datastores so ONLY the API and Celery
# worker pods (matched by selector labels) can reach them, and applies a
# default-deny EGRESS posture to the datastore pods (they never legitimately dial
# out). This is the enforced default for the bundled dev/demo datastores.
#
# REQUIRES a CNI that enforces NetworkPolicy (Calico, Cilium, Antrea, Weave, …).
# On a cluster whose CNI does NOT enforce policy these objects are accepted but
# silently unenforced — the datastore is then reachable on the flat pod network.
# If your cluster lacks a policy-enforcing CNI, do NOT rely on the bundled
# datastores for anything sensitive; use managed external datastores with TLS
# (values-prod.yaml) instead. Set enabled=false only if you have an equivalent
# network control (e.g. a service mesh) enforcing the same isolation.
networkPolicy:
  enabled: true

# Pod-level and container-level security hardening applied to the API and Celery
# worker pods. Defaults follow the restricted Pod Security Standard.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# Default resource requests/limits for the API and Celery worker containers.
# Tune for your workload; these are conservative single-team defaults.
resources:
  api:
    requests:
      cpu: 250m
      memory: 512Mi
      # /tmp scratch for MS Project parse, workspace export, and Django's
      # buffering of >2.5 MB request bodies (emptyDir, so it counts as ephemeral).
      ephemeral-storage: 256Mi
    limits:
      cpu: "1"
      memory: 2Gi
      ephemeral-storage: 1Gi
  worker:
    requests:
      cpu: 250m
      memory: 512Mi
      ephemeral-storage: 256Mi
    limits:
      cpu: "1"
      memory: 2Gi
      ephemeral-storage: 1Gi
  # Celery Beat is the single scheduler process — light CPU, small memory. It only
  # dispatches; the actual work runs on the worker.
  beat:
    requests:
      cpu: 50m
      memory: 128Mi
      ephemeral-storage: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
      ephemeral-storage: 256Mi
  # Web tier is static nginx — very light.
  web:
    requests:
      cpu: 25m
      memory: 64Mi
      # nginx PID file, temp bodies, and cache (all emptyDir scratch).
      ephemeral-storage: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
      ephemeral-storage: 256Mi

# Health probes (#1904, #1894). The API uses HTTP probes; the Celery worker and
# beat use a `celery inspect ping` exec probe (a control-plane round-trip catches a
# wedged event loop that a bare process-alive check would miss). Every field is
# tunable so operators can loosen timings on constrained clusters.
probes:
  api:
    # Readiness points at the deep /readyz check (#1894) so a pod only joins the
    # Service once its DB/cache dependencies are reachable; liveness stays on the
    # shallow /health/ so a transient dependency blip cannot restart-loop the pod.
    readinessPath: /api/v1/readyz
    readinessInitialDelaySeconds: 10
    readinessPeriodSeconds: 10
    livenessPath: /api/v1/health/
    livenessInitialDelaySeconds: 30
    livenessPeriodSeconds: 30
  worker:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 60
    timeoutSeconds: 10
    failureThreshold: 3
  beat:
    enabled: true
    # Beat has no worker control plane, so its ping targets the fleet (broker
    # reachability). A generous failureThreshold avoids restarting beat over a
    # brief worker blip.
    initialDelaySeconds: 30
    periodSeconds: 60
    timeoutSeconds: 10
    failureThreshold: 5

# Root Django log level threaded into the api, worker, and beat containers via
# DJANGO_LOG_LEVEL (#1899). Empty = leave the app default. Set to DEBUG/INFO/
# WARNING/ERROR to tune verbosity fleet-wide from one knob.
logging:
  level: ""

# PodDisruptionBudgets for the API and worker tiers (#1904). OFF by default — a PDB
# is only meaningful at replicaCount >= 2 (the production posture); on a
# single-replica dev install it adds nothing. Expressed as maxUnavailable so it
# never wedges a node drain. Beat is excluded (pinned singleton).
podDisruptionBudget:
  enabled: false
  api:
    maxUnavailable: 1
  worker:
    maxUnavailable: 1

# Optional HorizontalPodAutoscaler (#1904). OFF by default: an HPA overrides the
# static replicaCount and needs metrics-server (or a custom metrics adapter)
# installed. Enable to scale the API (and optionally the worker) on CPU/memory.
autoscaling:
  enabled: false
  api:
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 75
    # Set to add a memory target; leave empty for CPU-only scaling.
    targetMemoryUtilizationPercentage: ""
  worker:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 75

env:
  DJANGO_SETTINGS_MODULE: trueppm_api.settings.prod
  # Public origin the web app is served from, e.g. "https://trueppm.example.com".
  # Used to build absolute task deep-links in notification emails (ADR-0143, #1158).
  # Leave empty to omit the link line (emails still carry blocker type/age/actor).
  # No trailing slash, no path. Standardized on the TRUEPPM_ prefix pre-0.3
  # (#1355); the legacy bare FRONTEND_BASE_URL still works as a fallback.
  TRUEPPM_FRONTEND_BASE_URL: ""
  # Retention window (days) for soft-deleted ("trashed") projects. Once a project
  # has been in the trash longer than this, the consolidated retention purge
  # (retention.run_purge, ADR-0173) HARD-deletes it and all its child data via DB
  # CASCADE. Default 30. Set to "0" or omit to keep the default; operators tune the
  # live value from Workspace → Settings → System Health. Set to an empty string to
  # disable auto-purge (trashed projects retained unbounded).
  TRUEPPM_PROJECT_SOFT_DELETE_RETENTION_DAYS: "30"
  # General API rate limits (#1080). The default throttle applies to every
  # endpoint that does NOT declare its own scoped throttle; the /api/v1/health/
  # and /api/v1/edition/ Kubernetes probe endpoints are always exempt. Format is
  # DRF "<count>/<period>" where period is sec|min|hour|day. TRUEPPM_THROTTLE_ANON_RATE
  # bounds unauthenticated traffic per client IP; TRUEPPM_THROTTLE_USER_RATE bounds
  # an authenticated account. Raise or lower to fit your deployment.
  TRUEPPM_THROTTLE_ANON_RATE: "60/min"
  TRUEPPM_THROTTLE_USER_RATE: "1000/min"
  # Trusted reverse-proxy depth for real-client-IP extraction behind the anon
  # rate limit. Default 1 matches this chart's single ingress; set to your actual
  # proxy depth (0 = direct, use REMOTE_ADDR). A wrong value lets clients spoof
  # X-Forwarded-For and evade the anon limit.
  TRUEPPM_NUM_PROXIES: "1"
  # Public read-only board sharing (#283, ADR-0245). The org-wide kill switch for
  # the unauthenticated /share/board/<token> endpoint. "true" (default) lets project
  # Admins mint public board links; NO data is exposed until one is explicitly
  # created. Set "false" to disable minting (403) AND retroactively turn off every
  # existing public link (uniform 404) across the whole instance — the operator lever
  # for locked-down/regulated environments. Rate limits for the endpoints:
  #   TRUEPPM_THROTTLE_SHARE_ACCESS_RATE (public GET, default 60/min)
  #   TRUEPPM_THROTTLE_SHARE_MINT_RATE   (Admin create, default 20/min)
  TRUEPPM_PUBLIC_BOARD_SHARING_ENABLED: "true"
  # MCP administration controls (#2021, ADR-0497). TRUEPPM_MCP_ENABLED is the
  # instance-wide kill switch for read-only MCP (AI-agent) token access. "true"
  # (default) lets personal tokens carrying the mcp:read scope read the MCP
  # surface; set "false" to deny every MCP-token read (403) across the whole
  # instance — the operator lever for "no agent access, period." Human
  # JWT/session traffic on the same endpoints is unaffected either way.
  TRUEPPM_MCP_ENABLED: "true"
  # Per-token rate limits for the MCP read surface (#1808). These bound
  # token-authenticated reads ONLY; human JWT/session traffic on the same views is
  # unaffected. TRUEPPM_THROTTLE_MCP_READ_RATE is the baseline per-token cap on
  # every MCP-readable view; TRUEPPM_THROTTLE_MCP_READ_COMPUTE_RATE is the tighter
  # bucket the four compute-heavy tools (whatif, monte-carlo/latest, forecast,
  # sprint-forecast) stack on top, since each triggers a CPM + Monte Carlo
  # recompute. Widen for a trusted agent fleet or tighten under load.
  TRUEPPM_THROTTLE_MCP_READ_RATE: "120/min"
  TRUEPPM_THROTTLE_MCP_READ_COMPUTE_RATE: "12/min"
  # Outbound email / SMTP transport (#764). These bind Django's standard EMAIL_*
  # settings; they flow to the api AND celery worker/beat via `trueppm.envVars`,
  # so the Beat-driven notification drain has the same transport everywhere.
  # Leave EMAIL_HOST empty (the default) to run without outbound mail — the
  # read-only Workspace → Settings → Email & SMTP page then reports "Not
  # configured" and in-app notifications still work. Uncomment and set to enable:
  #   EMAIL_HOST: "smtp.example.com"
  #   EMAIL_PORT: "587"
  #   EMAIL_USE_TLS: "true"          # STARTTLS; mutually exclusive with EMAIL_USE_SSL
  #   EMAIL_USE_SSL: "false"
  #   EMAIL_HOST_USER: "notifications@example.com"
  #   DEFAULT_FROM_EMAIL: "notifications@example.com"
  # EMAIL_HOST_PASSWORD MUST come from a Kubernetes Secret — NEVER a plaintext
  # value here. Create the Secret, then reference it via secretKeyRef (the same
  # map form the chart uses for DATABASE_URL). Uncomment to wire it:
  #   EMAIL_HOST_PASSWORD:
  #     secretKeyRef:
  #       name: trueppm-smtp
  #       key: password
  # DATABASE_URL and REDIS_URL are NOT set here. The chart builds them
  # server-side from the generated credentials and injects them via
  # secretKeyRef against the chart-owned connection Secret, so no password is
  # ever rendered in plaintext into a Deployment manifest. When postgresql /
  # valkey are disabled (managed-DB / production path), set DATABASE_URL /
  # REDIS_URL here (or via an override) to point at your managed services.
  #
  # SECRET_KEY, ALLOWED_HOSTS, and INTEGRATION_ENCRYPTION_KEY must be set via a
  # Kubernetes Secret — do NOT store them here in plaintext. Create a Secret and
  # reference it through `envFrom` below (see the `envFrom:` key further down).

# Bulk-inject env vars from existing Secrets/ConfigMaps into the API, Celery
# worker, AND the bootstrap/migrate init containers. This is the supported way to
# supply the secrets that must not live in plaintext and that prod REFUSES TO
# BOOT without (settings.prod enforces them at import time):
#   SECRET_KEY (#566), ALLOWED_HOSTS, INTEGRATION_ENCRYPTION_KEY (#1002)
# Plus a storage choice — TRUEPPM_DEFAULT_FILE_STORAGE (object storage) or
# TRUEPPM_ALLOW_LOCAL_ATTACHMENT_STORAGE=true (#775).
#
# Create the Secret:
#   kubectl create secret generic trueppm-env \
#     --from-literal=SECRET_KEY=$(python3 -c "import secrets; print(secrets.token_urlsafe(50))") \
#     --from-literal=ALLOWED_HOSTS=trueppm.example.com \
#     --from-literal=INTEGRATION_ENCRYPTION_KEY=$(python3 -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())") \
#     --from-literal=TRUEPPM_DEFAULT_FILE_STORAGE=storages.backends.s3.S3Storage
#
# Then reference it here. Explicit `env:` entries above (e.g. the chart-built
# DATABASE_URL) always take precedence over an envFrom key of the same name.
#   envFrom:
#     - secretRef:
#         name: trueppm-env
envFrom: []

# OpenTelemetry observability (ADR-0223, #708). OPT-IN with NO default endpoint:
# leave observability.otlp.endpoint empty (the default) and the API installs no
# telemetry provider at all — a strict no-op with zero per-request cost. Set the
# endpoint to your OTLP collector (Grafana Tempo/Alloy, Jaeger, an OpenTelemetry
# Collector, or a SaaS APM) to export traces and metrics. These values render into
# the standard OTEL_*/TRUEPPM_OTEL_* env vars for BOTH the API and the Celery
# worker/beat, via the trueppm.observabilityEnv helper. This is the foundation
# only (provider + naming convention) — business-logic spans arrive in a later
# release. Enterprise attaches its own exporters against the same OSS provider.
observability:
  otlp:
    # Collector endpoint. EMPTY = telemetry off (default). Examples:
    #   http://otel-collector:4317   (grpc, default protocol)
    #   http://otel-collector:4318   (http/protobuf — set protocol below to match)
    endpoint: ""
    # "grpc" (default, port 4317) or "http/protobuf" (port 4318).
    protocol: "grpc"
    # Resource service.name reported on every span/metric.
    serviceName: "trueppm-api"
    # Master switch. Set false to disable export while keeping the endpoint set.
    enabled: true
    # Per-signal toggles (only consulted when enabled and an endpoint is set).
    tracesEnabled: true
    metricsEnabled: true
    # Trace sampling (#1903). These render into the standard OTEL_TRACES_SAMPLER /
    # OTEL_TRACES_SAMPLER_ARG env vars honored by the OpenTelemetry SDK, so a busy
    # instance can sample a fraction of traces instead of exporting every request.
    # Leave both empty to keep the SDK default (parentbased_always_on). Common:
    #   tracesSampler: "parentbased_traceidratio"
    #   tracesSamplerArg: "0.1"   # keep 10% of root traces
    tracesSampler: ""
    tracesSamplerArg: ""
    # Optional OTLP headers (e.g. auth) as comma-separated key=value pairs.
    # Prefer headersSecret for tokens so they never render into a plaintext
    # manifest; `headers` is the inline fallback for non-secret values.
    headers: ""
    headersSecret:
      name: ""
      key: "headers"

# Starter Grafana dashboard shipped as a labeled ConfigMap (#1905). OFF by default:
# it is only useful where a Grafana sidecar (kube-prometheus-stack / grafana chart)
# is watching for the `grafana_dashboard` label to auto-import dashboards. Enable it
# on such a cluster to get the "TruePPM — Async & Outbox Health" dashboard (outbox
# depth/age, dead-letter, beat liveness) with zero manual upload.
dashboards:
  enabled: false
  # The label key/value your Grafana sidecar watches. Defaults match the upstream
  # kube-prometheus-stack sidecar convention.
  label: grafana_dashboard
  labelValue: "1"
  annotations: {}

# Starter alerting rules as a Prometheus Operator PrometheusRule (#1905). OFF by
# default: the object is a monitoring.coreos.com/v1 CRD, so it REQUIRES the
# Prometheus Operator (kube-prometheus-stack) installed — on a cluster without
# those CRDs the apply is rejected. Enable it alongside the operator to ship the
# async/outbox alerts (beat staleness 503, outbox depth/age rising, dead-letter).
# Thresholds are tunable below. The beat-staleness and dead-letter rules read
# Blackbox-Exporter probe series of /api/v1/health/beat/ and the dead-letter gauge;
# see docs → Administration → Observability for the probe wiring.
alerts:
  enabled: false
  # Extra labels stamped on the PrometheusRule (e.g. `release: kube-prometheus-stack`
  # so the operator's ruleSelector picks it up).
  labels: {}
  thresholds:
    beatStaleFor: "2m"
    outboxDepth: 500
    outboxDepthFor: "10m"
    outboxOldestAgeSeconds: 900
    outboxOldestAgeFor: "10m"
    deadLetter: 0
    deadLetterFor: "5m"

# OPTIONAL in-cluster OpenTelemetry Collector guidance (#1905). This chart does NOT
# bundle a Collector subchart — running one is a deliberate operational choice with
# its own lifecycle. The recommended path is the upstream
# `open-telemetry/opentelemetry-collector` Helm chart (or the OpenTelemetry
# Operator). Deploy it as a sibling release, then point observability.otlp.endpoint
# (above) at its in-cluster Service, e.g.:
#   observability.otlp.endpoint: "http://otel-collector:4317"
# A minimal Collector pipeline that fans TruePPM's OTLP metrics into Prometheus and
# traces into Tempo/Jaeger is documented at docs → Administration → Observability.
# This block is documentation-only; it renders no Kubernetes objects.
otelCollector:
  # Set true only as a reminder in your own values overlay; the chart reads nothing
  # from here — deploy the Collector as a separate release (see comment above).
  enabled: false

# Scheduled logical backups (issue #320). OFF by default: a backup CronJob is an
# opt-in operational choice — it needs somewhere durable to write (a PVC or an
# S3-compatible bucket), and enabling it silently would create a PVC the operator
# never asked for. Turn it on deliberately once you have chosen a destination.
#
# The CronJob runs scripts/backup.sh inside the API image (which carries
# postgresql-client + the script), dumps the database with pg_dump --format=custom,
# and writes a single timestamped artifact. Restore is a manual, deliberate action
# with scripts/restore.sh — see docs → Administration → Backup & Restore.
#
# This is LOGICAL backup only (pg_dump). Continuous archiving / point-in-time
# recovery (WAL shipping), cross-region replication, and managed backup automation
# are Enterprise HA features (trueppm-enterprise #20).
backup:
  enabled: false
  # Cron schedule (cluster timezone). Default: 02:00 every day.
  schedule: "0 2 * * *"
  # Image used by the backup CronJob. Defaults to the upstream PostgreSQL image,
  # which carries pg_dump / pg_isready / psql at the matching major version. The
  # lean application image ships only libpq5 (no client binaries), so the job runs
  # from a client-capable image and connects over the network via DATABASE_URL —
  # it needs no application code. The inline backup command mirrors
  # scripts/backup.sh (same pg_dump --format=custom, same timestamped artifact);
  # restores are performed manually with scripts/restore.sh.
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  # How many previously-failed/succeeded jobs Kubernetes retains for inspection.
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  # Where the artifact is written inside the job container. With a PVC (below)
  # this path is the mounted volume; the retention prune runs against it.
  outputDir: /backups
  # Include the local media/attachment directory in the artifact. Only relevant
  # when attachments are on a local PVC (TRUEPPM_ALLOW_LOCAL_ATTACHMENT_STORAGE);
  # with object storage (S3/MinIO) the bucket is backed up by the object store and
  # this should stay empty. Set to the in-container media path to include it.
  mediaDir: ""
  # Retention. keepDaily is enforced in-job by scripts/backup.sh after each run
  # (it prunes the output directory to the N newest artifacts). keepWeekly is
  # advisory metadata for an external lifecycle policy (e.g. S3 bucket lifecycle
  # rules or a sweep job) — the in-cluster CronJob does not itself promote dailies
  # to weeklies. Document your off-cluster retention alongside these values.
  keepDaily: 7
  keepWeekly: 4
  # Destination. Two mutually-supported shapes:
  #   persistence.enabled: true  → mount a chart-managed PVC at outputDir
  #   s3: { ... }                → pass S3-compatible env vars to the job so a
  #                                custom outputDir/upload step can target a bucket
  # Leave both off only if you are supplying your own volume via extraVolumes.
  persistence:
    enabled: false
    # Reuse an existing claim instead of creating one.
    existingClaim: ""
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 10Gi
  # S3-compatible off-cluster destination. When set, these are injected as env
  # vars into the job so backup.sh (or a wrapper) can upload the artifact. The
  # secret key MUST come from a Kubernetes Secret, never a plaintext value here.
  s3:
    enabled: false
    bucket: ""
    endpoint: ""
    region: ""
    # Reference the credentials Secret (keys: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY).
    existingSecret: ""
  # Extra volumes / mounts for the backup job — the supported way to give the job
  # read access to your media PVC when mediaDir is set (mount the same claim the
  # API uses at the mediaDir path, read-only). Ignored unless mediaDir is set.
  extraVolumes: []
  extraVolumeMounts: []
  # Resource requests/limits for the backup job container.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

# Admin bootstrap settings.
# The bootstrap init container runs `create_admin` once on first deploy and
# writes the one-time password to passwordFile (emptyDir, 0o600).
# Retrieve it with: kubectl exec <api-pod> -- cat /run/trueppm/admin_password
admin:
  # Path inside the container where the one-time password is written.
  # Must match the emptyDir mountPath in the deployment template.
  passwordFile: /run/trueppm/admin_password
  # Admin email address (defaults to admin@trueppm.com if not set).
  email: ""
