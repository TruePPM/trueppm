[package]
name = "trueppm-wasm-scheduler"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
description = "CPM scheduling engine compiled to WebAssembly for TruePPM"
repository = "https://gitlab.com/trueppm/trueppm"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
chrono = { version = "0.4", default-features = false, features = ["serde"] }
petgraph = "0.7"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
wasm-bindgen = "0.2"

[dev-dependencies]
wasm-bindgen-test = "0.3"

[profile.release]
opt-level = "s"
lto = true
strip = "debuginfo"
