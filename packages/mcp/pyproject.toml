[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "trueppm-mcp"
version = "0.4.0a0"
description = "Read-only Model Context Protocol (MCP) server for self-hosted TruePPM — query the live schedule, board, risks, and My Work from any MCP client"
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE"]
requires-python = ">=3.11"
authors = [
    { name = "Kelly Hair" },
]
keywords = [
    "mcp",
    "model-context-protocol",
    "fastmcp",
    "project-management",
    "trueppm",
    "ai",
    "llm-tools",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: Apache Software License",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Office/Business :: Scheduling",
    "Topic :: Software Development :: Libraries",
    "Typing :: Typed",
]
# The MCP server is a pure HTTP client of the TruePPM REST API (ADR-0186):
# `mcp` provides the FastMCP server + transports, `httpx` is the async HTTP
# client. No Django, no ORM, no database driver — and never the enterprise repo.
# Bounds cap one major above the resolved version so an unpinned install can't
# silently pull a breaking release.
dependencies = [
    "mcp[cli]>=1.2,<2",
    "httpx>=0.27,<1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0,<10.0",
    "pytest-asyncio>=0.23,<2.0",
    "pytest-cov>=4.0,<8.0",
    "mypy>=1.0,<2.0",
    "ruff>=0.8,<1.0",
]

[project.scripts]
trueppm-mcp = "trueppm_mcp.cli:main"

[project.urls]
Homepage = "https://trueppm.com"
Documentation = "https://docs.trueppm.com/administration/mcp-server"
Repository = "https://gitlab.com/trueppm/trueppm"
Issues = "https://gitlab.com/trueppm/trueppm/-/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/trueppm_mcp"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--strict-markers --tb=short -q"
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.11"
strict = true
packages = ["trueppm_mcp"]
mypy_path = "src"

# The mcp SDK ships py.typed but pulls optional transports (sse/streamable-http)
# whose third-party deps are not always fully typed under --strict. Scope the
# missing-import allowance to the SDK namespace so our own code stays strict.
[[tool.mypy.overrides]]
module = ["mcp.*"]
ignore_missing_imports = true

[tool.ruff]
src = ["src", "tests"]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF", "S"]

[tool.ruff.lint.per-file-ignores]
# Tests legitimately use assert and embed sample (non-secret) token strings.
"tests/**" = ["S101", "S105", "S106"]
