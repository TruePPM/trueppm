# OSV-Scanner suppressions for the docs site's locked dependency set
# (packages/website/package-lock.json), auto-discovered by the security:osv
# CI job.
#
# Each entry carries a `reason` and a self-expiring `ignoreUntil`, so a
# suppression stays documented and rots on its own instead of silently masking
# a future advisory. Per-directory auto-discovery scopes this file to the
# website's lockfile only — it never bleeds onto packages/web (the other npm
# lockfile OSV scans).
#
# These three advisories are all against astro 6.4.6 and are all sub-HIGH
# (CVSS 2.1 / 5.1 / 5.3). Clearing them requires astro 7.x, which
# @astrojs/starlight@0.40 does not support (its peer is astro@^6.4.5) — so the
# fix is a coupled major-framework upgrade (astro 6→7 + @astrojs/starlight
# 0.40→0.41 + verifying starlight-versions / @astrojs/check / rehype-mermaid /
# @astrojs/sitemap and a full docs-build pass), tracked in #2258 — not a
# security-patch bump. Per the security:osv policy (sub-HIGH / not cleanly
# fixable in isolation → surgical, expiring suppression), they are suppressed
# here until that upgrade lands. Filed with the HIGH js-yaml/brace-expansion
# bumps in #2259; remove this file once #2258 upgrades astro to 7.x.

[[IgnoredVulns]]
id = "GHSA-4g3v-8h47-v7g6"
ignoreUntil = 2026-10-31
reason = "astro DoS/parsing advisory (CVSS 5.3), fixed in astro 7.1.0. astro 7.x requires @astrojs/starlight >= 0.41 (peer astro@^7.0.2), a coupled major-framework upgrade tracked in #2258. Docs-only site; re-evaluate when #2258 lands or the expiry passes."

