# OSV-Scanner config — scoped to the docs site (packages/website).
#
# Every advisory below lives in the Astro/Starlight dependency tree and is
# resolved by the astro 5 -> 6 (@astrojs/starlight) bump tracked in #1152. The
# docs site is a static-site generator: these are build/SSG-time dependencies,
# and the published output is static HTML/CSS/JS — none of this ships to a
# running server.
#
# The ignores are SCOPED to packages/website (a config file adjacent to this
# lockfile applies only to this lockfile). That is deliberate: the same esbuild
# advisory (GHSA-gv7w-rqvm-qjhr) was just fixed in packages/web via the Vite 8
# upgrade, and a regression there must still fail the gate — a global ignore
# would mask it.
#
# Each entry carries an `ignoreUntil` expiry so the suppression cannot rot: once
# the date passes, OSV-Scanner surfaces the advisory again. Remove these once
# #1152 lands the astro bump.

