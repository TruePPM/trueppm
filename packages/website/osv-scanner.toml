reason = "astro advisory (CVSS 2.1, low), fixed in astro 7.0.4. Blocked on the same astro 6→7 + @astrojs/starlight 0.40→0.41 upgrade (#2258). Docs-only site; re-evaluate when #2258 lands or the expiry passes."

