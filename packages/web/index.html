<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/app-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="TruePPM — Project, Program, and Portfolio Management" />
    <meta name="theme-color" content="#1B2A4A" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Space Grotesk = display/wordmark (brand v1.0); Inter = UI/body; JetBrains Mono = data. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>TruePPM</title>
    <!-- Blocking theme init — apply .dark before first paint to prevent flash.
         External file (not inline) so a strict script-src 'self' CSP permits it
         without an inline hash or 'unsafe-inline' (#897). Served from /public,
         so it loads same-origin. -->
    <script src="/theme-init.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
