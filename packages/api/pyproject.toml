[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "trueppm-api"
version = "0.1.0-alpha.1"
description = "TruePPM Django REST API — projects, tasks, scheduling, real-time collaboration"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.11"
authors = [
    { name = "Kelly Hair" },
]
dependencies = [
    "trueppm-scheduler>=0.1.0a0",
    "django>=5.1",
    "djangorestframework>=3.15",
    "djangorestframework-simplejwt>=5.3",
    "django-allauth>=0.63",
    "channels>=4.0",
    "channels-redis>=4.0",
    "celery>=5.4",
    "redis>=5.0",
    "psycopg[binary]>=3.1",
    "django-environ>=0.11",
    "django-simple-history>=3.7",
    "drf-spectacular>=0.27",
    "uvicorn[standard]>=0.29",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-django>=4.8",
    "pytest-asyncio>=0.23",
    "pytest-cov>=4.0",
    "diff-cover>=9.0",
    "mypy>=1.0",
    "django-stubs[compatible-mypy]>=5.0",
    "djangorestframework-stubs[compatible-mypy]>=3.15",
    "ruff>=0.8",
    "testcontainers[postgres]>=4.7",
]

[tool.hatch.build.targets.wheel]
packages = ["src/trueppm_api"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--strict-markers --tb=short -q"
asyncio_mode = "auto"
DJANGO_SETTINGS_MODULE = "trueppm_api.settings.dev"

[tool.mypy]
python_version = "3.11"
strict = true
plugins = ["mypy_django_plugin.main", "mypy_drf_plugin.main"]
mypy_path = "src"

# Third-party packages that ship without type stubs and have no community stubs.
# celery, django-environ, and channels are all well-maintained but not yet
# fully typed; ignoring missing imports keeps strict mode usable without
# forking stubs for each.
[[tool.mypy.overrides]]
module = [
    "celery.*",
    "environ",
    "channels.*",
    "simple_history.*",
    "trueppm_api.apps.scheduling.*",
    "trueppm_api.apps.sync.*",
]
ignore_missing_imports = true

[mypy.plugins.django-stubs]
django_settings_module = "trueppm_api.settings.dev"

[tool.django-stubs]
django_settings_module = "trueppm_api.settings.dev"

[tool.ruff]
src = ["src", "tests"]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF", "DJ"]
# RUF012 false-positives on Django migration classes and model Meta; RUF002/003
# flags en-dashes in docstrings — acceptable in project names and descriptions.
ignore = ["RUF002", "RUF003"]

[tool.ruff.lint.per-file-ignores]
# RUF012: Django/DRF Meta class attributes and ViewSet class attributes are
# mutable by convention — suppressing globally for Django source files.
"*/migrations/*.py" = ["RUF012"]
"*/models.py" = ["RUF012"]
"*/serializers.py" = ["RUF012"]
"*/views.py" = ["RUF012"]
