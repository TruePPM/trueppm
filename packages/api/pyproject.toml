[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "trueppm-api"
version = "0.3.0-alpha.2"
description = "TruePPM Django REST API — projects, tasks, scheduling, real-time collaboration"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.11"
authors = [
    { name = "Kelly Hair" },
]
# Runtime deps carry an explicit upper bound on the next major. A bare `>=`
# floor lets `pip install` resolve to the latest major at install time, with no
# protection against a breaking release — that is how the local venv silently
# drifted to Django 6.0 (which needs Python 3.12+, so CI on 3.11 was unaffected
# and the skew went unnoticed). Bounds are capped one major above the version CI
# currently resolves; patch/minor security fixes within the current major are
# still allowed.
dependencies = [
    "trueppm-scheduler>=0.1.0a0,<1",
    "django>=5.2.15,<6.0",
    "djangorestframework>=3.15,<4.0",
    "djangorestframework-simplejwt>=5.3,<6.0",
    "django-allauth>=65.18.0,<66.0",
    "defusedxml>=0.7,<0.8",
    "channels>=4.0,<5.0",
    "channels-redis>=4.0,<5.0",
    # Transitive via channels-redis (channel-layer serializer). Floored to the
    # fix release for GHSA-6v7p-g79w-8964: a reused Unpacker after an error can
    # SEGV — a DoS vector when unpacking untrusted input. Pin the floor here so
    # resolution can't drift back below 1.2.1.
    "msgpack>=1.2.1,<2.0",
    # 5.4/5.5 are no longer security-maintained upstream; track the supported
    # line (5.6+ requires Python >=3.9, satisfied by our >=3.11 floor).
    "celery>=5.6,<6.0",
    # Floor tracks the installed major (7.x); 5.x/6.x span unsupported majors.
    "redis>=7.0,<8.0",
    # PostgreSQL driver. LGPL-3.0-only: a dynamically-imported runtime dep in an
    # application (not a library) — Apache 2.0 compatible per CLAUDE.md §Licenses
    # and the LICENSE/NOTICES files. The *implementation* (precompiled wheel vs.
    # C extension linked to the system libpq) is chosen per environment via the
    # `c` / `binary` extras below, NOT pinned here — the base requirement is the
    # pure-Python core so a bare install never forces a compiler. Production
    # installs `[c]` (links the system libpq so OS security upgrades reach the
    # driver); local dev installs `[binary]` (precompiled wheel, no compiler or
    # system libpq needed). The LGPL §4 relink obligation is over psycopg itself
    # and is met by either extra — both are replaceable wheels. See NOTICES.
    "psycopg>=3.1,<4.0",
    "django-environ>=0.11,<1.0",
    "django-simple-history>=3.7,<4.0",
    "drf-spectacular>=0.27,<1.0",
    "jsonschema>=4.21,<5.0",
    "uvicorn[standard]>=0.29,<1.0",
    "cryptography>=48.0.1,<49",
]

[project.optional-dependencies]
# Production psycopg implementation: compile the C speedups against the *system*
# libpq (the API Docker image installs libpq-dev at build, libpq5 at runtime) so
# OS-level libpq/OpenSSL security upgrades flow through to the driver — the
# psycopg authors' recommended production posture. This is a security choice, not
# an LGPL lever: the §4 relink obligation is over psycopg (a replaceable wheel
# under either extra), while libpq is permissively licensed. The Dockerfile
# installs the api package as `[c]`.
c = ["psycopg[c]>=3.1,<4.0"]
# Local-dev / quick-start psycopg implementation: a precompiled wheel that
# bundles its own libpq — no compiler or system libpq needed. NOT for production:
# the bundled libpq does not receive OS security updates. The `dev` extra pulls
# this so a plain `pip install -e .[dev]` works on any laptop.
binary = ["psycopg[binary]>=3.1,<4.0"]
# Dev/toolchain deps are capped on the next major too — an unpinned `ruff` or
# `mypy` that drifts a major between a local run and CI produces format/type
# failures that only surface in the pipeline. (Exact-version reproducibility is
# a lockfile concern, tracked separately; these caps are the cheap floor.)
dev = [
    "psycopg[binary]>=3.1,<4.0",
    "pytest>=8.0,<10.0",
    "pytest-django>=4.8,<5.0",
    "pytest-asyncio>=0.23,<2.0",
    "pytest-cov>=4.0,<8.0",
    "pytest-xdist>=3.6,<4.0",
    "pytest-split>=0.9,<1.0",
    "diff-cover>=9.0,<10.0",
    "mypy>=1.0,<2.0",
    "django-stubs[compatible-mypy]>=5.0,<7.0",
    "djangorestframework-stubs[compatible-mypy]>=3.15,<4.0",
    "ruff>=0.8,<1.0",
    "testcontainers[postgres]>=4.7,<5.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/trueppm_api"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--strict-markers --tb=short -q"
asyncio_mode = "auto"
DJANGO_SETTINGS_MODULE = "trueppm_api.settings.dev"

[tool.mypy]
python_version = "3.11"
strict = true
plugins = ["mypy_django_plugin.main", "mypy_drf_plugin.main"]
mypy_path = "src"

# Third-party packages that ship without type stubs and have no community stubs.
# celery, django-environ, and channels are all well-maintained but not yet
# fully typed; ignoring missing imports keeps strict mode usable without
# forking stubs for each.
[[tool.mypy.overrides]]
module = [
    "celery.*",
    "defusedxml.*",
    "environ",
    "jsonschema.*",
    "channels.*",
    "simple_history.*",
    "trueppm_api.apps.scheduling.*",
    "trueppm_api.apps.sync.*",
]
ignore_missing_imports = true

[mypy.plugins.django-stubs]
django_settings_module = "trueppm_api.settings.dev"

[tool.django-stubs]
django_settings_module = "trueppm_api.settings.dev"

[tool.ruff]
src = ["src", "tests"]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF", "DJ"]
# RUF012 false-positives on Django migration classes and model Meta; RUF002/003
# flags en-dashes in docstrings — acceptable in project names and descriptions.
ignore = ["RUF002", "RUF003"]

[tool.ruff.lint.per-file-ignores]
# RUF012: Django/DRF Meta class attributes and ViewSet class attributes are
# mutable by convention — suppressing globally for Django source files.
# E501: squashed/regenerated migrations serialize long `replaces` lists and
# help_text/choices into single string literals that `ruff format` cannot wrap;
# hand-wrapping generated code defeats clean regeneration.
"*/migrations/*.py" = ["RUF012", "E501"]
"*/models.py" = ["RUF012"]
"*/serializers.py" = ["RUF012"]
"*/views.py" = ["RUF012"]

[tool.coverage.run]
# CI runs api:test as 4 parallel shards (each writes .coverage.<n>) and stitches
# them together in a separate api:coverage job. Those jobs can land on runners
# with different builds_dir (e.g. /tmp/builds vs /mnt/nvme1/gitlab-runner/builds),
# so the absolute source paths baked into the shard data files don't resolve on
# the combine runner — `coverage xml` then emits "No source for code" and produces
# no coverage.xml, failing the job (and turning main red, issue 1348).
# relative_files records paths relative to this config's directory, so combine +
# xml are builds_dir-independent. Verified locally that it leaves diff-cover path
# matching (api:diff-coverage) unchanged.
relative_files = true

[tool.coverage.paths]
# Belt-and-suspenders for the same cross-runner combine: any data path still
# recorded as absolute (e.g. measured outside the package tree) is remapped onto
# the canonical src/ location during `coverage combine`, collapsing the
# /tmp/builds and /mnt/... prefixes to a single entry.
source = ["src/", "*/packages/api/src/"]
