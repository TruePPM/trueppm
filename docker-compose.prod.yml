# Production stack — pull images from the registry, nginx on 80/443.
# First-time setup: ./init-prod.sh
# Subsequent starts: docker compose -f docker-compose.prod.yml up -d
#
# Required .env variables:
#   APP_VERSION=v1.0.0            (image tag; defaults to "latest")
#   DOMAIN=trueppm.example.com
#   SECRET_KEY=<random string, at least 32 chars — the api container will
#                refuse to start otherwise (#566). Generate with:
#                python3 -c "import secrets; print(secrets.token_urlsafe(50))">
#   DB_PASSWORD=<strong password>
#   REDIS_PASSWORD=<strong password>
#   TLS_MODE=letsencrypt           (letsencrypt | selfsigned | none)
#   CERTBOT_EMAIL=ops@example.com  (required only when TLS_MODE=letsencrypt)
#   ALLOWED_HOSTS=trueppm.example.com
#
# Optional .env variables:
#   DJANGO_SUPERUSER_EMAIL=admin@example.com  (default: admin@trueppm.com)
#   TRUEPPM_ADMIN_PASSWORD_FILE=/run/trueppm/admin_password  (default)
#
# Retrieve the initial admin password after first deploy:
#   docker compose -f docker-compose.prod.yml exec api cat /run/trueppm/admin_password

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: trueppm
      POSTGRES_USER: trueppm
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trueppm"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Valkey is the BSD-licensed Linux Foundation fork of Redis (March 2024
  # license change). Wire-compatible with Redis 7 — REDIS_URL stays as-is.
  # The .env variable name (REDIS_PASSWORD) is preserved to avoid breaking
  # existing self-hosters' .env files (deferred to 1.0).
  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /data
    command: valkey-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli -a $$REDIS_PASSWORD --no-auth-warning ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Runs migrations, collectstatic, and admin bootstrap once before the API
  # starts. Exits 0 on success; api waits for this to complete.
  api-init:
    image: ghcr.io/trueppm/api:${APP_VERSION:-latest}
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             python manage.py create_admin"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://trueppm:${DB_PASSWORD:?DB_PASSWORD must be set in .env}@db:5432/trueppm
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}@valkey:6379
      DJANGO_SETTINGS_MODULE: trueppm_api.settings.prod
      TRUEPPM_ADMIN_PASSWORD_FILE: /run/trueppm/admin_password
      STATIC_ROOT: /app/staticfiles
    volumes:
      - admin_password:/run/trueppm
      - static_files:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy

  api:
    image: ghcr.io/trueppm/api:${APP_VERSION:-latest}
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://trueppm:${DB_PASSWORD:?DB_PASSWORD must be set in .env}@db:5432/trueppm
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}@valkey:6379
      DJANGO_SETTINGS_MODULE: trueppm_api.settings.prod
      TRUEPPM_ADMIN_PASSWORD_FILE: /run/trueppm/admin_password
    volumes:
      - admin_password:/run/trueppm
    depends_on:
      api-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/')\""]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

  celery:
    image: ghcr.io/trueppm/api:${APP_VERSION:-latest}
    command: ["celery", "-A", "trueppm_api.celery", "worker", "--loglevel=info"]
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://trueppm:${DB_PASSWORD:?DB_PASSWORD must be set in .env}@db:5432/trueppm
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}@valkey:6379
      DJANGO_SETTINGS_MODULE: trueppm_api.settings.prod
    depends_on:
      api-init:
        condition: service_completed_successfully

  # Copies the pre-built frontend assets into the shared volume so nginx
  # can serve them. Exits immediately after the copy.
  web-build:
    image: ghcr.io/trueppm/web:${APP_VERSION:-latest}
    # The web image now runs as a non-root user (uid 101, nginx-unprivileged).
    # This one-shot init only copies the static bundle into the shared volume,
    # which is root-owned on first mount, so run the copy as root. The actual
    # serving is done by the hardened top-level nginx (read_only, no-new-privs).
    user: "0"
    entrypoint: ["/bin/sh", "-c"]
    command: ["cp -r /usr/share/nginx/html/. /dist/"]
    volumes:
      - frontend_dist:/dist

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN must be set in .env}
    # init-prod.sh copies the correct template to nginx/active.conf.template.
    # envsubst renders it at container startup.
    command: >
      /bin/sh -c
      "envsubst '$${DOMAIN}'
       < /etc/nginx/templates/default.conf.template
       > /etc/nginx/conf.d/default.conf
       && nginx -g 'daemon off;'"
    volumes:
      - ./nginx/active.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - static_files:/usr/share/nginx/html/static:ro
    depends_on:
      web-build:
        condition: service_completed_successfully
      api:
        condition: service_healthy

  # Renews the Let's Encrypt certificate every 12 hours.
  # Only started when TLS_MODE=letsencrypt (compose --profile letsencrypt).
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    profiles: ["letsencrypt"]
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  admin_password:
  frontend_dist:
  static_files:
