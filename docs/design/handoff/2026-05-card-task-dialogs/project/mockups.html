<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>TruePPM — High-res mockups (light + dark)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  /* ─────────────────────────────────────────────────────────────────────
     Design tokens — mirror trueppm packages/web/src/styles/globals.css
     and tailwind.config.ts. Every value is a CSS variable so a single
     class swap (.tppm-light / .tppm-dark) repaints the whole frame.
     ───────────────────────────────────────────────────────────────────── */

  :root {
    /* Brand (theme-invariant) */
    --brand-primary:       #1C6B3A;
    --brand-primary-dark:  #145229;
    --brand-primary-light: #D4EDDA;
    --brand-accent:        #E8A020;
    --brand-accent-dark:   #C17A10;
    --brand-accent-light:  #FFF3CD;

    /* Semantic — light surface (from tailwind.config.ts) */
    --semantic-critical: #B91C1C;
    --semantic-warning:  #D97706;
    --semantic-on-track: #166534;
    --semantic-at-risk:  #92400E;

    /* Gantt dark surface (always dark — Gantt panel is dark in light mode too) */
    --gantt-surface:           #0F1117;
    --gantt-text-primary:      #E8E8E8;
    --gantt-text-secondary:    #94A3B8;
    --gantt-semantic-critical: #F87171;
    --gantt-semantic-at-risk:  #FB923C;
    --gantt-semantic-on-track: #4ADE80;

    /* Risk zone tints */
    --risk-zone-critical: rgba(185, 28, 28, 0.08);
    --risk-zone-high:     rgba(232, 160, 32, 0.12);
    --risk-zone-medium:   rgba(232, 160, 32, 0.06);
    --risk-zone-low:      #F5F5F0;
    --risk-zone-minimal:  #FFFFFF;

    /* Spacing scale (4-pt grid) — mirror tailwind */
    --sp-1: 4px;  --sp-2: 8px;  --sp-3: 12px; --sp-4: 16px;
    --sp-5: 20px; --sp-6: 24px; --sp-8: 32px; --sp-10: 40px;
    --sp-12: 48px;

    /* Type scale */
    --fs-xs: 12px; --fs-sm: 14px; --fs-base: 16px; --fs-lg: 18px;
    --fs-xl: 20px; --fs-2xl: 24px; --fs-3xl: 30px; --fs-4xl: 36px;
    --lh-xs: 16px; --lh-sm: 20px; --lh-base: 24px; --lh-lg: 28px;
  }

  /* Light scope — mirrors :root in globals.css */
  .tppm-light {
    --surface:          rgb(255 255 255);
    --surface-raised:   rgb(245 245 240);
    --surface-sunken:   rgb(235 235 235);
    --border:           rgb(212 210 206);
    --border-soft:      rgba(212 210 206 / .55);
    --text-primary:     rgb(26 25 23);
    --text-secondary:   rgb(107 105 101);
    --text-disabled:    rgb(160 157 153);
    --text-inverse:     rgb(255 255 255);

    /* Soft shadow tuned for paper-white */
    --shadow-card: 0 1px 0 rgba(0,0,0,.02), 0 1px 2px rgba(0,0,0,.04);
    --shadow-pop:  0 1px 2px rgba(0,0,0,.06), 0 8px 24px rgba(0,0,0,.10);

    /* Status semantic — flexed for fill bg/borders */
    --sem-critical-bg: rgba(185, 28, 28, .08);
    --sem-at-risk-bg:  rgba(146, 64, 14, .10);
    --sem-on-track-bg: rgba(22, 101, 52, .10);
    --sem-warning-bg:  rgba(217, 119, 6, .10);

    /* Chrome (sidebar, Gantt panels, login marketing) — light treatment.
       Warm off-white with a hairline contrast vs. content surface so the
       sidebar reads as chrome, not card. */
    --chrome-surface:        rgb(248 247 243);
    --chrome-surface-raised: rgb(238 236 230);
    --chrome-border:         rgba(0 0 0 / .08);
    --chrome-text-primary:   rgb(26 25 23);
    --chrome-text-secondary: rgb(107 105 101);
    --chrome-row-hover:      rgba(0 0 0 / .04);
    --chrome-row-active:     rgba(28 107 58 / .10);
    --chrome-grid:           rgba(0 0 0 / .06);

    /* Gantt bar palette on light chrome — hits WCAG AA on white
       (semantic-* tokens were designed for this). */
    --gantt-bar-critical: var(--semantic-critical);
    --gantt-bar-at-risk:  var(--semantic-at-risk);
    --gantt-bar-on-track: var(--semantic-on-track);
    --gantt-bar-label:    #1A1917;
    --gantt-summary:      rgba(0 0 0 / .25);

    color-scheme: light;
  }

  /* Dark scope — mirrors .dark in globals.css */
  .tppm-dark {
    --surface:          rgb(18 20 30);
    --surface-raised:   rgb(26 29 42);
    --surface-sunken:   rgb(12 14 22);
    --border:           rgb(50 55 80);
    --border-soft:      rgba(50 55 80 / .65);
    --text-primary:     rgb(232 232 232);
    --text-secondary:   rgb(148 163 184);
    --text-disabled:    rgb(100 116 139);
    --text-inverse:     rgb(26 25 23);

    --shadow-card: 0 1px 0 rgba(0,0,0,.25), 0 1px 2px rgba(0,0,0,.35);
    --shadow-pop:  0 1px 2px rgba(0,0,0,.4),  0 12px 32px rgba(0,0,0,.55);

    /* On dark, semantic backgrounds need a touch more presence */
    --sem-critical-bg: rgba(248, 113, 113, .12);
    --sem-at-risk-bg:  rgba(251, 146, 60, .12);
    --sem-on-track-bg: rgba(74, 222, 128, .12);
    --sem-warning-bg:  rgba(251, 146, 60, .12);

    /* Chrome — dark treatment. Slightly deeper than surface so sidebar
       still reads as chrome. */
    --chrome-surface:        rgb(15 17 23);          /* matches the legacy gantt-surface */
    --chrome-surface-raised: rgb(22 25 36);
    --chrome-border:         rgba(255 255 255 / .08);
    --chrome-text-primary:   rgb(232 232 232);
    --chrome-text-secondary: rgb(148 163 184);
    --chrome-row-hover:      rgba(255 255 255 / .05);
    --chrome-row-active:     rgba(255 255 255 / .08);
    --chrome-grid:           rgba(255 255 255 / .05);

    /* Gantt bar palette on dark chrome — use the dark-surface gantt-semantic-* */
    --gantt-bar-critical: var(--gantt-semantic-critical);
    --gantt-bar-at-risk:  var(--gantt-semantic-at-risk);
    --gantt-bar-on-track: var(--gantt-semantic-on-track);
    --gantt-bar-label:    #1A1917;
    --gantt-summary:      rgba(255 255 255 / .18);

    color-scheme: dark;
  }

  /* Inside the dark scope, swap semantic primaries to dark-surface variants
     (mirrors tailwind gantt-semantic-* and matches WCAG on dark). */
  .tppm-dark {
    --semantic-critical: #F87171;
    --semantic-warning:  #FB923C;
    --semantic-on-track: #4ADE80;
    --semantic-at-risk:  #FB923C;
  }

  /* ─────────────────────────────────────────────────────────────────────
     Page reset (scoped to artboards, not the canvas chrome)
     ───────────────────────────────────────────────────────────────────── */

  .tppm-frame, .tppm-frame * {
    box-sizing: border-box;
  }
  .tppm-frame {
    font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
    font-feature-settings: "cv02", "cv03", "cv04", "cv11";
    -webkit-font-smoothing: antialiased;
    color: var(--text-primary);
    background: var(--surface);
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-size: var(--fs-sm);
    line-height: var(--lh-sm);
    display: flex;
    flex-direction: column;
  }
  .tppm-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: "tnum"; }

  /* Canonical button-look reset (used inside our own custom controls) */
  .tppm-frame button {
    font: inherit; color: inherit; background: transparent; border: 0; padding: 0; cursor: pointer;
  }

  /* Background of the artboard (inside the design canvas) — keep transparent
     so each frame's own surface paints. */
  .tppm-frame { border: 1px solid var(--border); border-radius: 8px; }

  /* Scrollbar — both modes */
  .tppm-frame ::-webkit-scrollbar { width:8px; height:8px; }
  .tppm-frame ::-webkit-scrollbar-thumb { background: var(--border); border-radius:4px; }
  .tppm-frame ::-webkit-scrollbar-track { background: transparent; }

  /* Section header chrome on the design canvas */
  body { background: #fafaf7; margin: 0; }
</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react" src="mockups-shell.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="mockups-pages.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="mockups-sprints.jsx"></script>
  <script type="text/babel" src="design-canvas.jsx" data-presets="env,react"></script>
  <script type="text/babel" data-presets="env,react" src="mockups-app.jsx"></script>
</body>
</html>
