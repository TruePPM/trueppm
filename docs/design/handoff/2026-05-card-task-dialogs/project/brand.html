<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<style>
  body { margin:0; background:#f0eee9; font-family: 'Inter', system-ui, sans-serif; }
  * { box-sizing: border-box; }
  .lab, .lab * { font-family: 'Inter', system-ui, sans-serif; }
</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx" data-presets="env,react"></script>
  <script type="text/babel" data-presets="env,react" src="brand-logos.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="brand-directions.jsx"></script>
  <script type="text/babel" data-presets="env,react">
    function App() {
      return (
        <DesignCanvas>
          <DCSection id="logos" title="Logo marks" subtitle="10 directions for the TruePPM identity. Each shown on light + dark, with reasoning.">
            {window.LOGO_ARTBOARDS()}
          </DCSection>
          <DCSection id="directions" title="Visual directions" subtitle="Three coherent systems: typeface, palette, surface treatment, sample UI panel.">
            {window.DIRECTION_ARTBOARDS()}
          </DCSection>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
