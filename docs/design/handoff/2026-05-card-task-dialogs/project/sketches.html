    // SVG hand-drawn rectangle helper (slight wobble)
    function SketchRect({ x, y, w, h, stroke = "#1A1917", fill = "transparent", sw = 1.5, dash, rx = 4 }) {
      // jitter for hand-drawn feel
      const j = (n) => n + (Math.sin(x*7.13 + y*1.7 + n*0.31) * 0.6);
      const x1 = j(x), y1 = j(y), x2 = j(x + w), y2 = j(y + h);
      const d = `M ${x1+rx} ${y1}
                 L ${x2-rx} ${y1}
                 Q ${x2} ${y1}, ${x2} ${y1+rx}
                 L ${x2} ${y2-rx}
                 Q ${x2} ${y2}, ${x2-rx} ${y2}
                 L ${x1+rx} ${y2}
                 Q ${x1} ${y2}, ${x1} ${y2-rx}
                 L ${x1} ${y1+rx}
                 Q ${x1} ${y1}, ${x1+rx} ${y1} Z`;
      return <path d={d} fill={fill} stroke={stroke} strokeWidth={sw} strokeDasharray={dash} strokeLinejoin="round" strokeLinecap="round" />;
    }

    // Sketchy line of "text" — wavy stroke that suggests writing
    function TextLine({ x, y, w, sw = 1.4, color = "#4a4844", seed = 0 }) {
      const segs = Math.max(2, Math.floor(w / 14));
      let d = `M ${x} ${y}`;
      for (let i = 0; i < segs; i++) {
        const sx = x + (i + 1) * (w / segs);
        const cy = y + Math.sin((i + seed) * 1.7) * 0.8;
        d += ` Q ${sx - (w/segs)/2} ${cy + 1.6}, ${sx} ${y + Math.sin((i+seed+1)*1.7)*0.6}`;
      }
      return <path d={d} stroke={color} strokeWidth={sw} fill="none" strokeLinecap="round" />;
    }

    // Stack of "text lines" to suggest a paragraph
    function Para({ x, y, w, lines = 3, gap = 10, lastShort = true, color }) {
      return Array.from({length: lines}).map((_, i) => (
        <TextLine
          key={i}
          x={x}
          y={y + i * gap}
          w={lastShort && i === lines - 1 ? w * 0.6 : w}
          seed={i * 1.3}
          color={color}
        />
      ));
    }

                      <div className="mono" style={{fontSize:9, color:"var(--ink-faint)"}}>Apollo Launch · Week view</div>
                      {[
                        {n:"Engineering", sum:true, l:0, w:"80%"},
                        {n:"Detail design", l:1, w:"30%", c:"green", pct:90},
                        {n:"Engine integration", l:1, w:"55%", c:"red", pct:55},
                        {n:"Telemetry firmware", l:1, w:"50%", c:"amber", pct:30},
                        {n:"Procurement", sum:true, l:0, w:"75%"},
                        {n:"Avionics PCBA", l:1, w:"60%", c:"red", pct:80},
                        {n:"Test & Launch", sum:true, l:0, w:"50%"},
                        {n:"Pad walk-down", l:1, w:"30%", c:"red", pct:0},
                      ].map((t,i)=>(
                        <div key={i} style={{marginTop:8}}>
                          <div style={{
                            fontFamily:"Kalam", fontSize:10, paddingLeft: t.l*10,
                            fontWeight: t.sum ? 700 : 400,
                            color: t.c === "red" ? "var(--red)" : "var(--ink)",
                          }}>{t.sum ? "▾ " : ""}{t.n}</div>
                          <div style={{height:8, background:"var(--rule-soft)", borderRadius:2, marginTop:2, position:"relative", overflow:"hidden"}}>
                            <div style={{
                              position:"absolute", left:`${10 + i*5}%`, width:t.w, top:0, bottom:0,
                              background: t.sum ? "var(--ink)" : t.c === "red" ? "var(--red)" : t.c === "amber" ? "var(--amber)" : "var(--green)",
                              opacity: t.sum ? 1 : 0.7,
                            }}/>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}

                  {scr.body === "nav" && (
                    <div style={{position:"absolute", left:0, right:0, top:68, bottom:56, padding:12, display:"flex", flexDirection:"column", gap:8}}>
                      <div className="label" style={{fontSize:18}}>Board</div>
                      {["To Do","In Progress","Done"].map((c,i)=>(
                        <div key={i} className="box box-thin" style={{padding:8}}>
                          <div className="mono" style={{fontSize:10, color:"var(--ink-faint)"}}>{c.toUpperCase()}</div>
                          <div style={{display:"flex", flexDirection:"column", gap:4, marginTop:4}}>
                            {(i===1 ? ["Engine integration","Avionics PCBA"] : i===0 ? ["Pad walk-down"] : ["Detail design"]).map((n,j)=>(
                              <div key={j} className="box box-thin" style={{padding:"4px 8px", fontFamily:"Kalam", fontSize:11}}>{n}</div>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}

                  {/* bottom nav */}
                  <div className="row" style={{
                    position:"absolute", left:0, right:0, bottom:0, height:56,
                    borderTop:"1.5px solid var(--rule)", background:"#f5f1e6",
                    alignItems:"center", justifyContent:"space-around",
                    fontFamily:"Kalam", fontSize:10,
                  }}>
                    {[
                      {l:"Gantt", a: scr.body === "gantt"},
                      {l:"Board", a: scr.body === "nav"},
                      {l:"Table"},
                      {l:"Risk"},
                      {l:"Me"},
                    ].map((t,i)=>(
                      <div key={i} className="col" style={{alignItems:"center", color: t.a ? "var(--green)" : "var(--ink-faint)", fontWeight: t.a ? 700 : 400}}>
                        <div style={{width:18, height:18, border:`1.5px solid ${t.a ? "var(--green)" : "var(--ink-faint)"}`, borderRadius:3, marginBottom:2}}/>
                        {t.l}
                      </div>
                    ))}
                  </div>
                </div>
                <div className="anno" style={{fontSize:14, fontWeight:600}}>{scr.label}</div>
              </div>
            ))}
          </div>
          <div className="anno mono" style={{fontSize:12, color:"var(--ink-faint)"}}>
            features/shell/{`{`}AppShell, BottomNav, Sidebar (drawer mode){`}`}.tsx
          </div>
        </div>
      );
    }

    /* ---------- SHELL ANATOMY ---------- */
    function ShellAnatomyPage() {
      return (
        <div className="sketch col" style={{height:"100%", padding:"24px 32px", gap:20}}>
          <div className="row" style={{justifyContent:"space-between", alignItems:"baseline"}}>
            <div className="label squiggle" style={{fontSize:30, paddingBottom:8}}>App shell — anatomy</div>
            <span className="anno mono" style={{fontSize:12}}>features/shell/AppShell.tsx</span>
          </div>

          <div className="box col" style={{flex:1, padding:0, position:"relative", overflow:"hidden", display:"flex", flexDirection:"column"}}>
            {/* mini app frame */}
            <div className="row" style={{height:48, flexShrink:0, borderBottom:"2px solid var(--ink)", padding:"0 16px", alignItems:"center", gap:14, background:"#fbf8f1"}}>
              <span className="label" style={{fontSize:20, color:"var(--green)"}}>TruePPM</span>
              {["Overview","Gantt","WBS","Board","Table","Calendar","Resources","Risks"].map((t,i)=>(
                <span key={i} style={{fontFamily:"Kalam", fontSize:13, color: i===1 ? "var(--green)" : "var(--ink-soft)", fontWeight: i===1 ? 700 : 400}}>{t}</span>
              ))}
              <div style={{flex:1}}/>
              <span className="pill pill-amber">P80</span>
              <span className="pill pill-amber">⚠ 3</span>
              <span className="pill pill-red">● 7</span>
              <div style={{width:24,height:24,borderRadius:"50%",background:"var(--green-soft)",border:"1.5px solid var(--green)"}}/>
            </div>
            <div className="row" style={{flex:1, minHeight:0}}>
              <div style={{width:160, flexShrink:0, borderRight:"2px solid var(--ink)", background:"#f5f1e6", padding:8}}>
                <div className="mono" style={{fontSize:9, letterSpacing:1.5, color:"var(--ink-faint)"}}>PROJECTS</div>
                {["Apollo","Mercury","Gemini","Voyager"].map((p,i)=>(
                  <div key={i} style={{padding:"4px 6px", marginTop:4, fontFamily:"Kalam", fontSize:12, background: i===0 ? "rgba(28,107,58,0.10)" : "transparent", borderRadius:3, color: i===0 ? "var(--green)" : "var(--ink-soft)"}}>{p}</div>
                ))}
              </div>
              <div style={{flex:1, padding:24, position:"relative"}} className="hatch-soft">
                <div className="anno" style={{fontSize:18, color:"var(--ink-faint)"}}>page slot — &lt;Outlet /&gt;</div>
              </div>
            </div>
            <div className="row" style={{height:28, flexShrink:0, borderTop:"2px solid var(--ink)", background:"#f5f1e6", padding:"0 16px", alignItems:"center", gap:12, fontFamily:"Kalam", fontSize:11, color:"var(--ink-soft)"}}>
              <span>● Live · WS connected</span>
              <div style={{flex:1}}/>
              <span>SPI 0.94 · CPI 1.02</span>
            </div>

            {/* annotations */}
            <svg style={{position:"absolute", inset:0, width:"100%", height:"100%", pointerEvents:"none"}}>
              <defs>
                <marker id="ar" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
                  <path d="M0 0 L 6 3 L 0 6 Z" fill="#4a4844"/>
                </marker>
              </defs>
              <path d="M 80 100 Q 50 130, 30 180" stroke="#4a4844" strokeWidth="1.4" fill="none" markerEnd="url(#ar)"/>
              <path d="M 600 24 Q 700 14, 760 38" stroke="#4a4844" strokeWidth="1.4" fill="none" markerEnd="url(#ar)"/>
              <path d="M 500 540 Q 540 580, 600 600" stroke="#4a4844" strokeWidth="1.4" fill="none" markerEnd="url(#ar)"/>
              <path d="M 240 80 Q 220 110, 200 140" stroke="#4a4844" strokeWidth="1.4" fill="none" markerEnd="url(#ar)"/>
            </svg>
            <div className="anno" style={{position:"absolute", left:8, top:200, maxWidth:160}}>
              <span className="anno-strong">Sidebar</span><br/>
              project list, ●/●/● health dot, auto-collapses &lt;1024px
            </div>
            <div className="anno" style={{position:"absolute", right:16, top:50, maxWidth:200}}>
              <span className="anno-strong">Live badges</span><br/>
              P80 (Monte Carlo), at-risk count, critical count — popovers list tasks
            </div>
            <div className="anno" style={{position:"absolute", right:200, bottom:30, maxWidth:200}}>
              <span className="anno-strong">Status bar</span><br/>
              presence, WS state, build SHA — desktop only
            </div>
            <div className="anno" style={{position:"absolute", left:200, top:60, maxWidth:200}}>
              <span className="anno-strong">View tabs</span><br/>
              path-based · 8 views · hidden when no project selected
            </div>
          </div>
        </div>
      );
    }

    /* ============================================================
       Tweaks: custom Kanban columns
       ============================================================ */
    // Default columns. Each column has:
    //   id   — stable key matching BOARD_PHASES[*].byCol[id]; new columns get
    //          a fresh id at creation time.
    //   name — display label, freely editable.
    //   wip  — work-in-progress limit; 0 = no limit.
    const DEFAULT_BOARD_COLUMNS = [
      {id:"todo",  name:"To Do",       wip:0},
      {id:"doing", name:"In Progress", wip:3},
      {id:"hold",  name:"On Hold",     wip:0},
      {id:"done",  name:"Done",        wip:0},
    ];

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "boardColumns": [
        {
          "id": "col_hafc8",
          "name": "Backlog",
          "wip": 0
        },
        {
          "id": "todo",
          "name": "To Do",
          "wip": 0
        },
        {
          "id": "doing",
          "name": "In Progress",
          "wip": 3
        },
        {
          "id": "hold",
          "name": "Review",
          "wip": 0
        },
        {
          "id": "done",
          "name": "Done",
          "wip": 0
        }
      ]
    }/*EDITMODE-END*/;

    function BoardColumnsTweaks({ columns, onChange }) {
      const setCol = (idx, patch) => {
        const next = columns.map((c,i) => i === idx ? {...c, ...patch} : c);
        onChange(next);
      };
      const removeCol = (idx) => onChange(columns.filter((_,i) => i !== idx));
      const moveCol = (idx, dir) => {
        const j = idx + dir;
        if (j < 0 || j >= columns.length) return;
        const next = columns.slice();
        [next[idx], next[j]] = [next[j], next[idx]];
        onChange(next);
      };
      const addCol = () => {
        const id = "col_" + Math.random().toString(36).slice(2, 7);
        onChange([...columns, {id, name:"New column", wip:0}]);
      };
      const reset = () => onChange(DEFAULT_BOARD_COLUMNS.map(c => ({...c})));

      return (
        <>
          <TweakSection label="Kanban columns"/>
          <div style={{display:"flex", flexDirection:"column", gap:6}}>
            {columns.map((c, i) => (
              <div key={c.id} style={{
                border:".5px solid rgba(0,0,0,.1)", borderRadius:8,
                background:"rgba(255,255,255,.5)", padding:8,
                display:"flex", flexDirection:"column", gap:6,
              }}>
                <div style={{display:"flex", alignItems:"center", gap:6}}>
                  <span style={{
                    fontFamily:"ui-monospace,monospace", fontSize:10,
                    color:"rgba(41,38,27,.45)", width:18, textAlign:"center",
                  }}>{i+1}</span>
                  <input
                    className="twk-field"
                    type="text"
                    value={c.name}
                    placeholder="Column name"
                    onChange={(e) => setCol(i, {name: e.target.value})}
                    style={{flex:1, height:24}}
                  />
                </div>
                <div style={{display:"flex", alignItems:"center", gap:6}}>
                  <div className="twk-num" style={{flex:1, height:24}}>
                    <span className="twk-num-lbl">WIP</span>
                    <input
                      type="number"
                      min={0}
                      max={99}
                      value={c.wip}
                      onChange={(e) => setCol(i, {wip: Math.max(0, Math.min(99, Number(e.target.value) || 0))})}
                    />
                  </div>
                  <button
                    type="button"
                    className="twk-btn secondary"
                    onClick={() => moveCol(i, -1)}
                    disabled={i === 0}
                    style={{width:24, padding:0, opacity: i === 0 ? .35 : 1}}
                    aria-label="Move up"
                  >↑</button>
                  <button
                    type="button"
                    className="twk-btn secondary"
                    onClick={() => moveCol(i, +1)}
                    disabled={i === columns.length - 1}
                    style={{width:24, padding:0, opacity: i === columns.length-1 ? .35 : 1}}
                    aria-label="Move down"
                  >↓</button>
                  <button
                    type="button"
                    className="twk-btn secondary"
                    onClick={() => removeCol(i)}
                    disabled={columns.length <= 1}
                    style={{width:24, padding:0, opacity: columns.length <= 1 ? .35 : 1}}
                    aria-label="Remove column"
                  >✕</button>
                </div>
              </div>
            ))}
          </div>
          <div style={{display:"flex", gap:6, marginTop:4}}>
            <TweakButton label="+ Add column" onClick={addCol}/>
            <TweakButton label="Reset" secondary onClick={reset}/>
          </div>
          <div className="twk-sect" style={{paddingTop:6}}>Tip</div>
          <div style={{fontSize:11, color:"rgba(41,38,27,.55)", lineHeight:1.4}}>
            Changes apply live to the <b>Board</b> artboard. WIP <code>0</code> means no limit. Set a limit ≥ 1 to surface a column-level warning when exceeded.
          </div>
        </>
      );
    }

    /* ============================================================
       Render to design canvas
       ============================================================ */
    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const columns = (tweaks.boardColumns && tweaks.boardColumns.length)
        ? tweaks.boardColumns
        : DEFAULT_BOARD_COLUMNS;
      return (
        <>
        <DesignCanvas defaultZoom={0.55}>
          <DCSection id="shell" title="0 · Shell & navigation">
            <DCArtboard id="shell-anatomy" label="App shell — anatomy & vocabulary" width={1440} height={900}>
              <ShellAnatomyPage/>
            </DCArtboard>
            <DCArtboard id="login" label="① Login (/login)" width={1440} height={900}>
              <LoginPage/>
            </DCArtboard>
            <DCArtboard id="mobile" label="② Mobile shell (drawer + bottom nav)" width={1100} height={900}>
              <MobileShellPage/>
            </DCArtboard>
          </DCSection>

          <DCSection id="project" title="1 · Project views (/projects/:id/…)">
            <DCArtboard id="overview" label="Overview · /overview · KPIs + attention + my tasks" width={1440} height={900}>
              <OverviewPage/>
            </DCArtboard>
            <DCArtboard id="gantt" label="Gantt · /gantt · split-pane, CPM, today line" width={1440} height={900}>
              <GanttPage/>
            </DCArtboard>
            <DCArtboard id="wbs" label="WBS · /wbs · hierarchical outline" width={1440} height={900}>
              <WbsPage/>
            </DCArtboard>
            <DCArtboard id="board" label="Board · /board · phase swimlanes × status" width={1440} height={900}>
              <BoardPage columns={columns}/>
            </DCArtboard>
            <DCArtboard id="list" label="Table · /list · filterable task table" width={1440} height={900}>
              <TablePage/>
            </DCArtboard>
            <DCArtboard id="calendar" label="Calendar · /calendar · month grid" width={1440} height={900}>
              <CalendarPage/>
            </DCArtboard>
            <DCArtboard id="resources" label="Resources · /resources · allocation heatmap" width={1440} height={900}>
              <ResourcesPage/>
            </DCArtboard>
            <DCArtboard id="risk" label="Risks · /risk · matrix + register" width={1440} height={900}>
              <RiskPage/>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>

        <TweaksPanel title="Tweaks · Board">
          <BoardColumnsTweaks
            columns={columns}
            onChange={(next) => setTweak("boardColumns", next)}
          />
        </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>

  <script type="text/babel" src="design-canvas.jsx" data-presets="env,react"></script>
</body>
</html>
