<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>TruePPM — Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  body { margin:0; background:#f0eee9; font-family: 'Inter', system-ui, sans-serif; }
  * { box-sizing: border-box; }
  /* Brand tokens kept identical to mockups.html so mobile reads as same product */
  :root {
    --tppm-primary: #1C6B3A;
    --tppm-primary-light: #D4EDDA;
    --tppm-accent: #E8A020;
    --tppm-accent-light: #FFF3CD;
    --tppm-crit: #B91C1C;
    --tppm-crit-bg: rgba(185,28,28,0.08);
    --tppm-warn: #92400E;
    --tppm-warn-bg: rgba(146,64,14,0.10);
    --tppm-ok: #166534;
    --tppm-ok-bg: rgba(22,101,52,0.10);
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="ios-frame.jsx" data-presets="env,react"></script>
  <script type="text/babel" src="android-frame.jsx" data-presets="env,react"></script>
  <script type="text/babel" src="design-canvas.jsx" data-presets="env,react"></script>
  <script type="text/babel" src="mobile-screens.jsx" data-presets="env,react"></script>
  <script type="text/babel" data-presets="env,react">
    function App() {
      const screens = window.MOBILE_SCREENS;
      return (
        <DesignCanvas>
          {screens.map(s => (
            <DCSection key={s.id} id={s.id} title={s.title} subtitle={s.sub}>
              <DCArtboard id={`${s.id}-ios`} label={`${s.title} — iOS`} width={420} height={900}>
                <IOSDevice width={402} height={874} dark={false}>
                  {s.body({ os: "ios" })}
                </IOSDevice>
              </DCArtboard>
              <DCArtboard id={`${s.id}-android`} label={`${s.title} — Android`} width={430} height={920}>
                <AndroidDevice width={412} height={892} dark={false}>
                  {s.body({ os: "android" })}
                </AndroidDevice>
              </DCArtboard>
            </DCSection>
          ))}
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
